<html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BOA CRM</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 34 46'%3E%3Crect x='1.5' y='1.5' width='31' height='43' fill='%23233b34' stroke='%23233b34'/%3E%3Ctext x='17' y='19' text-anchor='middle' font-family='serif' font-size='14' fill='%23e2dfd6'%3EB%3C/text%3E%3Cpath d='M 5.5 25 Q 17 21 28.5 25' stroke='%23e2dfd6' stroke-width='0.9' fill='none' stroke-linecap='round'/%3E%3Ctext x='17' y='38' text-anchor='middle' font-family='serif' font-size='14' fill='%23e2dfd6'%3EH%3C/text%3E%3C/svg%3E">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&amp;display=swap" rel="stylesheet">
  <style>
    :root {
      --ink:        #262626; /* Light Black */
      --ink-soft:   #3a3a3a;
      --green:      #233b34; /* Dark Green */
      --green-soft: #2d4a42;
      --green-deep: #1a2d28;
      --warm:       #aca497; /* Dark Warm Grey */
      --paper:      #e2dfd6; /* Light Warm Grey */
      --paper-soft: #eceadf;
      --cream:      #f5f3eb;
      --line:       #d4cfc1;
      --line-soft:  #e8e4d6;
    }
    * { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    body { background: var(--paper); color: var(--ink); }
    .font-display { font-family: 'Fraunces', 'PP Fragment Glare', serif; font-feature-settings: "ss01","ss02"; font-variation-settings: "opsz" 96, "SOFT" 30; letter-spacing: -0.01em; }
    .num { font-variant-numeric: tabular-nums; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(11,18,32,0.55); backdrop-filter: blur(4px); z-index: 50; align-items: center; justify-content: center; }
    .modal-overlay.active { display: flex; animation: fadeIn 0.15s ease; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    @keyframes slideUp { from{opacity:0; transform: translateY(8px)} to{opacity:1; transform: translateY(0)} }
    .modal-card { animation: slideUp 0.18s ease; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-radius: 8px; color: rgba(226,223,214,0.55); font-size: 13px; font-weight: 500; transition: all 0.15s; cursor: pointer; letter-spacing: 0.01em; }
    .nav-item:hover { background: rgba(226,223,214,0.06); color: rgba(226,223,214,0.9); }
    .nav-item.active { background: rgba(226,223,214,0.1); color: #f5f3eb; }
    .nav-item.active svg { color: var(--paper); }
    .stat-card { background: var(--cream); border: 1px solid var(--line-soft); border-radius: 4px; padding: 24px; transition: all 0.15s; }
    .stat-card:hover { background: white; border-color: var(--line); }
    .card { background: var(--cream); border: 1px solid var(--line-soft); border-radius: 4px; }
    .row-hover:hover { background: var(--paper-soft); }
    .gold-btn { background: var(--green); color: var(--paper); transition: all 0.15s; letter-spacing: 0.02em; }
    .gold-btn:hover { background: var(--green-deep); }
    .ghost-btn { background: transparent; color: var(--ink); border: 1px solid var(--line); transition: all 0.15s; }
    .ghost-btn:hover { background: var(--paper-soft); border-color: var(--warm); }
    input, select, textarea { background: white; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--green); box-shadow: 0 0 0 3px rgba(35,59,52,0.1); }
    .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
    table tbody tr { transition: background 0.1s; }
    .scroll-shadow { background: linear-gradient(white 30%, rgba(255,255,255,0)), linear-gradient(rgba(255,255,255,0), white 70%) 0 100%, radial-gradient(farthest-side at 50% 0, rgba(0,0,0,0.1), rgba(0,0,0,0)), radial-gradient(farthest-side at 50% 100%, rgba(0,0,0,0.1), rgba(0,0,0,0)) 0 100%; background-repeat: no-repeat; background-size: 100% 40px, 100% 40px, 100% 14px, 100% 14px; background-attachment: local, local, scroll, scroll; }
    /* Read-only mode hides creation/edit affordances */
    body.read-only [onclick^="openNewModal"],
    body.read-only button[onclick^="event.stopPropagation();openEditModal"] { display: none !important; }
    body.read-only [onclick^="openEditModal"] { cursor: default !important; }
    body.read-only tr.row-hover:hover { background: transparent !important; }

    /* Inline cell editors — blend with the row, reveal only on hover/focus.
       Keeps the brand book look (no stark white boxes by default). */
    .cell-edit, .cell-edit-select {
      background: transparent;
      border: 1px solid transparent;
      padding: 2px 4px;
      border-radius: 4px;
      font: inherit;
      color: inherit;
      width: 100%;
      min-width: 0;
      transition: background 0.12s ease, border-color 0.12s ease, box-shadow 0.12s ease;
      cursor: pointer;
      text-overflow: ellipsis;
    }
    .cell-edit:hover, .cell-edit-select:hover {
      background: var(--paper-soft);
      border-color: var(--line-soft);
    }
    .cell-edit:focus, .cell-edit-select:focus {
      background: white;
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(35,59,52,0.08);
      outline: none;
      cursor: text;
    }
    /* Render selects like text (hide native arrow until hover) */
    .cell-edit-select {
      appearance: none; -webkit-appearance: none; -moz-appearance: none;
      padding-right: 16px;
      background-image: none;
    }
    .cell-edit-select:hover, .cell-edit-select:focus {
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%237a6f5e' stroke-width='1.4' fill='none' stroke-linecap='round'/></svg>");
      background-repeat: no-repeat;
      background-position: right 4px center;
    }
    /* Status / KPI pill-style select: keep pill look while remaining editable */
    .pill-select {
      appearance: none; -webkit-appearance: none; -moz-appearance: none;
      border-radius: 2px;
      padding: 3px 16px 3px 8px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.01em;
      cursor: pointer;
      max-width: 100%;
      transition: filter 0.12s ease, box-shadow 0.12s ease;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='currentColor' stroke-width='1.4' fill='none' stroke-linecap='round' opacity='0.5'/></svg>");
      background-repeat: no-repeat;
      background-position: right 5px center;
    }
    .pill-select:hover { filter: brightness(0.97); }
    .pill-select:focus { outline: none; box-shadow: 0 0 0 3px rgba(35,59,52,0.10); }
    /* Companies/list tables: allow horizontal scroll on narrower viewports */
    .crm-table-wrap { overflow-x: auto; }
  </style>

<body class="min-h-screen">

  <!-- ============ SIDEBAR ============ -->
  <aside class="fixed left-0 top-0 bottom-0 w-60 flex flex-col" style="background: var(--green);">
    <div class="px-6 pt-8 pb-10">
      <div class="flex items-center gap-3.5">
        <svg width="34" height="46" viewBox="0 0 34 46" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="BOA Hotels monogram">
          <rect x="1.5" y="1.5" width="31" height="43" stroke="#e2dfd6" stroke-width="0.9" fill="none"></rect>
          <text x="17" y="19" text-anchor="middle" font-family="Fraunces, 'PP Fragment Glare', serif" font-size="14" font-weight="400" fill="#e2dfd6" style="font-variation-settings: 'opsz' 144;">B</text>
          <path d="M 5.5 25 Q 17 21 28.5 25" stroke="#e2dfd6" stroke-width="0.9" fill="none" stroke-linecap="round"></path>
          <text x="17" y="38" text-anchor="middle" font-family="Fraunces, 'PP Fragment Glare', serif" font-size="14" font-weight="400" fill="#e2dfd6" style="font-variation-settings: 'opsz' 144;">H</text>
        </svg>
        <div>
          <div class="font-display text-[15px] font-normal leading-none tracking-[0.18em]" style="color: var(--paper);">BOA HOTELS</div>
          <div class="text-[9px] uppercase tracking-[0.25em] mt-2" style="color: rgba(226,223,214,0.55);">CRM</div>
        </div>
      </div>

// ============================================================
//  ENCRYPTION (AES-256-GCM with PBKDF2-derived key)
// ============================================================
const PBKDF2_ITERATIONS = 250000;

async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    'raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']
  );
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: PBKDF2_ITERATIONS, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    false,
    ['encrypt','decrypt']
  );
}

function bytesToB64(bytes) {
  let s = '';
  for (const b of bytes) s += String.fromCharCode(b);
  return btoa(s);
}
function b64ToBytes(b64) {
  const s = atob(b64);
  const bytes = new Uint8Array(s.length);
  for (let i = 0; i < s.length; i++) bytes[i] = s.charCodeAt(i);
  return bytes;
}

async function encryptPayload(obj, password) {
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await deriveKey(password, salt);
  const plaintext = new TextEncoder().encode(JSON.stringify(obj));
  const ciphertext = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, plaintext);
  return {
    v: 1,
    salt: bytesToB64(salt),
    iv: bytesToB64(iv),
    data: bytesToB64(new Uint8Array(ciphertext))
  };
}

async function decryptPayload(payload, password) {
  const salt = b64ToBytes(payload.salt);
  const iv = b64ToBytes(payload.iv);
  const ct = b64ToBytes(payload.data);
  const key = await deriveKey(password, salt);
  const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
  return JSON.parse(new TextDecoder().decode(plain));
}

// =========== DASHBOARD GLOBAL SEARCH / FOCUS ===========
// Debounced live search — fires applyDashboardSearch ~300ms after user stops typing.
// Auto-focuses when the query is at least 2 chars (avoids flickering for single letters).
let _dashSearchTimer = null;
function onDashboardSearchInput(value) {
  if (_dashSearchTimer) clearTimeout(_dashSearchTimer);
  const v = (value||'').trim();
  if (v.length === 0) {
    _dashSearchTimer = setTimeout(() => {
      state.dashboardFocus = { type: 'all', id: null, label: '', query: '' };
      render();
    }, 200);
    return;
  }
  if (v.length < 2) return; // wait for more characters
  _dashSearchTimer = setTimeout(() => applyDashboardSearch(v), 280);
}

function applyDashboardSearch(query) {
  const q = (query||'').trim();
  if (!q) {
    state.dashboardFocus = { type: 'all', id: null, label: '', query: '' };
    render();
    return;
  }
  const qLow = q.toLowerCase();
  // Priority: exact project > exact company > exact contact > partial project > partial company > partial contact > text
  const projExact = state.projects.find(p => p.name.toLowerCase() === qLow);
  const coExact = state.companies.find(c => (c.name||'').toLowerCase() === qLow);
  const ctExact = state.contacts.find(c => (((c.firstName||'')+' '+(c.lastName||'')).toLowerCase().trim() === qLow));
  let match = null;
  if (projExact) match = { type:'project', id:projExact.id, label:projExact.name };
  else if (coExact) match = { type:'company', id:coExact.id, label:coExact.name };
  else if (ctExact) match = { type:'contact', id:ctExact.id, label:`${ctExact.firstName||''} ${ctExact.lastName||''}`.trim() };
  else {
    const proj = state.projects.find(p => p.name.toLowerCase().includes(qLow));
    if (proj) match = { type:'project', id:proj.id, label:proj.name };
    else {
      const co = state.companies.find(c => (c.name||'').toLowerCase().includes(qLow));
      if (co) match = { type:'company', id:co.id, label:co.name };
      else {
        const ct = state.contacts.find(c => (((c.firstName||'')+' '+(c.lastName||'')).toLowerCase()).includes(qLow));
        if (ct) match = { type:'contact', id:ct.id, label:`${ct.firstName||''} ${ct.lastName||''}`.trim() };
      }
    }
  }
  if (match) { state.dashboardFocus = { ...match, query: q }; }
  else { state.dashboardFocus = { type: 'text', id: null, label: q, query: q }; }
  render();
}

function clearDashboardFocus() {
  state.dashboardFocus = { type: 'all', id: null, label: '', query: '' };
  state.actionContext = null;
  state.projectCompanyExpanded = null;
  render();
}

function toggleProjectCompanyRow(companyId) {
  state.projectCompanyExpanded = (state.projectCompanyExpanded === companyId) ? null : companyId;
  renderDashboard();
}
function updateInteractionKpi(interactionId, newKpi) {
  const i = state.interactions.find(x => x.id === interactionId);
  if (!i) return;
  i.kpi = newKpi;
  state.lastUpdatedByUser = new Date().toISOString();
  if (typeof saveToFile === 'function') saveToFile();
  renderDashboard();
}
function updateInteractionFollowUp(interactionId, dateStr) {
  const i = state.interactions.find(x => x.id === interactionId);
  if (!i) return;
  i.followUpDate = dateStr || null;
  state.lastUpdatedByUser = new Date().toISOString();
  if (typeof saveToFile === 'function') saveToFile();
  renderDashboard();
}
function toggleInteractionCompleted(interactionId) {
  const i = state.interactions.find(x => x.id === interactionId);
  if (!i) return;
  i.completed = !i.completed;
  state.lastUpdatedByUser = new Date().toISOString();
  if (typeof saveToFile === 'function') saveToFile();
  renderDashboard();
}
// Render a contacts panel for a company — used in the Companies-list inline edit drawer so

    const aGeral = (a.firstName === 'Geral' || a.firstName === 'General') ? 1 : 0;
    const bGeral = (b.firstName === 'Geral' || b.firstName === 'General') ? 1 : 0;
    if (aGeral !== bGeral) return aGeral - bGeral;

        <svg width="11" height="11" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>

    ${sorted.length === 0 ? `
      <div class="text-sm py-4 px-3 rounded" style="color: var(--warm); background: var(--paper-soft);">No contacts on file for this company.</div>
    ` : `
      <div class="grid grid-cols-3 gap-3">
        ${sorted.map(ct => {
          const fullName = ((ct.firstName||'')+' '+(ct.lastName||'')).trim();
          const isGeral = ct.firstName === 'Geral' || ct.firstName === 'General';

// Render an interactions panel for a company — used in the Companies-list inline edit drawer
// so the user can decide whether a follow-up is warranted before saving any edit.
function renderCompanyInteractionsPanel(companyId) {
  const co = state.companies.find(c => c.id === companyId);
  if (!co) return '';
  const ints = state.interactions.filter(i => i.companyId === companyId)
    .sort((a,b) => new Date(b.date||0) - new Date(a.date||0));
  const today = new Date(); today.setHours(0,0,0,0);
  const latest = ints[0];
  const daysSinceLatest = latest ? Math.floor((today - new Date(latest.date||0)) / 86400000) : null;

  // Follow-up suggestion: any non-completed action_required, any overdue followUpDate,
  // or stale latest (>30 days) and KPI is not terminal.
  let followUpHint = null;
  if (latest && !INACTIVE_KPIS.has(latest.kpi)) {
    if (latest.kpi === 'action_required' && !latest.completed) {
      followUpHint = { color: '#a04330', text: 'Action required on our side — follow up now' };
    } else if (latest.followUpDate && new Date(latest.followUpDate) < today && !latest.completed) {
      const d = Math.floor((today - new Date(latest.followUpDate))/86400000);
      followUpHint = { color: '#a04330', text: `Follow-up overdue ${d}d (was due ${fmtDate(latest.followUpDate)})` };
    } else if (latest.followUpDate && !latest.completed) {
      const d = Math.floor((new Date(latest.followUpDate) - today)/86400000);
      if (d <= 7) followUpHint = { color: '#7a5c3c', text: `Follow-up due in ${d}d (${fmtDate(latest.followUpDate)})` };
    } else if (daysSinceLatest != null && daysSinceLatest > 30) {
      followUpHint = { color: '#7a5c3c', text: `Silent ${daysSinceLatest}d — consider a touchpoint` };
    }

        <button onclick="openCompanyDraft('${esc(co.id)}')" class="gold-btn px-3 py-1.5 text-xs rounded font-semibold inline-flex items-center gap-1">
          <svg width="11" height="11" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l9 6 9-6M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
          Draft follow-up
        </button>
      </div>
    </div>

    ${ints.length === 0 ? `
      <div class="text-sm py-4 px-3 rounded" style="color: var(--warm); background: var(--paper-soft);">No interactions yet — clicking <em>Draft follow-up</em> will generate a fresh BOA Hotels introduction email.</div>
    ` : `
      <div class="rounded" style="border: 1px solid var(--line-soft); background: white;">
        <table class="w-full text-sm">
          <thead style="background: var(--paper-soft);">
            <tr class="text-[10px] uppercase tracking-wider" style="color: var(--warm);">
              <th class="text-left px-3 py-2 font-semibold w-24">Date</th>
              <th class="text-left px-3 py-2 font-semibold w-28">Type</th>
              <th class="text-left px-3 py-2 font-semibold">Subject</th>
              <th class="text-left px-3 py-2 font-semibold w-32">Latest KPI</th>
              <th class="text-left px-3 py-2 font-semibold w-32">Follow-up</th>
              <th class="text-left px-3 py-2 font-semibold w-32">Projects</th>
            </tr>
          </thead>
          <tbody>
            ${slice.map(i => {
              const isOverdue = i.followUpDate && new Date(i.followUpDate) < today && !i.completed;
              const projs = Array.isArray(i.projectIds) ? i.projectIds.map(pid => state.projects.find(p => p.id === pid)).filter(Boolean) : [];
              return `<tr class="row-hover cursor-pointer border-t" style="border-color: var(--line-soft);" onclick="event.stopPropagation(); state.editingType=null; state.editingId=null; state.interactionFilter={search:'', kpi:'', companyId:'${esc(co.id)}', projectId:''}; setView('interactions');" title="Click to view all interactions in the Interactions view">
                <td class="px-3 py-2 text-xs num" style="color: var(--warm);">${fmtDateShort(i.date)}</td>
                <td class="px-3 py-2 text-xs" style="color: var(--ink);">${esc(i.kind || '—')}</td>
                <td class="px-3 py-2 text-xs" style="color: var(--ink);">
                  <div class="font-medium truncate">${esc(i.subject || '—')}</div>
                  ${i.summary ? `<div class="text-[11px] truncate" style="color: var(--warm);">${esc(i.summary.length > 90 ? i.summary.slice(0,90)+'…' : i.summary)}</div>` : ''}
                </td>

    `}
  </div>`;
}

// Remove a projectId from every interaction tied to a company. Used by the company-edit
// drawer when a project is showing up via interactions and the user wants to detach it.
function detachProjectFromCompanyInteractions(companyId, projectId) {
  if (!confirm('Remove this project tag from ALL interactions of this company? The interactions themselves stay; only the project link is removed.')) return;
  let touched = 0;
  state.interactions.forEach(i => {
    if (i.companyId === companyId && Array.isArray(i.projectIds) && i.projectIds.includes(projectId)) {
      i.projectIds = i.projectIds.filter(pid => pid !== projectId);
      touched++;
    }
  });
  if (touched > 0) {
    state.lastUpdatedByUser = new Date().toISOString();
    if (typeof saveToFile === 'function') saveToFile();
  }
  render();
}

// Create a lightweight placeholder interaction when the user picks a KPI directly
// from the Companies list on a company that has no interactions yet. This unblocks
// the workflow — no need to open a modal just to seed a status.
function setFirstKpiForCompany(companyId, kpi) {
  if (!kpi) return;
  const co = state.companies.find(c => c.id === companyId);
  if (!co) return;
  // Compute next interaction id following the iu_NN convention used by Claude-generated entries
  const maxIu = state.interactions
    .filter(i => /^iu_\d+$/.test(i.id||''))
    .reduce((m, i) => Math.max(m, parseInt(i.id.replace('iu_',''))||0), 0);
  const newId = 'iu_' + (maxIu + 1);
  const nowIso = new Date().toISOString();
  state.interactions.push({
    id: newId,
    companyId: companyId,
    contactId: null,
    projectIds: [],
    date: nowIso,
    kind: 'Note',
    subject: 'Status set inline (' + (KPI[kpi]?.label || kpi) + ')',
    summary: 'Lightweight status seed created from the Companies list KPI dropdown — edit to add context.',
    outcome: '',
    kpi: kpi,
    completed: true,
    createdAt: nowIso
  });
  state.lastUpdatedByUser = nowIso;
  if (typeof saveToFile === 'function') saveToFile();
  if (typeof showCrmToast === 'function') {
    showCrmToast('KPI set for ' + co.name, 'success', 'Placeholder interaction "' + newId + '" created — open the row to add context.');
  }
  render();
}

    ov.remove();

// Floating action panel — overlays whatever view the user is on (Companies list,
// Project focus, etc.) so closing returns them exactly to where they were.
function openActionContextModal() {
  const existing = document.getElementById('action-context-overlay');
  if (existing) existing.remove();
  const inner = renderActionContextPanel();
  if (!inner) return;
  const overlay = document.createElement('div');
  overlay.id = 'action-context-overlay';
  overlay.className = 'modal-overlay active';
  overlay.style.zIndex = '55';
  overlay.onclick = (e) => { if (e.target === overlay) closeActionContext(); };
  overlay.innerHTML = `<div class="w-full max-w-3xl mx-4 max-h-[92vh] overflow-y-auto" onclick="event.stopPropagation()">${inner}</div>`;
  document.body.appendChild(overlay);
  // ESC closes the modal — listener self-removes on close
  const escHandler = (e) => { if (e.key === 'Escape') closeActionContext(); };
  document.addEventListener('keydown', escHandler);
  overlay._escHandler = escHandler;
  setTimeout(() => {
    const el = document.getElementById('action-context-panel');
    if (el) el.scrollIntoView({ behavior:'smooth', block:'start' });
  }, 30);
}

function openActionList(bucket) {

  let subject, body, action;
  if (isPT) {

`Olá ${firstName || ''},

Espero que esteja tudo bem.

A retomar a nossa conversa${subj ? ` sobre "${subj}"` : ''}${lastDate ? ` (último contacto a ${lastDate})` : ''}${projCtx ? `, relativa a ${projCtx}` : ''}.

`Hi ${firstName || ''},

Happy to schedule a quick call this week if useful on your side.`;

// Entry point: from the Companies list or detail page, draft an email for this company.
// Picks intro (no prior interactions) or follow-up (latest interaction) automatically.
function openCompanyDraft(companyId) {
  const co = state.companies.find(c => c.id === companyId);
  if (!co) return;
  const ints = state.interactions.filter(i => i.companyId === companyId)
    .sort((a,b) => new Date(b.date||0) - new Date(a.date||0));
  if (ints.length === 0) {
    state.actionContext = { bucket: 'intro', interactionId: null, companyId };
  } else {
    // Use most recent interaction; tag bucket as 'follow_up_general' so the panel
    // shows it but without urgency framing.
    state.actionContext = { bucket: 'follow_up_general', interactionId: ints[0].id, companyId };
  }
  // Floating modal — stays on whichever view the user is on (Companies list, project
  // focus, etc.) and closes back to the exact same spot.
  openActionContextModal();
}

function renderActionContextPanel() {
  const ctx = state.actionContext;
  if (!ctx) return '';
  const isIntro = ctx.bucket === 'intro';
  const i = isIntro ? null : state.interactions.find(x => x.id === ctx.interactionId);
  if (!isIntro && !i) return '';
  const co = state.companies.find(c => c.id === (i ? i.companyId : ctx.companyId));
  if (!co) return '';
  // Collect ALL contacts for this company so the user can choose who to send to.
  const allCoContacts = state.contacts.filter(c => c.companyId === co.id);
  // Pick primary contact (initial selection)
  let ct = i ? state.contacts.find(c => c.id === i.contactId) : null;
  if (!ct && allCoContacts.length) {
    // Prefer named contact with email first; Geral last as fallback
    const named = allCoContacts.filter(c => c.firstName !== 'Geral' && c.firstName !== 'General');
    ct = named.find(c => c.email) || named[0] || allCoContacts.find(c => c.email) || allCoContacts[0];
  }

  const draft = isIntro ? buildIntroEmail(co, ct) : buildFollowUpEmail(co, ct, i, ctx.bucket);
  const today = new Date(); today.setHours(0,0,0,0);
  let urgency = '';
  if (!isIntro) {
    if (ctx.bucket === 'overdue' && i.followUpDate) {
      const days = Math.floor((today - new Date(i.followUpDate)) / 86400000);
      urgency = `<span style="color:#a04330;">${days}d overdue · was ${fmtDate(i.followUpDate)}</span>`;
    } else if (ctx.bucket === 'this_week' && i.followUpDate) {
      urgency = `<span style="color:#7a5c3c;">Due ${fmtDate(i.followUpDate)}</span>`;
    } else if (ctx.bucket === 'action_required') {
      urgency = `<span style="color:#a04330;">Action required since ${fmtDate(i.date)}</span>`;
    } else if (ctx.bucket === 'follow_up_general' && i.date) {
      urgency = `<span style="color: var(--warm);">Last touch ${fmtDate(i.date)}</span>`;
    }
  } else {
    urgency = `<span style="color: var(--green);">First contact — no prior interactions</span>`;
  }

  const bucketTitle = isIntro ? 'BOA Hotels introduction'
                    : ctx.bucket === 'overdue' ? 'Overdue follow-up'
                    : ctx.bucket === 'action_required' ? 'Action required'
                    : ctx.bucket === 'follow_up_general' ? 'Draft follow-up'
                    : 'Follow-up this week';

  const accent = isIntro ? '#233b34' : '#b04c32';
  const panelBg = isIntro ? '#f5f3eb' : '#fdf6ee';
  const panelBorder = isIntro ? 'rgba(35,59,52,0.25)' : '#e6d4b8';
  const recipientEmail = ct?.email || '';

  return `
  <div id="action-context-panel" class="card p-5 mb-4" style="background:${panelBg}; border-color:${panelBorder}; border-left:4px solid ${accent};">
    <div class="flex items-start justify-between mb-3">

// ====== Silent Gmail draft creation via Google OAuth + Gmail API ======
// One-time setup: user pastes a Google OAuth Client ID; the CRM uses Google Identity
// Services for the auth popup (only the first time, then cached) and the Gmail API
// to push the draft. No compose tab opens — just a "✓ Saved" toast.
const GOOGLE_CLIENT_ID_KEY = 'boa_crm_google_client_id';
function getGoogleClientId() { try { return (localStorage.getItem(GOOGLE_CLIENT_ID_KEY)||'').trim(); } catch(e) { return ''; } }
function setGoogleClientId(s) { try { localStorage.setItem(GOOGLE_CLIENT_ID_KEY, (s||'').trim()); } catch(e) {} }

let _gisScriptLoaded = false;
function loadGoogleIdentityScript() {
  if (_gisScriptLoaded && window.google?.accounts) return Promise.resolve();
  return new Promise((resolve, reject) => {
    if (window.google?.accounts) { _gisScriptLoaded = true; return resolve(); }
    const s = document.createElement('script');
    s.src = 'https://accounts.google.com/gsi/client';
    s.async = true; s.defer = true;
    s.onload = () => { _gisScriptLoaded = true; resolve(); };
    s.onerror = () => reject(new Error('Failed to load Google Identity Services script'));
    document.head.appendChild(s);
  });
}

let _gmailAccessToken = null;
let _gmailTokenExpiresAt = 0;
function requestGmailToken() {
  return new Promise((resolve, reject) => {
    // Reuse cached token while still valid (with a 60s safety margin)
    if (_gmailAccessToken && Date.now() < _gmailTokenExpiresAt - 60000) return resolve(_gmailAccessToken);
    const cid = getGoogleClientId();
    if (!cid) return reject(new Error('NO_CLIENT_ID'));
    if (!window.google?.accounts?.oauth2) return reject(new Error('GIS_NOT_LOADED'));
    const tc = google.accounts.oauth2.initTokenClient({
      client_id: cid,
      scope: 'https://www.googleapis.com/auth/gmail.compose',
      callback: (resp) => {
        if (resp.error) return reject(new Error(resp.error_description || resp.error));
        _gmailAccessToken = resp.access_token;
        _gmailTokenExpiresAt = Date.now() + (resp.expires_in || 3600) * 1000;
        resolve(_gmailAccessToken);
      },
      error_callback: (err) => reject(new Error(err.type || 'oauth_error'))
    });
    tc.requestAccessToken({ prompt: '' });
  });
}

async function silentGmailDraft(to, subject, body) {
  if (location.protocol === 'file:') {
    return { ok: false, error: 'Google OAuth requires HTTPS — open the published CRM URL instead of the local file.' };
  }
  if (!getGoogleClientId()) return { ok: false, error: 'NO_CLIENT_ID' };
  try {
    await loadGoogleIdentityScript();
    const token = await requestGmailToken();
    // Build RFC 2822 message. UTF-8 subject is base64-encoded per RFC 2047.
    const subjB64 = btoa(unescape(encodeURIComponent(subject || '')));
    const encodedSubject = `=?UTF-8?B?${subjB64}?=`;
    const headers = [
      `To: ${to}`,
      `Subject: ${encodedSubject}`,
      `Content-Type: text/plain; charset="UTF-8"`,
      `Content-Transfer-Encoding: 8bit`
    ].join('\r\n');
    const message = headers + '\r\n\r\n' + (body || '');
    // base64url-encode for Gmail
    const raw = btoa(unescape(encodeURIComponent(message)))
      .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    const res = await fetch('https://gmail.googleapis.com/gmail/v1/users/me/drafts', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: { raw } })
    });
    if (!res.ok) {
      const t = await res.text();
      return { ok: false, error: 'Gmail API ' + res.status + ': ' + t.slice(0, 240) };
    }
    const data = await res.json();
    return { ok: true, draftId: data.id };
  } catch (err) {
    return { ok: false, error: String(err.message || err) };
  }
}

//  AI EMAIL ASSISTANT  (refine the current draft or generate from scratch)
// ============================================================
const AI_KEY_STORAGE = 'boa_crm_anthropic_key';
const AI_RULES_STORAGE = 'boa_crm_ai_rules';      // user-curated style rules (string)
const AI_HISTORY_STORAGE = 'boa_crm_ai_history';  // array of recent edit exchanges
const AI_HISTORY_MAX = 25;
function getAnthropicKey() {
  try {
    const raw = localStorage.getItem(AI_KEY_STORAGE) || '';
    // Trim quotes / whitespace that paste sometimes leaves behind
    return raw.replace(/^["'`\s]+|["'`\s]+$/g, '');
  } catch(e) { return ''; }
}
function setAnthropicKey(k) { try { localStorage.setItem(AI_KEY_STORAGE, k); } catch(e) {} }
function clearAnthropicKey() { try { localStorage.removeItem(AI_KEY_STORAGE); } catch(e) {} }
function getAiRules() { try { return localStorage.getItem(AI_RULES_STORAGE) || ''; } catch(e) { return ''; } }
function setAiRules(s) { try { localStorage.setItem(AI_RULES_STORAGE, s); } catch(e) {} }
function getAiHistory() {
  try { return JSON.parse(localStorage.getItem(AI_HISTORY_STORAGE) || '[]'); } catch(e) { return []; }
}
function pushAiHistory(entry) {
  const arr = getAiHistory();
  arr.unshift({ ...entry, ts: new Date().toISOString() });
  while (arr.length > AI_HISTORY_MAX) arr.pop();
  try { localStorage.setItem(AI_HISTORY_STORAGE, JSON.stringify(arr)); } catch(e) {}
}
function clearAiHistory() { try { localStorage.removeItem(AI_HISTORY_STORAGE); } catch(e) {} }
// Track which AI-generated body the user last received, so we can capture any
// manual edits they make before sending and treat those edits as additional learning.
let _lastAiOutput = null; // { subject, body }
function captureManualEditAsLearning() {
  if (!_lastAiOutput) return;
  const subj = document.getElementById('action-email-subject')?.value || '';
  const body = document.getElementById('action-email-body')?.value || '';
  if (subj === _lastAiOutput.subject && body === _lastAiOutput.body) return; // no edits
  pushAiHistory({
    kind: 'manual_edit_after_ai',
    aiSubject: _lastAiOutput.subject,
    aiBody: _lastAiOutput.body,
    finalSubject: subj,
    finalBody: body
  });
  _lastAiOutput = null;
}

// Test the typed key with a minimal API call. Only saves if it succeeds.
async function testAndSaveAnthropicKey(btn) {
  const input = document.getElementById('ai-key-input');
  const resultEl = document.getElementById('ai-key-test-result');
  const raw = (input?.value || '').trim();
  // Trim invisible whitespace / quotes that paste sometimes drags in
  const key = raw.replace(/^["'`\s]+|["'`\s]+$/g, '');
  if (!key) { alert('Paste an API key first.'); input?.focus(); return; }
  if (!key.startsWith('sk-ant-')) {
    if (!confirm("The key doesn't start with 'sk-ant-'. Save anyway?")) return;
  }
  const origLabel = btn.textContent;
  btn.disabled = true;
  btn.textContent = '⏳ Testing…';
  if (resultEl) { resultEl.style.display = ''; resultEl.style.color = 'var(--warm)'; resultEl.textContent = 'Pinging Anthropic API…'; }
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
        'content-type': 'application/json'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 4,
        messages: [{ role: 'user', content: 'ping' }]
      })
    });
    if (res.ok) {
      setAnthropicKey(key);
      if (resultEl) { resultEl.style.color = 'var(--green)'; resultEl.textContent = '✓ Key valid — saved.'; }
      setTimeout(() => { btn.closest('.modal-overlay').remove(); }, 700);
    } else {
      const txt = await res.text();
      let parsed;
      try { parsed = JSON.parse(txt); } catch(e) { parsed = null; }
      const msg = parsed?.error?.message || txt.slice(0, 240);
      if (resultEl) { resultEl.style.color = '#a04330'; resultEl.textContent = '✗ ' + res.status + ' · ' + msg; }
      btn.disabled = false;
      btn.textContent = origLabel;
    }
  } catch (err) {
    if (resultEl) { resultEl.style.color = '#a04330'; resultEl.textContent = '✗ Network error: ' + (err.message || err); }
    btn.disabled = false;
    btn.textContent = origLabel;
  }
}

async function callClaudeRefine() {
  const instructionEl = document.getElementById('ai-instruction');
  const instruction = (instructionEl?.value || '').trim();
  if (!instruction) { alert('Tell Claude what to adjust or write in the box first.'); instructionEl?.focus(); return; }

  const key = getAnthropicKey();
  if (!key) { openAiKeySetup(); return; }

  const ctx = state.actionContext;
  if (!ctx) return;
  const i = ctx.interactionId ? state.interactions.find(x => x.id === ctx.interactionId) : null;
  const co = state.companies.find(c => c.id === ctx.companyId);

  const subjEl = document.getElementById('action-email-subject');
  const bodyEl = document.getElementById('action-email-body');
  const currentSubj = subjEl?.value || '';
  const currentBody = bodyEl?.value || '';

  // Detect language
  const lower = s => (s||'').toLowerCase();
  let isPT;
  if (co?.preferredLanguage === 'PT') isPT = true;
  else if (co?.preferredLanguage === 'EN') isPT = false;
  else isPT = lower(co?.country).includes('portugal') || lower(co?.country) === 'pt';

  const projContext = (i && Array.isArray(i.projectIds)) ? i.projectIds.map(pid => state.projects.find(p => p.id === pid)?.name).filter(Boolean).join(' / ') : '';

  // Recent thread context (last 3 interactions for this company)
  const recentInts = state.interactions.filter(x => x.companyId === co?.id)
    .sort((a,b) => new Date(b.date||0) - new Date(a.date||0))
    .slice(0, 3)
    .map(x => `- ${(x.date||'').slice(0,10)} · ${x.subject||'—'} · KPI=${x.kpi||'—'}${x.summary ? ' · '+x.summary.slice(0,120) : ''}`)
    .join('\n');

  // Build learned style context — user-curated rules + recent edit examples
  const rules = getAiRules().trim();
  const history = getAiHistory().slice(0, 5);
  const fewShotBlock = history.length === 0 ? '' : '\n\nSTYLE LEARNED FROM YOUR RECENT EDITS (use these as examples of how the user writes):\n' +
    history.map((h, idx) => {
      if (h.kind === 'manual_edit_after_ai') {
        return `\n--- Example ${idx+1} (user manually adjusted Claude output) ---\nAI HAD WRITTEN:\n${(h.aiBody||'').slice(0,400)}\n\nUSER FINAL VERSION:\n${(h.finalBody||'').slice(0,400)}`;
      }
      return `\n--- Example ${idx+1} (user instruction → Claude output) ---\nINSTRUCTION: ${h.instruction || ''}\nBEFORE:\n${(h.beforeBody||'').slice(0,300)}\n\nAFTER:\n${(h.afterBody||'').slice(0,400)}`;
    }).join('\n');
  const rulesBlock = rules ? `\n\nUSER STYLE RULES (always follow):\n${rules}` : '';

  const prompt = `You are helping draft an email FROM Mickael Passos (Country Director Portugal & Spain at BOA Hotels, mickael@boahotels.com) TO a counterparty.

COMPANY: ${co?.name || '—'}
WHAT THEY DO: ${co?.focus || '(unknown)'}
LANGUAGE: ${isPT ? 'Portuguese (PT-Portugal)' : 'English'}
${i ? `LATEST INTERACTION: ${i.subject || '—'} (${(i.date||'').slice(0,10)}) · KPI=${i.kpi}` : 'STATUS: first-touch — no prior interactions'}
${projContext ? `PROJECT CONTEXT: ${projContext}` : ''}

RECENT THREAD:
${recentInts || '(none)'}${rulesBlock}${fewShotBlock}

BOA Hotels active pipeline (reference only if relevant):
- Village by BOA (Porto) — operating aparthotel + Brand Expansion programme (10 properties by 2032, €193M capex)
- Kura by BOA — Douro Valley luxury wellness resort, 71 keys + 50 villas, opening Nov 2029 (€9M equity at 50% co-invest, 23-30% levered IRR)
- Madrid Fuencarral 121 — 83-key 4-star operating lease in central Madrid (€6M Y3 revenue, 51% GOP margin)
- Marques Porto — Village by BOA brand, 55-key aparthotel, owner proposal stage with Bairro Lab

CURRENT DRAFT:
SUBJECT: ${currentSubj}

BODY:
${currentBody || '(empty — please draft from scratch)'}

USER INSTRUCTION:
${instruction}

Rules:
- Return the revised email in EXACTLY this format, no preamble, no markdown fences:
SUBJECT: <one-line subject>
BODY:
<email body, ready to send>
- Do NOT include any signature, sign-off name, or BOA Hotels footer — those are appended automatically by Gmail/Mail.
- Keep the language ${isPT ? 'PT-Portugal' : 'English'} consistently.
- Keep it concise and professional. Plain text only (no markdown, no asterisks, no bullets unless they fit naturally).
- If the body is empty, draft from scratch following the user instruction.`;

  // Disable button + show loading state
  const btn = document.getElementById('ai-refine-btn');
  const origLabel = btn ? btn.textContent : '';
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Refining…'; btn.classList.add('opacity-70'); }

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
        'content-type': 'application/json'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 1500,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    if (!res.ok) {
      const txt = await res.text();
      let parsed; try { parsed = JSON.parse(txt); } catch(e) {}
      const msg = parsed?.error?.message || txt.slice(0, 300);
      if (res.status === 401) {
        if (confirm('Anthropic rejected the saved API key (401 · ' + msg + ').\n\nOpen the key setup to paste a valid key?')) {
          openAiKeySetup();
        }
      } else if (res.status === 400 && /credit balance/i.test(msg)) {
        alert('Your Anthropic workspace has no credit balance. Top up at console.anthropic.com → Billing.\n\nDetails: ' + msg);
      } else if (res.status === 400 && /model/i.test(msg)) {
        alert('Model rejected — likely the model name is no longer current. Tell Mickael to update the model id in the source.\n\nDetails: ' + msg);
      } else {
        alert('AI call failed (' + res.status + '): ' + msg);
      }
      return;
    }
    const data = await res.json();
    const text = (data.content && data.content[0] && data.content[0].text) || '';
    // Parse SUBJECT/BODY
    const m = text.match(/SUBJECT:\s*(.+?)\s*\r?\n+BODY:\s*\r?\n([\s\S]+)/);
    let newSubj = currentSubj, newBody = currentBody;
    if (m) {
      newSubj = m[1].trim();
      newBody = m[2].trim();
      if (subjEl) subjEl.value = newSubj;
      if (bodyEl) bodyEl.value = newBody;
    } else {
      // Fallback — Claude didn't follow format; replace body only
      newBody = text.trim();
      if (bodyEl) bodyEl.value = newBody;
    }
    // Log to learning history
    pushAiHistory({
      kind: 'refine',
      companyId: co?.id,
      instruction,
      beforeSubject: currentSubj,
      beforeBody: currentBody,
      afterSubject: newSubj,
      afterBody: newBody
    });
    _lastAiOutput = { subject: newSubj, body: newBody };
    // Refresh the small counter on screen
    const mc = document.getElementById('ai-memory-counter');
    if (mc) mc.textContent = aiMemorySummary();
    // Clear the instruction box after a successful refine
    if (instructionEl) instructionEl.value = '';
  } catch (err) {
    alert('AI call failed: ' + (err.message || err));
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = origLabel; btn.classList.remove('opacity-70'); }
  }
}

async function aiDistillRules() {
  const key = getAnthropicKey();
  if (!key) { openAiKeySetup(); return; }
  const history = getAiHistory();
  if (history.length === 0) { alert('No learning history yet — refine at least one draft first.'); return; }

  const btn = document.getElementById('ai-distill-btn');
  if (btn) { btn.textContent = '⏳ Distilling…'; btn.style.pointerEvents = 'none'; }

  const examples = history.slice(0, 15).map((h, idx) => {
    if (h.kind === 'manual_edit_after_ai') {
      return `Example ${idx+1} (manual edit):\nAI wrote: ${(h.aiBody||'').slice(0,500)}\nUser changed to: ${(h.finalBody||'').slice(0,500)}`;
    }
    return `Example ${idx+1} (refine):\nInstruction: ${h.instruction || ''}\nBefore: ${(h.beforeBody||'').slice(0,300)}\nAfter: ${(h.afterBody||'').slice(0,500)}`;
  }).join('\n\n');

  const currentRules = getAiRules();
  const prompt = `Analyse the following email-drafting edits made by Mickael Passos (BOA Hotels Country Director, Portugal & Spain). Identify recurring patterns and produce a concise list of style rules he seems to prefer.

CURRENT RULES (preserve good ones, merge or improve where the data suggests):
${currentRules || '(none yet)'}

RECENT EDITS:
${examples}

Return ONLY a bulleted list of style rules in plain text (one per line, no numbering, no preamble). Maximum 12 rules. Each rule should be a short imperative sentence. Examples of good rule phrasing:
- Always greet PT contacts with "Olá [Nome]," not "Caro"
- Keep emails under 150 words
- Always propose 2-3 specific time slots for calls
- Never use the words "opportunity" or "synergy"
- Reference the company's focus (what they do) in the opening line

Output the rules now:`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
        'content-type': 'application/json'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 800,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    if (!res.ok) {
      const t = await res.text();
      alert('Distill failed: ' + t.slice(0, 300));
      return;
    }
    const data = await res.json();
    const text = (data.content && data.content[0] && data.content[0].text) || '';
    const ta = document.getElementById('ai-rules-input');
    if (ta) ta.value = text.trim();
  } catch (err) {
    alert('Distill error: ' + (err.message || err));
  } finally {
    if (btn) { btn.textContent = '✦ Distill rules from recent edits'; btn.style.pointerEvents = ''; }
  }
}

function snoozeAction(interactionId, days) {
  const i = state.interactions.find(x => x.id === interactionId);
  if (!i) return;
  const base = i.followUpDate ? new Date(i.followUpDate) : new Date();
  const target = new Date(); target.setDate(target.getDate() + days);
  // Always move forward from today
  i.followUpDate = target.toISOString().slice(0,10);
  state.lastUpdatedByUser = new Date().toISOString();
  if (typeof saveToFile === 'function') saveToFile();
  closeActionContext();
  render();
}

function renderActionListModal() {

  const today = new Date(); today.setHours(0,0,0,0);
  const weekFromNow = new Date(today); weekFromNow.setDate(weekFromNow.getDate() + 7);

  let items = [];
  let title = '';
  let accent = '#b04c32';
  if (bucket === 'overdue') {
    items = state.interactions.filter(i => i.followUpDate && new Date(i.followUpDate) < today && !i.completed)
      .sort((a,b) => new Date(a.followUpDate) - new Date(b.followUpDate));
    title = 'All overdue follow-ups';
  } else if (bucket === 'action_required') {
    items = state.interactions.filter(i => i.kpi === 'action_required' && !i.completed)
      .sort((a,b) => new Date(b.date||0) - new Date(a.date||0));
    title = 'All action-required items';
  } else if (bucket === 'this_week') {
    items = state.interactions.filter(i => {
      if (!i.followUpDate || i.completed) return false;
      const d = new Date(i.followUpDate);
      return d >= today && d <= weekFromNow;
    }).sort((a,b) => new Date(a.followUpDate) - new Date(b.followUpDate));

      </div>
      <div class="overflow-y-auto flex-1">
        ${items.length === 0 ? `<div class="p-10 text-center" style="color: var(--warm);">All clear.</div>` : `
        <table class="w-full text-sm">
          <thead class="border-b sticky top-0 bg-white" style="border-color: var(--line);">
            <tr class="text-xs uppercase tracking-wider" style="color: var(--warm);">
              <th class="text-left px-5 py-3 font-semibold">Company</th>
              <th class="text-left px-5 py-3 font-semibold">Subject</th>
              <th class="text-left px-5 py-3 font-semibold">${bucket==='action_required' ? 'Date' : 'Follow-up'}</th>
              <th class="text-left px-5 py-3 font-semibold w-24">Action</th>

          </thead>
          <tbody>
            ${items.map(i => {
              const co = state.companies.find(c => c.id === i.companyId);
              let dateCell = '';

                const d = Math.floor((today - new Date(i.followUpDate))/86400000);

              <div class="w-8 h-8 rounded-full flex items-center justify-center text-white text-[10px] font-semibold flex-shrink-0" style="background:${avatarColor((ct2.firstName||'')+' '+(ct2.lastName||''))};">${getInitials((ct2.firstName||'')+' '+(ct2.lastName||''))}</div>

// Filter an interaction by focus
function interactionMatchesFocus(i, focus) {
  if (!focus || focus.type === 'all') return true;
  if (focus.type === 'project') return Array.isArray(i.projectIds) && i.projectIds.includes(focus.id);
  if (focus.type === 'company') return i.companyId === focus.id;
  if (focus.type === 'contact') return i.contactId === focus.id;
  if (focus.type === 'text') {
    const q = focus.query.toLowerCase();
    return (i.subject||'').toLowerCase().includes(q) || (i.summary||'').toLowerCase().includes(q) || (i.outcome||'').toLowerCase().includes(q);
  }
  return true;
}

// Filter a company by focus
function companyMatchesFocus(co, focus) {
  if (!focus || focus.type === 'all') return true;
  if (focus.type === 'project') {
    const direct = Array.isArray(co.projectIds) && co.projectIds.includes(focus.id);
    const viaInts = state.interactions.some(i => i.companyId === co.id && Array.isArray(i.projectIds) && i.projectIds.includes(focus.id));
    return direct || viaInts;
  }
  if (focus.type === 'company') return co.id === focus.id;
  if (focus.type === 'contact') {
    const ct = state.contacts.find(c => c.id === focus.id);
    return ct && ct.companyId === co.id;
  }
  if (focus.type === 'text') {
    const q = focus.query.toLowerCase();
    return (co.name||'').toLowerCase().includes(q) || (co.country||'').toLowerCase().includes(q) || (co.focus||'').toLowerCase().includes(q);
  }
  return true;
}

// ============================================================
//  FILE SYSTEM ACCESS
// ============================================================
let fileHandle = null;
let fileName = '';
const FS_SUPPORTED = 'showOpenFilePicker' in window;

function openHandleDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('boa-crm-handles', 1);
    req.onupgradeneeded = () => req.result.createObjectStore('handles');
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function persistHandle(handle) {
  try {
    const db = await openHandleDB();
    const tx = db.transaction('handles', 'readwrite');
    tx.objectStore('handles').put(handle, 'main');
    return new Promise(res => tx.oncomplete = res);
  } catch(e) { console.warn('persistHandle failed', e); }
}

async function loadHandle() {
  try {
    const db = await openHandleDB();
    return new Promise(resolve => {
      const tx = db.transaction('handles', 'readonly');
      const req = tx.objectStore('handles').get('main');
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => resolve(null);
    });
  } catch(e) { return null; }
}

async function clearHandle() {
  try {
    const db = await openHandleDB();
    const tx = db.transaction('handles', 'readwrite');
    tx.objectStore('handles').delete('main');
    return new Promise(res => tx.oncomplete = res);
  } catch(e) {}
}

async function connectFile() {
  if (!FS_SUPPORTED) {
    alert('Your browser does not support direct file access.\nUse Chrome or Edge.\n\nIn the meantime, use Import/Export JSON.');
    return;
  }
  try {
    const [handle] = await window.showOpenFilePicker({
      types: [{ description: 'CRM Data', accept: { 'application/json': ['.json'] } }],
      multiple: false,
      suggestedName: 'boa-crm-data.json'
    });
    fileHandle = handle;
    fileName = handle.name;
    await persistHandle(handle);
    await loadFromFile();
    updateButtons();
  } catch(err) {
    if (err.name !== 'AbortError') alert('Error connecting to file: ' + err.message);
  }
}

async function loadFromFile() {
  if (!fileHandle) return false;
  try {
    const file = await fileHandle.getFile();
    const text = await file.text();
    const data = text.trim() ? JSON.parse(text) : {};
    state.companies = Array.isArray(data.companies) ? data.companies : [];
    state.contacts = Array.isArray(data.contacts) ? data.contacts : [];
    state.interactions = Array.isArray(data.interactions) ? data.interactions : [];
    state.projects = Array.isArray(data.projects) ? data.projects : [];
    state.lastUpdatedByClaudeCode = data.lastUpdatedByClaudeCode || null;
    state.lastUpdatedByUser = data.lastUpdatedByUser || null;
    updateStatus('synced');
    render();
    return true;
  } catch(err) {
    console.error('loadFromFile', err);
    alert('Error reading file: ' + err.message);
    return false;
  }
}

async function saveToFile() {
  if (!fileHandle) {
    saveToStorage();
    return;
  }
  try {
    const perm = await fileHandle.queryPermission({ mode: 'readwrite' });
    if (perm !== 'granted') {
      const newPerm = await fileHandle.requestPermission({ mode: 'readwrite' });
      if (newPerm !== 'granted') throw new Error('No write permission');
    }
    state.lastUpdatedByUser = new Date().toISOString();
    const data = { initialized:true, lastUpdatedByClaudeCode: state.lastUpdatedByClaudeCode, lastUpdatedByUser: state.lastUpdatedByUser, companies:state.companies, contacts:state.contacts, interactions:state.interactions, projects:state.projects };
    const writable = await fileHandle.createWritable();
    await writable.write(JSON.stringify(data, null, 2));
    await writable.close();
    updateStatus('saved');
  } catch(err) {
    console.error('saveToFile', err);
    alert('Error saving: ' + err.message);
    saveToStorage();
  }
}

async function syncFile() {
  if (!fileHandle) { await connectFile(); return; }
  await loadFromFile();
}

async function disconnectFile() {
  if (!confirm('Disconnect from file? You will go back to browser storage.')) return;
  fileHandle = null;
  fileName = '';
  await clearHandle();
  updateButtons();
  updateStatus();
}

function updateButtons() {
  const ids = ['btn-connect','btn-sync','btn-export','btn-share','btn-publish','btn-import'];
  if (READ_ONLY) {
    ids.forEach(id => { const el = document.getElementById(id); if (el) el.style.display = 'none'; });
    return;
  }
  const connected = !!fileHandle;
  const hasData = state.companies.length > 0 || state.contacts.length > 0;
  document.getElementById('btn-connect').style.display = connected ? 'none' : 'flex';
  document.getElementById('btn-sync').style.display = connected ? 'flex' : 'none';
  document.getElementById('btn-export').style.display = hasData ? 'flex' : 'none';
  document.getElementById('btn-share').style.display = hasData ? 'flex' : 'none';
  document.getElementById('btn-publish').style.display = hasData ? 'flex' : 'none';
  document.getElementById('btn-import').style.display = connected ? 'none' : 'flex';
}

// ============================================================
//  PERSISTENCE (localStorage fallback)
// ============================================================
function storageAvailable() {
  try { localStorage.setItem('_test', '1'); localStorage.removeItem('_test'); return true; }
  catch(e) { return false; }
}

function loadFromStorage() {
  if (!storageAvailable()) return false;
  try {
    const saved = localStorage.getItem('boa-crm-data');
    if (saved) {
      const data = JSON.parse(saved);
      state.companies = data.companies || [];
      state.contacts = data.contacts || [];
      state.interactions = data.interactions || [];
      state.projects = data.projects || [];
      state.lastUpdatedByClaudeCode = data.lastUpdatedByClaudeCode || null;
      state.lastUpdatedByUser = data.lastUpdatedByUser || null;
      updateStatus();
      return true;
    }
  } catch(e) { console.warn('loadFromStorage', e); }
  return false;
}

function saveToStorage() {
  if (!storageAvailable()) {
    console.warn('localStorage unavailable (probably opened via data: or in preview). Data will not persist until you connect to a file.');
    updateStatus();
    return;
  }
  try {
    state.lastUpdatedByUser = new Date().toISOString();
    localStorage.setItem('boa-crm-data', JSON.stringify({
      initialized:true, lastUpdatedByClaudeCode: state.lastUpdatedByClaudeCode, lastUpdatedByUser: state.lastUpdatedByUser, companies:state.companies, contacts:state.contacts, interactions:state.interactions, projects:state.projects
    }));
    updateStatus('saved');
  } catch(e) { console.warn('saveToStorage', e); }
}

// Unified save — uses file if connected, else localStorage
async function saveData() {
  if (fileHandle) await saveToFile();
  else saveToStorage();
}

function updateStatus(mode) {
  document.getElementById('badge-companies').textContent = state.companies.length || '';
  document.getElementById('badge-contacts').textContent = state.contacts.length || '';
  document.getElementById('badge-interactions').textContent = state.interactions.length || '';
  const projBadge = document.getElementById('badge-projects');
  if (projBadge) projBadge.textContent = state.projects.length || '';
  // Last-updated timestamps under sidebar
  const ts = document.getElementById('data-timestamps');
  if (ts) {
    const fmt = (iso) => iso ? new Date(iso).toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : '—';
    ts.innerHTML = `
      <div class="flex items-center justify-between gap-2 mb-0.5"><span style="opacity:0.6;">Claude:</span> <span class="num" style="opacity:0.85;">${fmt(state.lastUpdatedByClaudeCode)}</span></div>
      <div class="flex items-center justify-between gap-2"><span style="opacity:0.6;">You:</span> <span class="num" style="opacity:0.85;">${fmt(state.lastUpdatedByUser)}</span></div>
    `;
  }
  const el = document.getElementById('data-status');
  if (!state.companies.length && !state.contacts.length) {
    el.innerHTML = `<div style="color: rgba(226,223,214,0.75);">No data</div><div style="color: rgba(226,223,214,0.4); margin-top: 2px;">${FS_SUPPORTED ? 'Connect to file' : 'Import JSON'}</div>`;
    return;
  }
  const now = new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  let line1, line2;
  if (fileHandle) {
    line1 = `<span style="color: rgba(226,223,214,0.85);">📄 ${esc(fileName)}</span>`;
    line2 = mode === 'saved' ? `<span style="color: rgba(226,223,214,0.5);">✓ Saved · ${now}</span>`
          : mode === 'synced' ? `<span style="color: rgba(226,223,214,0.5);">↻ Synced · ${now}</span>`
          : `<span style="color: rgba(226,223,214,0.4);">${state.companies.length + state.contacts.length + state.interactions.length} records</span>`;
  } else {
    line1 = `<span style="color: rgba(226,223,214,0.55);">Browser (localStorage)</span>`;
    line2 = mode === 'saved' ? `<span style="color: rgba(226,223,214,0.5);">✓ Saved · ${now}</span>`
          : `<span style="color: rgba(226,223,214,0.4);">${state.companies.length + state.contacts.length + state.interactions.length} records</span>`;
  }
  el.innerHTML = `<div>${line1}</div><div style="margin-top: 2px;" class="num">${line2}</div>`;
}

function importJSON(event) {
  const input = event.target;
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onerror = () => alert('Error reading file: ' + reader.error);
  reader.onload = async (e) => {
    let data;
    try {
      data = JSON.parse(e.target.result);
    } catch(err) {
      console.error('[importJSON] JSON parse failed:', err);
      alert('Invalid JSON: ' + err.message);
      return;
    }
    try {
      state.companies = Array.isArray(data.companies) ? data.companies : [];
      state.contacts = Array.isArray(data.contacts) ? data.contacts : [];
      state.interactions = Array.isArray(data.interactions) ? data.interactions : [];
      state.projects = Array.isArray(data.projects) ? data.projects : [];
    } catch(err) {
      console.error('[importJSON] state assign failed:', err);
      alert('Unexpected JSON structure: ' + err.message);
      return;
    }
    try {
      await saveData();
    } catch(err) {
      console.error('[importJSON] save failed:', err);
      alert('Error saving: ' + err.message);
    }
    try {
      render();
    } catch(err) {
      console.error('[importJSON] render failed:', err);
      alert('Error rendering interface: ' + err.message + '\n\nCheck the console (F12).');
      return;
    }
    input.value = '';
  };
  reader.readAsText(file);
}

function exportJSON() {
  const data = { initialized:true, companies:state.companies, contacts:state.contacts, interactions:state.interactions };
  const blob = new Blob([JSON.stringify(data,null,2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `boa-crm-export-${new Date().toISOString().slice(0,10)}.json`; a.click();
  URL.revokeObjectURL(url);
}

function getPublishConfig() {
  try {
    const raw = localStorage.getItem('boa-crm-publish');
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

function getSelfHtml() {
  // Clone the document so we don't mutate live UI
  const clone = document.documentElement.cloneNode(true);

  // Clear dynamic content in clone (will be re-rendered on load in the share file)
  ['dashboard','companies','contacts','interactions'].forEach(v => {
    const el = clone.querySelector('#view-' + v);
    if (el) el.innerHTML = '';
  });
  clone.querySelectorAll('[id^="badge-"]').forEach(el => el.textContent = '');
  const status = clone.querySelector('#data-status');
  if (status) status.innerHTML = '';

  // Reset modal state
  const modal = clone.querySelector('#modal-overlay');
  if (modal) modal.className = 'modal-overlay';

  // Remove dynamically-added banners or password gate from clone
  ['password-gate'].forEach(id => clone.querySelector('#'+id)?.remove());
  clone.querySelectorAll('body > div.fixed').forEach(el => el.remove());

  return '<!DOCTYPE html>\n' + clone.outerHTML;
}

async function buildShareHtml(encryptWithPassword) {
  // Try fetch first (works when served via http); fall back to DOM serialization (works on file://)
  let html;
  try {
    const res = await fetch(window.location.href, { cache: 'no-store' });
    if (!res.ok) throw new Error('fetch not ok');
    html = await res.text();
  } catch(e) {
    html = getSelfHtml();
  }

  const data = { companies: state.companies, contacts: state.contacts, interactions: state.interactions, projects: state.projects, lastUpdatedByClaudeCode: state.lastUpdatedByClaudeCode, lastUpdatedByUser: state.lastUpdatedByUser };

  if (encryptWithPassword) {
    const encrypted = await encryptPayload(data, encryptWithPassword);
    const payload = JSON.stringify(encrypted).replace(/<\/script>/gi, '<\\/script>');
    html = html.replace(
      /const ENCRYPTED_DATA = null; \/\*__ENCRYPTED_DATA__\*\//,
      `const ENCRYPTED_DATA = ${payload}; /*__ENCRYPTED_DATA__*/`
    );
  } else {
    const payload = JSON.stringify(data).replace(/<\/script>/gi, '<\\/script>');
    html = html.replace(
      /const SHARED_DATA = null; \/\*__SHARED_DATA__\*\//,
      `const SHARED_DATA = ${payload}; /*__SHARED_DATA__*/`
    );
  }
  return html;
}

function utf8ToBase64(str) {
  // Handle UTF-8 properly (btoa fails on non-ASCII)
  return btoa(unescape(encodeURIComponent(str)));
}

async function publishToWeb() {
  const cfg = getPublishConfig();
  if (!cfg || !cfg.owner || !cfg.repo || !cfg.token || !cfg.viewerPassword) {
    openPublishSettings();
    return;
  }
  const btn = document.getElementById('btn-publish');
  const originalHtml = btn.innerHTML;
  btn.innerHTML = '<svg width="18" height="18" class="animate-spin" fill="none" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" stroke-dasharray="40 60"/></svg> Publishing…';
  btn.style.pointerEvents = 'none';

  try {
    const html = await buildShareHtml(cfg.viewerPassword);
    const path = 'index.html';
    const apiUrl = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${path}`;
    const headers = {
      'Authorization': `Bearer ${cfg.token}`,
      'Accept': 'application/vnd.github+json',
      'Content-Type': 'application/json'
    };

    // Get current SHA if file exists
    let sha = null;
    try {
      const existing = await fetch(apiUrl, { headers });
      if (existing.ok) {
        const j = await existing.json();
        sha = j.sha;
      }
    } catch(e) {}

    const body = {
      message: `Update CRM snapshot · ${new Date().toISOString()}`,
      content: utf8ToBase64(html),
      branch: cfg.branch || 'main'
    };
    if (sha) body.sha = sha;

    const resp = await fetch(apiUrl, {
      method: 'PUT',
      headers,
      body: JSON.stringify(body)
    });

    if (!resp.ok) {
      const errBody = await resp.text();
      throw new Error(`GitHub returned ${resp.status}: ${errBody.slice(0, 300)}`);
    }

    const publicUrl = `https://${cfg.owner}.github.io/${cfg.repo}/`;
    cfg.lastPublishedAt = new Date().toISOString();
    cfg.url = publicUrl;
    savePublishConfig(cfg);

    showPublishSuccess(publicUrl);
  } catch(err) {
    console.error('publishToWeb', err);
    alert('Publish failed:\n\n' + err.message + '\n\nCheck your token has "repo" scope and the repo exists.');
  } finally {
    btn.innerHTML = originalHtml;
    btn.style.pointerEvents = '';
  }
}

async function generateShareFile() {
  if (!state.companies.length && !state.contacts.length) {
    alert('No data to share yet.');
    return;
  }
  try {
    // Get the current HTML source (we need a copy of THIS file)
    const res = await fetch(window.location.href);
    let html = await res.text();
    // Inject the data
    const data = { companies: state.companies, contacts: state.contacts, interactions: state.interactions, projects: state.projects, lastUpdatedByClaudeCode: state.lastUpdatedByClaudeCode, lastUpdatedByUser: state.lastUpdatedByUser };
    const payload = JSON.stringify(data).replace(/<\/script>/gi, '<\\/script>');
    html = html.replace(
      /const SHARED_DATA = null; \/\*__SHARED_DATA__\*\//,
      `const SHARED_DATA = ${payload}; /*__SHARED_DATA__*/`
    );
    // Download
    const blob = new Blob([html], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `boa-crm-share-${new Date().toISOString().slice(0,10)}.html`;
    a.click();
    URL.revokeObjectURL(url);
  } catch(err) {
    console.error(err);
    alert('Could not generate share file: ' + err.message + '\n\nThe HTML must be opened from disk (not preview) to enable this feature.');
  }
}

function setView(view) {
  // Re-clicking the nav while already on the same view resets any open detail page (back to list).
  // Switching from another view to one with a detail id preserves the detail.
  if (state.currentView === view) {
    if (view === 'projects' && state.projectDetailId) state.projectDetailId = null;
    if (view === 'companies' && state.companyDetailId) state.companyDetailId = null;
  }
  state.currentView = view;
  ['dashboard','companies','contacts','interactions','projects'].forEach(v => {
    document.getElementById('view-'+v).classList.toggle('hidden', v !== view);
    document.getElementById('nav-'+v).classList.toggle('active', v === view);
  });
  render();
}

function render() {
  // Preserve focus + cursor of any focused input/textarea before innerHTML wipes it
  const active = document.activeElement;
  let focusId = null, cursorStart = null, cursorEnd = null;
  if (active && active.id && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA')) {
    focusId = active.id;
    try { cursorStart = active.selectionStart; cursorEnd = active.selectionEnd; } catch(e) {}
  }

  if (state.currentView === 'dashboard') renderDashboard();
  else if (state.currentView === 'companies') renderCompanies();
  else if (state.currentView === 'contacts') renderContacts();
  else if (state.currentView === 'interactions') renderInteractions();
  else if (state.currentView === 'projects') renderProjects();

  // Restore focus to the same element by id, putting cursor back where it was
  if (focusId) {
    const newEl = document.getElementById(focusId);
    if (newEl) {
      newEl.focus();
      if (cursorStart != null && typeof newEl.setSelectionRange === 'function') {
        try { newEl.setSelectionRange(cursorStart, cursorEnd ?? cursorStart); } catch(e) {}
      }
    }
  }
}

// Three-tier status: Active (engaged) / Watching (relevant to BOA but no current deal) / Not Active (out)
// Override wins; otherwise inferred from the latest interaction's KPI with project context.
function getStatus(co) {
  if (co.statusOverride === 'active' || co.statusOverride === 'watching' || co.statusOverride === 'inactive') return co.statusOverride;
  const list = state.interactions.filter(i => i.companyId === co.id);
  if (!list.length) return 'inactive';
  const latest = list.slice().sort((a,b) => new Date(b.date||0) - new Date(a.date||0))[0];
  if (INACTIVE_KPIS.has(latest.kpi)) {
    // Project-specific "not interested" → company stays Watching (they passed on THIS project,
    // but could still fit another). General "not interested" with no project tagged → Not Active.
    if (latest.kpi === 'not_interested' && Array.isArray(latest.projectIds) && latest.projectIds.length > 0) {
      return 'watching';
    }
    return 'inactive';
  }
  // Auto-promote to "Watching" when the most recent interaction is in Monitoring mode —
  // that's the natural signal that the company is on our radar but no live deal.
  if (latest.kpi === 'monitoring') return 'watching';
  return 'active';
}

function fmtDate(iso) { if (!iso) return '—'; try { return new Date(iso).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); } catch(e){ return iso; } }
function fmtDateShort(iso) { if (!iso) return '—'; try { return new Date(iso).toLocaleDateString('en-GB',{day:'2-digit',month:'short'}); } catch(e){ return iso; } }
function relTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso); const diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return `${Math.floor(diff/60)} min ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)} h ago`;
  if (diff < 604800) return `${Math.floor(diff/86400)} d ago`;
  return fmtDate(iso);
}

function renderDashboard() {
  // Apply dashboard focus filter to base sets used by dashboard sections
  const focus = state.dashboardFocus || { type: 'all', id: null, label: '', query: '' };
  const focusActive = focus.type !== 'all';
  const fInteractions = focusActive ? state.interactions.filter(i => interactionMatchesFocus(i, focus)) : state.interactions;
  const fCompanies = focusActive ? state.companies.filter(c => companyMatchesFocus(c, focus)) : state.companies;
  const focusCompanyIds = new Set(fCompanies.map(c => c.id));

  const total = fCompanies.length;
  const investors = fCompanies.filter(c => c.type === 'investor').length;
  const connectors = fCompanies.filter(c => c.type === 'connector').length;
  const others     = fCompanies.filter(c => c.type === 'other').length;

  const activeCount = fCompanies.filter(c => getStatus(c) === 'active').length;
  const watchingCount = fCompanies.filter(c => getStatus(c) === 'watching').length;
  const inactiveCount = total - activeCount - watchingCount;
  // Active investors / connectors breakdown
  const activeInv = fCompanies.filter(c => c.type === 'investor' && getStatus(c) === 'active').length;
  const activeConn = fCompanies.filter(c => c.type === 'connector' && getStatus(c) === 'active').length;

  const pending = state.interactions.filter(i => i.kpi === 'action_required' && !i.completed).length;

  const now = new Date();
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
  const thisMonth = state.interactions.filter(i => i.date && new Date(i.date) >= monthStart).length;
  const lastMonthStart = new Date(now.getFullYear(), now.getMonth()-1, 1);
  const lastMonth = state.interactions.filter(i => i.date && new Date(i.date) >= lastMonthStart && new Date(i.date) < monthStart).length;
  const monthDelta = lastMonth ? Math.round(((thisMonth - lastMonth) / lastMonth) * 100) : null;

  const recent = [...fInteractions].sort((a,b) => new Date(b.date||0) - new Date(a.date||0)).slice(0, 6);
  // Active prospects (was Hot Prospects): companies with status=active, sorted by latest activity (most recent first)
  // Honour dashboard focus by limiting to fCompanies
  const activeProspects = fCompanies
    .filter(c => getStatus(c) === 'active')
    .map(c => {
      const list = state.interactions.filter(i => i.companyId === c.id);
      const latest = list.slice().sort((a,b) => new Date(b.date||0) - new Date(a.date||0))[0];
      return { c, latest };
    })
    .filter(x => x.latest)
    .sort((a,b) => new Date(b.latest.date||0) - new Date(a.latest.date||0))
    .slice(0, 6)
    .map(x => x.c);
  const hotCompanies = activeProspects; // legacy alias

  // Category distribution
  const byCat = {};
  state.companies.forEach(c => { if (c.category) byCat[c.category] = (byCat[c.category]||0) + 1; });
  const cats = Object.entries(byCat).sort((a,b) => b[1]-a[1]).slice(0, 7);
  const maxCat = cats.length ? cats[0][1] : 1;

  // === Action items ===
  const todayDate = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const weekFromNow = new Date(todayDate); weekFromNow.setDate(weekFromNow.getDate() + 7);
  const thirtyDaysAgo = new Date(todayDate); thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);

  const overdue = fInteractions.filter(i =>
    i.followUpDate && new Date(i.followUpDate) < todayDate && !i.completed
  ).sort((a,b) => new Date(a.followUpDate) - new Date(b.followUpDate));

  const thisWeek = fInteractions.filter(i => {
    if (!i.followUpDate || i.completed) return false;
    const d = new Date(i.followUpDate);
    return d >= todayDate && d <= weekFromNow;
  }).sort((a,b) => new Date(a.followUpDate) - new Date(b.followUpDate));

  const actionReq = fInteractions.filter(i =>
    i.kpi === 'action_required' && !i.completed
  ).sort((a,b) => new Date(b.date||0) - new Date(a.date||0));

  const empty = total === 0;

  const actionItemCard = (label, bucket, count, items, renderItem, accentColor) => `
    <div class="card p-5">
      <div class="flex items-baseline justify-between mb-3">
        <div class="flex items-center gap-2">
          <span style="width:8px;height:8px;border-radius:50%;display:inline-block;background:${accentColor};"></span>
          <h3 class="text-[10px] uppercase tracking-[0.18em] font-semibold" style="color: var(--warm);">${label}</h3>
        </div>
        <span class="font-display text-2xl font-medium num" style="color: ${count > 0 ? accentColor : 'var(--warm)'};">${count}</span>
      </div>
      ${count === 0
        ? `<div class="text-xs py-4 text-center" style="color: var(--warm); opacity: 0.6;">All clear</div>`
        : `<div class="space-y-2">
            ${items.slice(0, 4).map(renderItem).join('')}
            ${count > 4 ? `<button onclick="openActionList('${bucket}')" class="text-[11px] pt-1 hover:underline" style="color: ${accentColor}; cursor:pointer;">+ ${count - 4} more →</button>` : ''}
          </div>`}
    </div>
  `;

  const renderInteractionItem = (i, label, bucket) => {
    const co = state.companies.find(c => c.id === i.companyId);
    return `<div class="cursor-pointer py-1.5 px-2 -mx-2 rounded row-hover" onclick="openActionItem('${esc(i.id)}','${bucket}')">
      <div class="text-xs font-medium truncate" style="color: var(--ink);">${esc(co?co.name:'—')}</div>
      <div class="text-[11px] truncate" style="color: var(--warm);">${esc(i.subject || '')}</div>
      ${label ? `<div class="text-[10px] num mt-0.5" style="color: ${label.color};">${esc(label.text)}</div>` : ''}
    </div>`;
  };

  // === Smart digest items ===
  const digestParts = [];
  if (overdue.length > 0) digestParts.push(`<span style="color:#a04330;"><span class="num font-semibold">${overdue.length}</span> overdue</span>`);
  if (actionReq.length > 0) digestParts.push(`<span style="color:#a04330;"><span class="num font-semibold">${actionReq.length}</span> action required</span>`);
  if (thisWeek.length > 0) digestParts.push(`<span style="color:#7a5c3c;"><span class="num font-semibold">${thisWeek.length}</span> due this week</span>`);
  const activeProjects = state.projects.filter(p => p.status === 'active' || !p.status).length;
  if (activeProjects > 0) digestParts.push(`<span style="color:var(--green);"><span class="num font-semibold">${activeProjects}</span> active projects</span>`);

  // === Performance lens: investor funnel (by company count) + movement (this month) ===
  const investorsList = fCompanies.filter(c => c.type === 'investor');
  const _coRank = (coId) => {
    const list = state.interactions.filter(i => i.companyId === coId);
    if (!list.length) return 0;
    let r = 1; // contacted
    list.forEach(i => {
      if (i.kpi === 'in_conversation') r = Math.max(r, 3);
      else if (i.kpi === 'info_sent' || i.kpi === 'action_required' || i.kpi === 'monitoring') r = Math.max(r, 2);
    });
    return r;
  };
  const fnTotal = investorsList.length;
  const fnContacted = investorsList.filter(c => _coRank(c.id) >= 1).length;
  const fnEngaged = investorsList.filter(c => _coRank(c.id) >= 2).length;
  const fnConv = investorsList.filter(c => _coRank(c.id) >= 3).length;
  const fnWatching = investorsList.filter(c => getStatus(c) === 'watching').length;
  const fnDeclined = investorsList.filter(c => getStatus(c) === 'inactive' && state.interactions.some(i => i.companyId === c.id)).length;
  const pctOf = (a,b) => b > 0 ? Math.round((a/b)*100) : 0;
  const _firstTouch = (coId) => { const ds = state.interactions.filter(i => i.companyId===coId && i.date).map(i => new Date(i.date)).sort((a,b)=>a-b); return ds[0]; };
  const mvNewCompanies = fCompanies.filter(c => c.createdAt && new Date(c.createdAt) >= monthStart).length;
  const mvNewTouches = fCompanies.filter(c => { const f=_firstTouch(c.id); return f && f >= monthStart; }).length;
  const mvAdvanced = fCompanies.filter(c => state.interactions.some(i => i.companyId===c.id && i.kpi==='in_conversation' && i.date && new Date(i.date) >= monthStart)).length;
  const mvCooled = fCompanies.filter(c => { const list = state.interactions.filter(i => i.companyId===c.id); if(!list.length) return false; const latest = list.slice().sort((a,b)=>new Date(b.date||0)-new Date(a.date||0))[0]; return (latest.kpi==='monitoring'||latest.kpi==='not_interested') && latest.date && new Date(latest.date) >= monthStart; }).length;

  document.getElementById('view-dashboard').innerHTML = `
    <div class="max-w-7xl mx-auto">
      <div class="flex items-end justify-between mb-4">
        <div>
          <div class="text-[11px] uppercase tracking-widest font-semibold mb-1" style="color: var(--green);">${focusActive ? `Focused — ${focus.type.toUpperCase()}` : 'Overview'}</div>
          <h1 class="font-display text-4xl font-semibold tracking-tight" style="color: var(--ink);">${focusActive ? esc(focus.label) : 'Dashboard'}</h1>
        </div>
        <div class="text-sm text-slate-500">${new Date().toLocaleDateString('en-GB',{weekday:'long', day:'numeric', month:'long', year:'numeric'})}</div>
      </div>

      <div class="flex items-center gap-2 mb-4">

          <input type="text" id="dashboard-search" value="${esc(focus.query||'')}" placeholder="Focus on a project, company, contact or keyword..." oninput="onDashboardSearchInput(this.value)" onkeydown="if(event.key==='Enter'){event.preventDefault(); applyDashboardSearch(this.value);} if(event.key==='Escape'){this.value=''; clearDashboardFocus();}" autocomplete="off" class="w-full pl-10 pr-3 py-2.5 border rounded-lg text-sm bg-white" style="border-color: var(--line);">

        ${focusActive ? '<button onclick="clearDashboardFocus()" class="ghost-btn px-3 py-2 text-xs rounded-lg font-medium">Clear filter</button>' : ''}

      ${focusActive ? '<div class="card p-4 mb-4" style="background: var(--paper-soft); border-color: var(--line-soft);">'+renderFocusCard(focus)+'</div>' : ''}
      ${focusActive ? renderFocusedDashboard(focus) : `
      ${digestParts.length > 0 && !empty ? `
      <div class="text-sm mb-8 flex items-center gap-3 flex-wrap" style="color: var(--warm);">
        ${digestParts.join(`<span style="opacity:0.4;">·</span>`)}
      </div>
      ` : '<div class="mb-8"></div>'}
