function renderProjects() {
  // Route to detail page if a project is selected
  if (state.projectDetailId) {
    const p = state.projects.find(x => x.id === state.projectDetailId);
    if (!p) { state.projectDetailId = null; }
    else { renderProjectDetail(p); return; }
  }

  const f = state.projectFilter;
  const filtered = state.projects.filter(p => {
    if (f.search && !p.name.toLowerCase().includes(f.search.toLowerCase()) &&
        !(p.location||'').toLowerCase().includes(f.search.toLowerCase())) return false;
    if (f.status) {
      const ps = p.status || 'active';
      const normalized = (ps === 'on_hold' || ps === 'won' || ps === 'lost') ? 'not_active' : ps;
      if (normalized !== f.status) return false;
    }
    return true;
  });

  document.getElementById('view-projects').innerHTML = `
    <div class="max-w-7xl mx-auto">
      <div class="flex items-end justify-between mb-8">
        <div>
          <div class="text-[11px] uppercase tracking-widest font-semibold mb-1" style="color: var(--green);">Pipeline</div>
          <h1 class="font-display text-4xl font-semibold tracking-tight">Projects <span class="text-slate-300 num">${filtered.length}</span></h1>
        </div>
        <button onclick="openNewModal('project')" class="gold-btn px-4 py-2.5 text-sm rounded-lg font-semibold shadow-sm inline-flex items-center gap-2">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
          New Project
        </button>
      </div>

      <div class="card p-4 mb-4 flex flex-wrap gap-2">
        <div class="relative flex-1 min-w-64">
          <svg class="absolute left-3 top-2.5 text-slate-400" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11a6 6 0 11-12 0 6 6 0 0112 0z"/></svg>
          <input id="search-projects" type="text" placeholder="Search project or location…" value="${esc(f.search)}"
            oninput="state.projectFilter.search=this.value; render()"
            class="w-full pl-9 pr-3 py-2 border rounded-lg text-sm" style="border-color: var(--line);">
        </div>
        <select onchange="state.projectFilter.status=this.value; renderProjects()" class="px-3 py-2 border rounded-lg text-sm" style="border-color: var(--line);">
          <option value="">All statuses</option>
          <option value="active" ${f.status==='active'?'selected':''}>Active</option>
          <option value="not_active" ${f.status==='not_active'?'selected':''}>Not Active</option>
        </select>
      </div>

      ${filtered.length === 0
        ? `<div class="card p-16 text-center">
            <div class="text-slate-400 mb-4">No projects yet</div>
            <button onclick="openNewModal('project')" class="gold-btn px-4 py-2 text-sm rounded-lg font-semibold">Create your first project</button>
          </div>`
        : `<div class="grid grid-cols-2 gap-4">
            ${filtered.map(p => {
              const s = projectStats(p);
              const status = p.status || 'active';
              const expanded = isInlineEditing('project', p.id);
              return `<div class="card ${expanded ? 'col-span-2' : ''}">
                <div class="p-5 cursor-pointer transition-shadow hover:shadow-md ${expanded ? '' : ''}" onclick="openEditInline('project','${esc(p.id)}')" style="${expanded?'background: var(--paper-soft);':''}">
                  <div class="flex items-start justify-between mb-3">
                    <div class="flex-1 min-w-0">
                      <div class="flex items-center gap-2 flex-wrap mb-1">
                        <svg class="flex-shrink-0" width="11" height="11" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" style="color: var(--warm); transform: rotate(${expanded?90:0}deg); transition: transform 0.15s;"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
                        <h3 class="font-display text-xl font-medium" style="color: var(--ink);">${esc(p.name)}</h3>
                        ${(() => {
                          const pCol = PROJECT_STATUS[status] || PROJECT_STATUS.active;
                          return `<select onchange="event.stopPropagation();updateProjectField('${esc(p.id)}','status',this.value)" onclick="event.stopPropagation()" class="pill-select" style="background-color:${pCol.bg}; color:${pCol.fg}; border:1px solid ${pCol.d}33;">
                            <option value="active" ${status==='active'?'selected':''}>Active</option>
                            <option value="not_active" ${status==='not_active'?'selected':''}>Not Active</option>
                          </select>`;
                        })()}
                      </div>
                      <div class="text-xs" style="color: var(--warm);">
                        ${p.location ? esc(p.location) + ' · ' : ''}${p.type ? esc(p.type) + ' · ' : ''}${p.keys ? p.keys + ' keys · ' : ''}${fmtEUR(p.targetAmount)}
                      </div>
                    </div>
                    <button onclick="event.stopPropagation();openProjectDetail('${esc(p.id)}')"
                      class="text-xs px-2 py-1 rounded border hover:bg-gray-100" style="color: var(--warm); border-color: var(--line);">Open</button>
                  </div>

                  <div class="flex items-center gap-4 text-xs pt-3 border-t" style="color: var(--warm); border-color: var(--line-soft);">
                    <span><span class="num font-semibold" style="color: var(--ink);">${s.companyIds.length}</span> companies</span>
                    <span><span class="num font-semibold" style="color: var(--ink);">${s.interactions.length}</span> interactions</span>
                    ${s.pending > 0 ? `<span style="color: #a04330;"><span class="num font-semibold">${s.pending}</span> pending</span>` : ''}
                    <span class="ml-auto">${s.latest ? 'latest ' + fmtDate(s.latest.date) : 'no activity'}</span>
                  </div>
                </div>
                ${expanded ? renderInlineEditForm('project', p, { title: p.name }) : ''}
              </div>`;
            }).join('')}
          </div>`}
    </div>
  `;
}

// ============================================================
//  MODAL
// ============================================================
// ============================================================
//  INLINE EDIT — expands the row into a drawer instead of opening the centered modal
// ============================================================
function openEditInline(type, id) {
  if (READ_ONLY) return;
  if (state.editingType === type && state.editingId === id) {
    // Toggle off if already open
    state.editingType = null; state.editingId = null; state.isNew = false;
  } else {
    state.editingType = type; state.editingId = id; state.isNew = false;
  }
  render();
  setTimeout(() => {
    const el = document.querySelector('.inline-edit-drawer');
    if (el) el.scrollIntoView({ behavior:'smooth', block:'nearest' });
  }, 30);
}
function closeEditInline() {
  state.editingType = null; state.editingId = null; state.isNew = false;
  render();
}
function isInlineEditing(type, id) {
  return state.editingType === type && state.editingId === id && !state.isNew;
}
// Render the inline edit form for a single item. Reuses fieldInput() so the
// shared saveChanges()/deleteCurrentItem() logic works (it reads from f-* DOM ids).
function renderInlineEditForm(type, item, opts) {
  opts = opts || {};
  const fields = FIELDS[type];
  const groups = {};
  fields.forEach(f => { (groups[f.group||'X'] = groups[f.group||'X'] || []).push(f); });
  const groupLabels = { A:'Identity', B:'Profile', C:'Status & notes', X:'Other' };
  const groupHtml = Object.entries(groups).map(([gname, glist], idx) => {
    const fieldsHtml = glist.map(f => fieldInput(f, item)).join('');
    const grid = glist.length > 1 && glist.every(f => f.type !== 'textarea') ? 'grid-cols-2' : 'grid-cols-1';
    return `
      <div class="${idx > 0 ? 'pt-5 mt-5 border-t' : ''}" style="border-color: var(--line-soft);">
        <div class="text-[10px] uppercase tracking-[0.18em] font-semibold mb-3" style="color: var(--green);">${esc(groupLabels[gname] || gname)}</div>
        <div class="grid ${grid} gap-4">${fieldsHtml}</div>
      </div>`;
  }).join('');

  const titleEyebrow = { company:'Edit Company', contact:'Edit Contact', interaction:'Edit Interaction', project:'Edit Project' }[type] || 'Edit';
  return `
  <div class="inline-edit-drawer" style="background: var(--cream); border-top: 1px solid var(--line); border-left: 4px solid var(--green); padding: 24px 28px;" onclick="event.stopPropagation()">
    <div class="flex items-center justify-between mb-5 pb-4 border-b" style="border-color: var(--line-soft);">
      <div>
        <div class="text-[10px] uppercase tracking-[0.18em] font-semibold mb-0.5" style="color: var(--green);">${esc(titleEyebrow)}</div>
        <div class="font-display text-xl font-medium" style="color: var(--ink); letter-spacing: -0.01em;">${esc(opts.title || '')}</div>
      </div>
      <button onclick="closeEditInline()" class="text-xl w-9 h-9 flex items-center justify-center rounded-full transition" style="color: var(--warm); background: transparent;" onmouseover="this.style.background='var(--paper-soft)'; this.style.color='var(--ink)';" onmouseout="this.style.background='transparent'; this.style.color='var(--warm)';" title="Close">&times;</button>
    </div>
    <div>${groupHtml}</div>
    <div class="flex items-center justify-between mt-6 pt-4 border-t" style="border-color: var(--line-soft);">
      <button onclick="deleteCurrentItem()" class="text-sm font-medium px-3 py-2 rounded-lg transition" style="color:#a04330; background: transparent;" onmouseover="this.style.background='rgba(176,76,50,0.08)';" onmouseout="this.style.background='transparent';">Delete</button>
      <div class="flex gap-2">
        <button onclick="closeEditInline()" class="ghost-btn px-4 py-2 text-sm rounded-lg font-medium">Cancel</button>
        <button onclick="saveChanges()" class="gold-btn px-5 py-2 text-sm rounded-lg font-semibold shadow-sm">Save Changes</button>
      </div>
    </div>
  </div>`;
}

function openEditModal(type, id) {
  if (READ_ONLY) return;
  const arr = getArray(type);
  const item = arr.find(x => x.id === id);
  if (!item) return;
  state.editingType = type; state.editingId = id; state.isNew = false;
  const labels = { company:['Company','Edit Company'], contact:['Contact','Edit Contact'], interaction:['Interaction','Edit Interaction'], project:['Project','Edit Project'] };
  document.getElementById('modal-eyebrow').textContent = labels[type][0];
  document.getElementById('modal-title').textContent = state.isNew ? labels[type][1].replace('Edit','New') : (item.name || ((item.firstName||'')+' '+(item.lastName||'')).trim() || item.subject || labels[type][1]);
  document.getElementById('modal-delete-btn').style.display = '';
  renderModalBody(type, item);
  document.getElementById('modal-overlay').classList.add('active');
}

function openNewModal(type, prefill) {
  if (READ_ONLY) return;
  state.editingType = type; state.editingId = null; state.isNew = true;
  const labels = { company:['Company','New Company'], contact:['Contact','New Contact'], interaction:['Interaction','New Interaction'], project:['Project','New Project'] };
  document.getElementById('modal-eyebrow').textContent = labels[type][0];
  document.getElementById('modal-title').textContent = labels[type][1];
  document.getElementById('modal-delete-btn').style.display = 'none';
  renderModalBody(type, prefill || {});
  document.getElementById('modal-overlay').classList.add('active');
}

function renderModalBody(type, item) {
  const fields = FIELDS[type];
  const groups = {};
  fields.forEach(f => { (groups[f.group||'X'] = groups[f.group||'X'] || []).push(f); });
  const groupLabels = { A:'Identity', B:'Profile', C:'Status & notes', X:'Other' };

  const groupHtml = Object.entries(groups).map(([gname, glist], idx) => {
    const fieldsHtml = glist.map(f => fieldInput(f, item)).join('');
    const grid = glist.length > 1 && glist.every(f => f.type !== 'textarea') ? 'grid-cols-2' : 'grid-cols-1';
    return `
      <div class="${idx > 0 ? 'pt-5 mt-5 border-t' : ''}" style="border-color: var(--line-soft);">
        <div class="text-[10px] uppercase tracking-[0.18em] font-semibold mb-3" style="color: var(--green);">${esc(groupLabels[gname] || gname)}</div>
        <div class="grid ${grid} gap-4">${fieldsHtml}</div>
      </div>`;
  }).join('');

  document.getElementById('modal-body').innerHTML = groupHtml;
}

function fieldInput(f, item) {
  const val = item[f.key] != null ? item[f.key] : '';
  const base = `w-full px-3 py-2 border rounded-lg text-sm`;
  const borderStyle = `style="border-color: var(--line);"`;
  let input;

  const ph = f.placeholder ? ` placeholder="${esc(f.placeholder)}"` : '';
  if (f.type === 'textarea') {
    input = `<textarea id="f-${f.key}" rows="3" class="${base}" ${borderStyle}${ph}>${esc(val)}</textarea>`;
  } else if (f.type === 'select') {
    input = `<select id="f-${f.key}" class="${base}" ${borderStyle}>${f.options.map(o => `<option value="${esc(o.v)}" ${val===o.v?'selected':''}>${esc(o.l)}</option>`).join('')}</select>`;
  } else if (f.type === 'company-select') {
    input = `<select id="f-${f.key}" onchange="refreshContactSelect()" class="${base}" ${borderStyle}>
      <option value="">— Select —</option>
      ${state.companies.slice().sort((a,b)=>a.name.localeCompare(b.name)).map(c => `<option value="${esc(c.id)}" ${val===c.id?'selected':''}>${esc(c.name)}</option>`).join('')}
    </select>`;
  } else if (f.type === 'contact-select') {
    const opts = contactsForCompany(item.companyId || '');
    input = `<select id="f-${f.key}" class="${base}" ${borderStyle}>
      <option value="">— Select —</option>
      ${opts.map(c => `<option value="${esc(c.id)}" ${val===c.id?'selected':''}>${esc(c.firstName+' '+c.lastName)}</option>`).join('')}
    </select>`;
  } else if (f.type === 'project-multi') {
    const selected = Array.isArray(val) ? val : (val ? [val] : []);
    const sorted = state.projects.slice().sort((a,b) => a.name.localeCompare(b.name));
    // For companies: also detect projects that arrive via this company's interactions
    // (the user can't uncheck those from the company-level field because they live on interactions)
    let viaInteractionsHtml = '';
    if (state.editingType === 'company' && item && item.id) {
      const intProjIds = state.interactions
        .filter(i => i.companyId === item.id && Array.isArray(i.projectIds))
        .flatMap(i => i.projectIds);
      const viaIntsOnly = [...new Set(intProjIds)].filter(pid => !selected.includes(pid));
      if (viaIntsOnly.length > 0) {
        viaInteractionsHtml = `
          <div class="mt-2 p-2 rounded" style="background: var(--paper-soft); border: 1px solid var(--line-soft);">
            <div class="text-[10px] uppercase tracking-wider font-semibold mb-1.5" style="color: var(--warm);">Also tagged via interactions</div>
            <div class="flex flex-wrap gap-1.5">
              ${viaIntsOnly.map(pid => {
                const p = state.projects.find(x => x.id === pid);
                if (!p) return '';
                return `<span class="inline-flex items-center gap-1 text-[11px] px-2 py-0.5 rounded" style="background: rgba(35,59,52,0.08); color: var(--green); border: 1px solid rgba(35,59,52,0.18);">
                  ${esc(p.name)}
                  <button type="button" onclick="detachProjectFromCompanyInteractions('${esc(item.id)}','${esc(pid)}')" title="Detach this project from all of this company's interactions" style="margin-left:2px; color: #a04330; font-weight: 700; line-height: 1; padding: 0 3px;">×</button>
                </span>`;
              }).join('')}
            </div>
            <div class="text-[10px] mt-1.5" style="color: var(--warm); opacity: 0.8;">These projects come from interactions. Clicking × removes the project tag from <em>all</em> interactions of this company.</div>
          </div>`;
      }
    }
    input = `<div id="f-${f.key}" class="border rounded-lg p-2 max-h-40 overflow-y-auto space-y-1" style="border-color: var(--line);">
      ${sorted.length === 0 ? `<div class="text-xs px-1 py-2" style="color: var(--warm);">No projects yet. Create one in the Projects view.</div>` :
        sorted.map(p => `<label class="flex items-center gap-2 px-1 py-0.5 cursor-pointer rounded hover:bg-slate-50">
          <input type="checkbox" value="${esc(p.id)}" ${selected.includes(p.id)?'checked':''} class="w-3.5 h-3.5 rounded accent-slate-900">
          <span class="text-sm">${esc(p.name)}</span>
          ${p.location ? `<span class="text-xs ml-auto" style="color: var(--warm);">${esc(p.location)}</span>` : ''}
        </label>`).join('')}
    </div>${viaInteractionsHtml}`;
  } else if (f.type === 'number') {
    input = `<input type="number" id="f-${f.key}" value="${esc(val)}" ${f.required?'required':''} class="${base}" ${borderStyle}>`;
  } else if (f.type === 'checkbox') {
    input = `<label class="flex items-center gap-2 cursor-pointer mt-2"><input type="checkbox" id="f-${f.key}" ${val?'checked':''} class="w-4 h-4 rounded accent-slate-900"><span class="text-sm text-slate-700">Yes</span></label>`;
  } else if (f.type === 'datetime-local') {
    const dtv = val ? (() => { try { return new Date(val).toISOString().slice(0,16); } catch(e){ return ''; } })() : '';
    input = `<input type="datetime-local" id="f-${f.key}" value="${esc(dtv)}" class="${base}" ${borderStyle}>`;
  } else if (f.type === 'date') {
    const dv = val ? (() => { try { return new Date(val).toISOString().slice(0,10); } catch(e){ return ''; } })() : '';
    input = `<input type="date" id="f-${f.key}" value="${esc(dv)}" class="${base}" ${borderStyle}>`;
  } else {
    input = `<input type="${f.type||'text'}" id="f-${f.key}" value="${esc(val)}" ${f.required?'required':''} class="${base}" ${borderStyle}>`;
  }

  return `<div>
    <label class="block text-[10px] uppercase tracking-[0.14em] font-semibold mb-1.5" style="color: var(--warm);">${esc(f.label)}${f.required?' <span style="color:#a04330;">*</span>':''}</label>
    ${input}
  </div>`;
}

function contactsForCompany(companyId) { return !companyId ? state.contacts : state.contacts.filter(c => c.companyId === companyId); }

function refreshContactSelect() {
  const cId = document.getElementById('f-companyId')?.value || '';
  const sel = document.getElementById('f-contactId'); if (!sel) return;
  const opts = contactsForCompany(cId);
  sel.innerHTML = '<option value="">— Select —</option>' + opts.map(c => `<option value="${esc(c.id)}">${esc(c.firstName+' '+c.lastName)}</option>`).join('');
}

// ============================================================
//  SAVE
// ============================================================
function saveChanges() {
  const type = state.editingType; if (!type) return;
  const newData = {};
  for (const f of FIELDS[type]) {
    const el = document.getElementById('f-'+f.key); if (!el) continue;
    if (f.type === 'checkbox') newData[f.key] = el.checked;
    else if (f.type === 'datetime-local') newData[f.key] = el.value ? new Date(el.value).toISOString() : '';
    else if (f.type === 'date') newData[f.key] = el.value || '';
    else if (f.type === 'project-multi') {
      newData[f.key] = Array.from(el.querySelectorAll('input[type=checkbox]:checked')).map(cb => cb.value);
    }
    else if (f.type === 'number') newData[f.key] = el.value === '' ? null : Number(el.value);
    else newData[f.key] = el.value;
    if (f.required && !newData[f.key]) { alert('Field "'+f.label+'" is required.'); el.focus(); return; }
  }
  const arr = getArray(type);
  if (state.isNew) {
    const prefix = { company:'co', contact:'p', interaction:'i', project:'pr' }[type];
    const maxNum = arr.reduce((m,x) => Math.max(m, parseInt((x.id||'').replace(/\D/g,''))||0), 0);
    newData.id = prefix + (maxNum + 1);
    newData.createdAt = new Date().toISOString();
    arr.push(newData);
  } else {
    const idx = arr.findIndex(x => x.id === state.editingId); if (idx === -1) return;
    arr[idx] = { ...arr[idx], ...newData };
  }
  saveData(); closeModal(); render();
}

function deleteCurrentItem() {
  if (!confirm('Delete this record? This cannot be undone.')) return;
  const t = state.editingType, id = state.editingId;
  if (t==='company') state.companies = state.companies.filter(x => x.id !== id);
  else if (t==='contact') state.contacts = state.contacts.filter(x => x.id !== id);
  else if (t==='project') {
    state.projects = state.projects.filter(x => x.id !== id);
    // Remove project ref from interactions
    state.interactions.forEach(i => {
      if (Array.isArray(i.projectIds)) i.projectIds = i.projectIds.filter(pid => pid !== id);
    });
  }
  else state.interactions = state.interactions.filter(x => x.id !== id);
  saveData(); closeModal(); render();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
  state.editingType = null; state.editingId = null; state.isNew = false;
}
function handleOverlayClick(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function getArray(type) {
  if (type==='company') return state.companies;
  if (type==='contact') return state.contacts;
  if (type==='project') return state.projects;
  return state.interactions;
}

// ============================================================
//  INIT
// ============================================================
window.onload = async function() {
  state.currentView = 'dashboard';
  let dataLoaded = false;

  // Read-only shared snapshot (plain)
  if (SHARED_DATA) {
    state.companies = Array.isArray(SHARED_DATA.companies) ? SHARED_DATA.companies : [];
    state.contacts = Array.isArray(SHARED_DATA.contacts) ? SHARED_DATA.contacts : [];
    state.interactions = Array.isArray(SHARED_DATA.interactions) ? SHARED_DATA.interactions : [];
    state.projects = Array.isArray(SHARED_DATA.projects) ? SHARED_DATA.projects : [];
    state.meetings = Array.isArray(SHARED_DATA.meetings) ? SHARED_DATA.meetings : [];
    state.lastUpdatedByClaudeCode = SHARED_DATA.lastUpdatedByClaudeCode || null;
    state.lastUpdatedByUser = SHARED_DATA.lastUpdatedByUser || null;
    document.body.classList.add('read-only');
    showReadOnlyBadge();
    setView('dashboard');
    updateButtons();
    return;
  }

  // Encrypted shared snapshot — show password gate
  if (ENCRYPTED_DATA) {
    document.body.classList.add('read-only');
    showPasswordGate();
    return;
  }

  // Try to reconnect to the previously linked file FIRST
  if (FS_SUPPORTED) {
    const savedHandle = await loadHandle();
    if (savedHandle) {
      try {
        const perm = await savedHandle.queryPermission({ mode: 'readwrite' });
        if (perm === 'granted') {
          fileHandle = savedHandle;
          fileName = savedHandle.name;
          // Read file directly without rendering yet
          try {
            const file = await fileHandle.getFile();
            const text = await file.text();
            const data = text.trim() ? JSON.parse(text) : {};
            state.companies = Array.isArray(data.companies) ? data.companies : [];
            state.contacts = Array.isArray(data.contacts) ? data.contacts : [];
            state.interactions = Array.isArray(data.interactions) ? data.interactions : [];
            state.projects = Array.isArray(data.projects) ? data.projects : [];
            state.meetings = Array.isArray(data.meetings) ? data.meetings : [];
            dataLoaded = true;
          } catch(e) { console.warn('initial file read failed', e); }
        } else {
          fileHandle = savedHandle;
          fileName = savedHandle.name;
          showReconnectBanner();
        }
      } catch(e) { console.warn('reconnect failed', e); }
    }
  }

  // Fallback: try localStorage
  if (!dataLoaded) loadFromStorage();

  // Now render — state is fully populated
  setView('dashboard');
  updateButtons();
  if (dataLoaded) updateStatus('synced');
};

function showPasswordGate() {
  // Hide the entire app
  document.querySelector('aside').style.display = 'none';
  document.querySelector('main').style.display = 'none';

  const gate = document.createElement('div');
  gate.id = 'password-gate';
  gate.className = 'fixed inset-0 flex items-center justify-center z-50 p-6';
  gate.style.cssText = 'background: var(--paper);';
  gate.innerHTML = `
    <div class="w-full max-w-md">
      <div class="text-center mb-8">
        <svg width="58" height="78" viewBox="0 0 34 46" fill="none" class="mx-auto mb-5" aria-label="BOA Hotels monogram">
          <rect x="1.5" y="1.5" width="31" height="43" stroke="#233b34" stroke-width="0.9" fill="none"/>
          <text x="17" y="19" text-anchor="middle" font-family="Fraunces, 'PP Fragment Glare', serif" font-size="14" font-weight="400" fill="#233b34" style="font-variation-settings: 'opsz' 144;">B</text>
          <path d="M 5.5 25 Q 17 21 28.5 25" stroke="#233b34" stroke-width="0.9" fill="none" stroke-linecap="round"/>
          <text x="17" y="38" text-anchor="middle" font-family="Fraunces, 'PP Fragment Glare', serif" font-size="14" font-weight="400" fill="#233b34" style="font-variation-settings: 'opsz' 144;">H</text>
        </svg>
        <div class="font-display text-xl font-normal tracking-[0.18em] mb-2" style="color: var(--ink);">BOA HOTELS</div>
        <div class="text-[10px] uppercase tracking-[0.25em] font-semibold mb-5" style="color: var(--green);">CRM</div>
        <h1 class="font-display text-3xl font-medium mb-2" style="color: var(--ink);">Confidential view</h1>
        <p class="text-sm" style="color: var(--warm);">Enter the password you received to unlock the data.</p>
      </div>
      <form id="password-form" class="card p-6 space-y-4" onsubmit="return submitPassword(event)">
        <div>
          <label class="block text-xs uppercase tracking-wider font-semibold mb-2" style="color: var(--warm);">Password</label>
          <input id="password-input" type="password" autofocus autocomplete="off"
            class="w-full px-3 py-2.5 border rounded-lg text-sm font-mono" style="border-color: var(--line);">
        </div>
        <div id="password-error" class="hidden text-xs px-3 py-2 rounded-lg" style="background: rgba(176,76,50,0.08); color: #a04330;"></div>
        <button type="submit" id="password-submit" class="gold-btn w-full py-2.5 rounded-lg text-sm font-semibold">Unlock</button>
      </form>
      <p class="text-center text-xs mt-6" style="color: var(--warm);">Data is end-to-end encrypted with AES-256. Without the password it stays unreadable.</p>
    </div>`;
  document.body.appendChild(gate);

  // Try sessionStorage in case viewer already entered password this session
  const cached = sessionStorage.getItem('boa-crm-viewer-pw');
  if (cached) tryDecrypt(cached, true);
}

async function submitPassword(e) {
  e.preventDefault();
  const pw = document.getElementById('password-input').value;
  const errEl = document.getElementById('password-error');
  const btn = document.getElementById('password-submit');
  errEl.classList.add('hidden');
  btn.textContent = 'Unlocking…';
  btn.disabled = true;
  const ok = await tryDecrypt(pw, false);
  if (!ok) {
    errEl.textContent = 'Wrong password. Please try again.';
    errEl.classList.remove('hidden');
    btn.textContent = 'Unlock';
    btn.disabled = false;
    document.getElementById('password-input').select();
  }
  return false;
}

async function tryDecrypt(password, silent) {
  try {
    const data = await decryptPayload(ENCRYPTED_DATA, password);
    state.companies = Array.isArray(data.companies) ? data.companies : [];
    state.contacts = Array.isArray(data.contacts) ? data.contacts : [];
    state.interactions = Array.isArray(data.interactions) ? data.interactions : [];
    state.projects = Array.isArray(data.projects) ? data.projects : [];
    state.meetings = Array.isArray(data.meetings) ? data.meetings : [];
    state.lastUpdatedByClaudeCode = data.lastUpdatedByClaudeCode || null;
    state.lastUpdatedByUser = data.lastUpdatedByUser || null;
    sessionStorage.setItem('boa-crm-viewer-pw', password);
    // Reveal the app
    document.getElementById('password-gate')?.remove();
    document.querySelector('aside').style.display = '';
    document.querySelector('main').style.display = '';
    showReadOnlyBadge();
    setView('dashboard');
    updateButtons();
    return true;
  } catch(e) {
    if (silent) sessionStorage.removeItem('boa-crm-viewer-pw');
    return false;
  }
}

function showReadOnlyBadge() {
  const b = document.createElement('div');
  b.className = 'fixed top-3 right-3 z-30 px-3 py-1.5 rounded-full text-[11px] font-semibold uppercase tracking-wider';
  b.style.cssText = 'background: var(--ink); color: var(--paper); letter-spacing: 0.12em;';
  b.innerHTML = `<span style="display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--paper); margin-right:8px; vertical-align:middle;"></span>Read-only view`;
  document.body.appendChild(b);
}

function showReconnectBanner() {
  const b = document.createElement('div');
  b.className = 'fixed bottom-6 left-1/2 -translate-x-1/2 px-5 py-3 rounded-lg shadow-lg z-30 flex items-center gap-3';
  b.style.cssText = 'background: var(--ink); color: var(--paper); border: 1px solid var(--green);';
  b.innerHTML = `<span class="text-sm">Reconnect to <strong>${esc(fileName)}</strong>?</span>
    <button onclick="requestReconnect(this.parentElement)" class="px-3 py-1.5 text-xs rounded font-semibold" style="background: var(--green); color: var(--paper);">Reconnect</button>
    <button onclick="this.parentElement.remove()" class="text-xs" style="color: rgba(226,223,214,0.5);">Dismiss</button>`;
  document.body.appendChild(b);
}

async function requestReconnect(banner) {
  try {
    const perm = await fileHandle.requestPermission({ mode: 'readwrite' });
    if (perm === 'granted') {
      await loadFromFile();
      updateButtons();
      banner.remove();
    } else {
      alert('Permission denied. Use "Connect file" to choose again.');
      fileHandle = null;
      banner.remove();
      updateButtons();
    }
  } catch(e) {
    console.error(e);
    fileHandle = null;
    banner.remove();
    updateButtons();
  }
}
</script>
