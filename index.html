function setView(view) {
  // Re-clicking the nav while already on the same view resets any open detail page (back to list).
  // Switching from another view to one with a detail id preserves the detail.
  if (state.currentView === view) {
    if (view === 'projects' && state.projectDetailId) state.projectDetailId = null;
    if (view === 'companies' && state.companyDetailId) state.companyDetailId = null;
  }
  state.currentView = view;
  ['dashboard','companies','contacts','interactions','projects'].forEach(v => {
    document.getElementById('view-'+v).classList.toggle('hidden', v !== view);
    document.getElementById('nav-'+v).classList.toggle('active', v === view);
  });
  render();
}

function render() {
  // Preserve focus + cursor of any focused input/textarea before innerHTML wipes it
  const active = document.activeElement;
  let focusId = null, cursorStart = null, cursorEnd = null;
  if (active && active.id && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA')) {
    focusId = active.id;
    try { cursorStart = active.selectionStart; cursorEnd = active.selectionEnd; } catch(e) {}
  }

  if (state.currentView === 'dashboard') renderDashboard();
  else if (state.currentView === 'companies') renderCompanies();
  else if (state.currentView === 'contacts') renderContacts();
  else if (state.currentView === 'interactions') renderInteractions();
  else if (state.currentView === 'projects') renderProjects();

  // Restore focus to the same element by id, putting cursor back where it was
  if (focusId) {
    const newEl = document.getElementById(focusId);
    if (newEl) {
      newEl.focus();
      if (cursorStart != null && typeof newEl.setSelectionRange === 'function') {
        try { newEl.setSelectionRange(cursorStart, cursorEnd ?? cursorStart); } catch(e) {}
      }
    }
  }
}

  'united kingdom':'UK','uk':'UK','great britain':'UK','england':'UK','scotland':'UK',

  'sweden':'SE','denmark':'DK','norway':'NO','finland':'FI','poland':'PL','romania':'RO','czechia':'CZ','czech republic':'CZ',
  'brazil':'BR','brasil':'BR','mexico':'MX','méxico':'MX','argentina':'AR','chile':'CL','colombia':'CO','peru':'PE','venezuela':'VE','uruguay':'UY','panama':'PA','panamá':'PA',
  'singapore':'SG','japan':'JP','china':'CN','hong kong':'HK','south korea':'KR','korea':'KR',

  'germany / usa':'DE/US','andorra':'AD','iceland':'IS','monaco':'MC','liechtenstein':'LI'
};
function countryCode(c) {
  if (!c) return '';
  const t = String(c).trim();
  if (!t) return '';
  const k = t.toLowerCase();
  if (COUNTRY_CODES[k]) return COUNTRY_CODES[k];
  // Already short (≤4 chars like 'PT', 'UK', 'DE/US'): keep as-is
  if (t.length <= 4) return t.toUpperCase();
  // Unknown country: take first letters of each word capitalised
  return t.split(/[\s/]+/).map(w => w[0]||'').join('').slice(0,4).toUpperCase();
}

// Three-tier status: Active (engaged) / Watching (relevant to BOA but no current deal) / Not Active (out)
// Override wins; otherwise inferred from the latest interaction's KPI with project context.
// Status rules (Active / Watching / Not Active):
//  • statusOverride (manual) ALWAYS wins.
//  • NOT ACTIVE : no interactions at all; OR latest KPI 'not_interested' with NO project tagged
//                 (a general "not a fit"); OR latest KPI 'closed'/'won' (legacy).
//  • WATCHING   : latest KPI 'monitoring'; OR 'not_interested' tied to a specific project (passed on
//                 THAT deal only, still relevant); OR an active KPI that has gone quiet
//                 (last touch > STALE_DAYS) — on the radar but no live deal moving.
//  • ACTIVE     : latest KPI in {in_conversation, action_required, info_sent} AND last touch ≤ STALE_DAYS.
const STALE_DAYS = 35;
function getStatus(co) {
  if (co.statusOverride === 'active' || co.statusOverride === 'watching' || co.statusOverride === 'inactive') return co.statusOverride;
  const list = state.interactions.filter(i => i.companyId === co.id);
  if (!list.length) return 'inactive';
  const latest = list.slice().sort((a,b) => new Date(b.date||0) - new Date(a.date||0))[0];
  if (INACTIVE_KPIS.has(latest.kpi)) {
    if (latest.kpi === 'not_interested' && Array.isArray(latest.projectIds) && latest.projectIds.length > 0) return 'watching';
    return 'inactive';
  }
  if (latest.kpi === 'monitoring') return 'watching';
  // Active KPI but the conversation has gone quiet → demote to Watching.
  const days = latest.date ? Math.floor((Date.now() - new Date(latest.date).getTime()) / 86400000) : 9999;
  if (days > STALE_DAYS) return 'watching';
  return 'active';
}
// Legacy alias — returns Active/Inactive (used to return hot/warm/cold/not_interested)
function getTemperature(co) { return getStatus(co); }

function fmtDate(iso) { if (!iso) return '—'; try { return new Date(iso).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); } catch(e){ return iso; } }
function fmtDateShort(iso) { if (!iso) return '—'; try { return new Date(iso).toLocaleDateString('en-GB',{day:'2-digit',month:'short'}); } catch(e){ return iso; } }
function relTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso); const diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return `${Math.floor(diff/60)} min ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)} h ago`;
  if (diff < 604800) return `${Math.floor(diff/86400)} d ago`;
  return fmtDate(iso);
}

function getInitials(name) {
  return (name||'?').split(/\s+/).slice(0,2).map(w => w[0]||'').join('').toUpperCase();
}

const AVATAR_COLORS = ['#233b34','#2d4a42','#3a5a4e','#4a5c4a','#5a6650','#6b6850','#8f7a55','#aca497','#5c4a3a','#3a443a'];
function avatarColor(s) {
  let h=0; for(const c of (s||'')) h = (h*31 + c.charCodeAt(0)) & 0xffffffff;
  return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
}

// ============================================================
//  DASHBOARD VIEW
// ============================================================
function renderDashboard() {
  // Apply dashboard focus filter to base sets used by dashboard sections
  const focus = state.dashboardFocus || { type: 'all', id: null, label: '', query: '' };
  const focusActive = focus.type !== 'all';
  const fInteractions = focusActive ? state.interactions.filter(i => interactionMatchesFocus(i, focus)) : state.interactions;
  const fCompanies = focusActive ? state.companies.filter(c => companyMatchesFocus(c, focus)) : state.companies;
  const focusCompanyIds = new Set(fCompanies.map(c => c.id));

  const total = fCompanies.length;
  const investors = fCompanies.filter(c => c.type === 'investor').length;
  const connectors = fCompanies.filter(c => c.type === 'connector').length;
  const operators  = fCompanies.filter(c => c.type === 'operator').length;
  const others     = fCompanies.filter(c => c.type === 'other').length;

  const activeCount = fCompanies.filter(c => getStatus(c) === 'active').length;
  const watchingCount = fCompanies.filter(c => getStatus(c) === 'watching').length;
  const inactiveCount = total - activeCount - watchingCount;
  // Active investors / connectors breakdown
  const activeInv = fCompanies.filter(c => c.type === 'investor' && getStatus(c) === 'active').length;
  const activeConn = fCompanies.filter(c => c.type === 'connector' && getStatus(c) === 'active').length;

  const pending = state.interactions.filter(i => i.kpi === 'action_required' && !i.completed).length;

  const now = new Date();
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
  const thisMonth = state.interactions.filter(i => i.date && new Date(i.date) >= monthStart).length;
  const lastMonthStart = new Date(now.getFullYear(), now.getMonth()-1, 1);
  const lastMonth = state.interactions.filter(i => i.date && new Date(i.date) >= lastMonthStart && new Date(i.date) < monthStart).length;
  const monthDelta = lastMonth ? Math.round(((thisMonth - lastMonth) / lastMonth) * 100) : null;

  const recent = [...fInteractions].sort((a,b) => new Date(b.date||0) - new Date(a.date||0)).slice(0, 6);
  // Active prospects (was Hot Prospects): companies with status=active, sorted by latest activity (most recent first)
  // Honour dashboard focus by limiting to fCompanies
  const activeProspects = fCompanies
    .filter(c => getStatus(c) === 'active')
    .map(c => {
      const list = state.interactions.filter(i => i.companyId === c.id);
      const latest = list.slice().sort((a,b) => new Date(b.date||0) - new Date(a.date||0))[0];
      return { c, latest };
    })
    .filter(x => x.latest)
    .sort((a,b) => new Date(b.latest.date||0) - new Date(a.latest.date||0))
    .slice(0, 6)
    .map(x => x.c);
  const hotCompanies = activeProspects; // legacy alias

  // Category distribution
  const byCat = {};
  state.companies.forEach(c => { if (c.category) byCat[c.category] = (byCat[c.category]||0) + 1; });
  const cats = Object.entries(byCat).sort((a,b) => b[1]-a[1]).slice(0, 7);
  const maxCat = cats.length ? cats[0][1] : 1;

  // === Action items ===
  const todayDate = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const weekFromNow = new Date(todayDate); weekFromNow.setDate(weekFromNow.getDate() + 7);
  const thirtyDaysAgo = new Date(todayDate); thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);

  // An open follow-up/action is only a real task if NO later interaction with the same company
  // has happened since — otherwise it's been superseded (you've already had more contact).
  const _notSuperseded = i => !state.interactions.some(j => j.companyId === i.companyId && j.id !== i.id && new Date(j.date||0) > new Date(i.date||0));

  const overdue = fInteractions.filter(i =>
    i.followUpDate && new Date(i.followUpDate) < todayDate && !i.completed && _notSuperseded(i)
  ).sort((a,b) => new Date(a.followUpDate) - new Date(b.followUpDate));

  const thisWeek = fInteractions.filter(i => {
    if (!i.followUpDate || i.completed) return false;
    const d = new Date(i.followUpDate);
    return d >= todayDate && d <= weekFromNow && _notSuperseded(i);
  }).sort((a,b) => new Date(a.followUpDate) - new Date(b.followUpDate));

  const actionReq = fInteractions.filter(i =>
    i.kpi === 'action_required' && !i.completed && _notSuperseded(i)
  ).sort((a,b) => new Date(b.date||0) - new Date(a.date||0));

  const empty = total === 0;

  const actionItemCard = (label, bucket, count, items, renderItem, accentColor) => `
    <div class="card p-5">
      <div class="flex items-baseline justify-between mb-3">
        <div class="flex items-center gap-2">
          <span style="width:8px;height:8px;border-radius:50%;display:inline-block;background:${accentColor};"></span>
          <h3 class="text-[10px] uppercase tracking-[0.18em] font-semibold" style="color: var(--warm);">${label}</h3>
        </div>
        <span class="font-display text-2xl font-medium num" style="color: ${count > 0 ? accentColor : 'var(--warm)'};">${count}</span>
      </div>
      ${count === 0
        ? `<div class="text-xs py-4 text-center" style="color: var(--warm); opacity: 0.6;">All clear</div>`
        : `<div class="space-y-2">
            ${items.slice(0, 4).map(renderItem).join('')}
            ${count > 4 ? `<button onclick="openActionList('${bucket}')" class="text-[11px] pt-1 hover:underline" style="color: ${accentColor}; cursor:pointer;">+ ${count - 4} more →</button>` : ''}
          </div>`}
    </div>
  `;

  const renderInteractionItem = (i, label, bucket) => {
    const co = state.companies.find(c => c.id === i.companyId);
    return `<div class="cursor-pointer py-1.5 px-2 -mx-2 rounded row-hover" onclick="openActionItem('${esc(i.id)}','${bucket}')">
      <div class="text-xs font-medium truncate" style="color: var(--ink);">${esc(co?co.name:'—')}</div>
      <div class="text-[11px] truncate" style="color: var(--warm);">${esc(i.subject || '')}</div>
      ${label ? `<div class="text-[10px] num mt-0.5" style="color: ${label.color};">${esc(label.text)}</div>` : ''}
    </div>`;
  };

  // === Smart digest items ===
  const digestParts = [];
  if (overdue.length > 0) digestParts.push(`<span style="color:#a04330;"><span class="num font-semibold">${overdue.length}</span> overdue</span>`);
  if (actionReq.length > 0) digestParts.push(`<span style="color:#a04330;"><span class="num font-semibold">${actionReq.length}</span> action required</span>`);
  if (thisWeek.length > 0) digestParts.push(`<span style="color:#7a5c3c;"><span class="num font-semibold">${thisWeek.length}</span> due this week</span>`);
  const activeProjects = state.projects.filter(p => p.status === 'active' || !p.status).length;
  if (activeProjects > 0) digestParts.push(`<span style="color:var(--green);"><span class="num font-semibold">${activeProjects}</span> active projects</span>`);

  // === Performance lens: investor funnel (by company count) + movement (this month) ===
  const investorsList = fCompanies.filter(c => c.type === 'investor');
  const _coRank = (coId) => {
    const list = state.interactions.filter(i => i.companyId === coId);
    if (!list.length) return 0;
    let r = 1; // contacted
    list.forEach(i => {
      if (i.kpi === 'in_conversation') r = Math.max(r, 3);
      else if (i.kpi === 'info_sent' || i.kpi === 'action_required' || i.kpi === 'monitoring') r = Math.max(r, 2);
    });
    return r;
  };
  const fnTotal = investorsList.length;
  const fnContacted = investorsList.filter(c => _coRank(c.id) >= 1).length;
  const fnEngaged = investorsList.filter(c => _coRank(c.id) >= 2).length;
  const fnConv = investorsList.filter(c => _coRank(c.id) >= 3).length;
  const fnWatching = investorsList.filter(c => getStatus(c) === 'watching').length;
  const fnDeclined = investorsList.filter(c => getStatus(c) === 'inactive' && state.interactions.some(i => i.companyId === c.id)).length;
  const pctOf = (a,b) => b > 0 ? Math.round((a/b)*100) : 0;
  const _firstTouch = (coId) => { const ds = state.interactions.filter(i => i.companyId===coId && i.date).map(i => new Date(i.date)).sort((a,b)=>a-b); return ds[0]; };
  const mvNewCompanies = fCompanies.filter(c => c.createdAt && new Date(c.createdAt) >= monthStart).length;
  const mvNewTouches = fCompanies.filter(c => { const f=_firstTouch(c.id); return f && f >= monthStart; }).length;
  const mvAdvanced = fCompanies.filter(c => state.interactions.some(i => i.companyId===c.id && i.kpi==='in_conversation' && i.date && new Date(i.date) >= monthStart)).length;
  const mvCooled = fCompanies.filter(c => { const list = state.interactions.filter(i => i.companyId===c.id); if(!list.length) return false; const latest = list.slice().sort((a,b)=>new Date(b.date||0)-new Date(a.date||0))[0]; return (latest.kpi==='monitoring'||latest.kpi==='not_interested') && latest.date && new Date(latest.date) >= monthStart; }).length;
  // This-week window resets every Wednesday (week starts on the most recent Wednesday, inclusive)
  const weekStartWed = new Date(todayDate);
  weekStartWed.setDate(weekStartWed.getDate() - ((weekStartWed.getDay() - 3 + 7) % 7));
  const _inWeek = (iso) => iso && new Date(iso) >= weekStartWed;
  const wkInteractions = state.interactions.filter(i => _inWeek(i.date)).length;
  const wkNewCompanies = fCompanies.filter(c => _inWeek(c.createdAt)).length;
  const wkNewTouches = fCompanies.filter(c => { const f=_firstTouch(c.id); return f && f >= weekStartWed; }).length;
  const wkAdvanced = fCompanies.filter(c => state.interactions.some(i => i.companyId===c.id && i.kpi==='in_conversation' && _inWeek(i.date))).length;
  // Standing metrics
  const inConvNow = fCompanies.filter(c => { const list = state.interactions.filter(i => i.companyId===c.id); if(!list.length) return false; const latest = list.slice().sort((a,b)=>new Date(b.date||0)-new Date(a.date||0))[0]; return latest.kpi === 'in_conversation'; }).length;
  const totalInteractions = state.interactions.length;
  const _d10 = new Date(todayDate); _d10.setDate(_d10.getDate()-10);
  const last10Interactions = state.interactions.filter(i => i.date && new Date(i.date) >= _d10).length;
  // Calendar: only meetings/calls matched to a CRM company (by attendee email).
  // Rolling window: "this week" = next 7 days, "next week" = days 7-14.
  const _meet = Array.isArray(state.meetings) ? state.meetings : [];
  const _d7 = new Date(todayDate); _d7.setDate(_d7.getDate()+7);
  const _d14 = new Date(todayDate); _d14.setDate(_d14.getDate()+14);
  const _mt = m => m.start ? new Date(m.start) : null;
  const _hasCo = m => !!m.companyId && state.companies.some(c => c.id === m.companyId);
  const meetThisWeek = _meet.filter(m => _hasCo(m) && _mt(m) && _mt(m) >= todayDate && _mt(m) < _d7);
  const meetNextWeek = _meet.filter(m => _hasCo(m) && _mt(m) && _mt(m) >= _d7 && _mt(m) < _d14);
  const meetUpcoming = _meet.filter(m => _hasCo(m) && _mt(m) && _mt(m) >= todayDate && _mt(m) < _d14).sort((a,b)=>_mt(a)-_mt(b));
  // Task buckets (priority): hot inbound (actionReq) → overdue → cooling (active, quiet 20d+) → prep & send
  const coolingList = fCompanies.map(c => {
    const list = state.interactions.filter(i => i.companyId === c.id);
    if (!list.length) return null;
    const latest = list.slice().sort((a,b)=>new Date(b.date||0)-new Date(a.date||0))[0];
    const days = latest.date ? Math.floor((todayDate - new Date(latest.date))/86400000) : 0;
    return { c, latest, days };
  }).filter(x => x && getStatus(x.c) === 'active' && x.days >= 20).sort((a,b)=>b.days-a.days);
  const _prepEnd = new Date(todayDate); _prepEnd.setDate(_prepEnd.getDate()+2);
  const toPrep = _meet.filter(m => _hasCo(m) && _mt(m) && _mt(m) >= todayDate && _mt(m) < _prepEnd).sort((a,b)=>_mt(a)-_mt(b));
  const toSend = state.interactions.filter(i => (i.subject||'').includes('(DRAFT')).sort((a,b)=>new Date(b.date||0)-new Date(a.date||0));
  let topTask = null;
  if (actionReq.length) { const i=actionReq[0]; const co=state.companies.find(c=>c.id===i.companyId); topTask={tag:'Hot inbound',color:'#a04330',label:`${co?co.name:'—'} — ${i.subject||'action required'}`,onclick:`openActionItem('${esc(i.id)}','action_required')`}; }
  else if (overdue.length) { const i=overdue[0]; const co=state.companies.find(c=>c.id===i.companyId); const dd=Math.floor((todayDate-new Date(i.followUpDate))/86400000); topTask={tag:'Overdue',color:'#a04330',label:`${co?co.name:'—'} — ${i.subject||'follow up'} (${dd}d overdue)`,onclick:`openActionItem('${esc(i.id)}','overdue')`}; }
  else if (coolingList.length) { const x=coolingList[0]; topTask={tag:'Cooling',color:'#8f6f48',label:`${x.c.name} — silent ${x.days}d, send a nudge`,onclick:`openCompanyDetail('${esc(x.c.id)}')`}; }
  else if (toPrep.length) { const m=toPrep[0]; const co=state.companies.find(c=>c.id===m.companyId); const d=new Date(m.start); topTask={tag:'Meeting prep',color:'var(--green)',label:`Prep ${co?co.name:m.title} — ${d.toLocaleDateString('en-GB',{weekday:'short'})} ${d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}`,onclick:co?`openCompanyDetail('${esc(co.id)}')`:''}; }

  document.getElementById('view-dashboard').innerHTML = `
    <div class="max-w-7xl mx-auto">
      <div class="flex items-end justify-between mb-4">
        <div>
          <div class="text-[11px] uppercase tracking-widest font-semibold mb-1" style="color: var(--green);">${focusActive ? `Focused — ${focus.type.toUpperCase()}` : 'Overview'}</div>
          <h1 class="font-display text-4xl font-semibold tracking-tight" style="color: var(--ink);">${focusActive ? esc(focus.label) : 'Dashboard'}</h1>
        </div>
        <div class="text-sm text-slate-500">${new Date().toLocaleDateString('en-GB',{weekday:'long', day:'numeric', month:'long', year:'numeric'})}</div>
      </div>

      <!-- Dashboard Search / Focus -->
      <div class="flex items-center gap-2 mb-4">
        <div class="relative flex-1 max-w-2xl">
          <svg class="absolute left-3 top-3 text-slate-400" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11a6 6 0 11-12 0 6 6 0 0112 0z"/></svg>
          <input type="text" id="dashboard-search" value="${esc(focus.query||'')}" placeholder="Focus on a project, company, contact or keyword..." oninput="onDashboardSearchInput(this.value)" onkeydown="if(event.key==='Enter'){event.preventDefault(); applyDashboardSearch(this.value);} if(event.key==='Escape'){this.value=''; clearDashboardFocus();}" autocomplete="off" class="w-full pl-10 pr-3 py-2.5 border rounded-lg text-sm bg-white" style="border-color: var(--line);">
        </div>
        ${focusActive ? '<button onclick="clearDashboardFocus()" class="ghost-btn px-3 py-2 text-xs rounded-lg font-medium">Clear filter</button>' : ''}
      </div>

      ${focusActive ? '<div class="card p-4 mb-4" style="background: var(--paper-soft); border-color: var(--line-soft);">'+renderFocusCard(focus)+'</div>' : ''}
      ${focusActive ? renderFocusedDashboard(focus) : `
      ${digestParts.length > 0 && !empty ? `
      <div class="text-sm mb-8 flex items-center gap-3 flex-wrap" style="color: var(--warm);">
        ${digestParts.join(`<span style="opacity:0.4;">·</span>`)}
      </div>
      ` : '<div class="mb-8"></div>'}

      ${empty ? `
        <div class="card p-12 text-center">
          <div class="w-16 h-16 mx-auto rounded-2xl flex items-center justify-center mb-4" style="background: var(--paper);">
            <svg width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" style="color: var(--green);"><path stroke-linecap="round" stroke-linejoin="round" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg>
          </div>
          <h2 class="font-display text-2xl font-medium mb-2">Welcome to BOA CRM</h2>
          <p class="mb-6 max-w-md mx-auto" style="color: var(--warm);">
            ${FS_SUPPORTED
              ? 'Connect to the <code style="background: var(--paper); padding: 1px 6px; border-radius: 3px; font-size: 12px;">boa-crm-data.json</code> file so changes are saved automatically and stay in sync with the AI.'
              : 'Import your JSON data file. For automatic AI sync, use Chrome or Edge.'}
          </p>
          ${FS_SUPPORTED
            ? `<button onclick="connectFile()" class="gold-btn px-5 py-2.5 text-sm rounded-lg font-semibold">Connect to file</button>`
            : `<label class="gold-btn px-5 py-2.5 text-sm rounded-lg font-semibold cursor-pointer inline-block">Import JSON<input type="file" accept=".json" class="hidden" onchange="importJSON(event)"></label>`}
        </div>
      ` : `

      <div class="grid grid-cols-4 gap-4 mb-8">
        <div class="stat-card">
          <div class="flex items-start justify-between mb-3">
            <div class="text-[10px] uppercase tracking-[0.18em] font-semibold" style="color: var(--warm);">Companies</div>

        <div class="grid grid-cols-4 gap-4">

          <div class="card p-5">

              <span class="font-display text-2xl font-medium num" style="color:${coolingList.length?'#8f6f48':'var(--warm)'};">${coolingList.length}</span>

            ${coolingList.length===0?`<div class="text-xs py-4 text-center" style="color:var(--warm);opacity:.6;">None cooling</div>`:`<div class="space-y-2">${coolingList.slice(0,4).map(x=>`<div class="cursor-pointer py-1.5 px-2 -mx-2 rounded row-hover" onclick="openCompanyDetail('${esc(x.c.id)}')"><div class="text-xs font-medium truncate" style="color:var(--ink);">${esc(x.c.name)}</div><div class="text-[10px] num" style="color:#8f6f48;">silent ${x.days}d · nudge before it goes cold</div></div>`).join('')}${coolingList.length>4?`<button onclick="state.companyFilter={search:'',category:'',type:'',temp:'active',projectId:''};setView('companies')" class="text-[11px] pt-1 hover:underline" style="color:#8f6f48;cursor:pointer;">+ ${coolingList.length-4} more →</button>`:''}</div>`}
          </div>
          <div class="card p-5">
            <div class="flex items-baseline justify-between mb-3">
              <div class="flex items-center gap-2"><span style="width:8px;height:8px;border-radius:50%;display:inline-block;background:#233b34;"></span><h3 class="text-[10px] uppercase tracking-[0.18em] font-semibold" style="color:var(--warm);">Prep &amp; Send</h3></div>
              <span class="font-display text-2xl font-medium num" style="color:${(toPrep.length+toSend.length)?'var(--green)':'var(--warm)'};">${toPrep.length+toSend.length}</span>
            </div>
            ${(toPrep.length+toSend.length)===0?`<div class="text-xs py-4 text-center" style="color:var(--warm);opacity:.6;">All clear</div>`:`<div class="space-y-2">
              ${toPrep.slice(0,2).map(m=>{const co=state.companies.find(c=>c.id===m.companyId);const d=new Date(m.start);return `<div class="cursor-pointer py-1.5 px-2 -mx-2 rounded row-hover" ${co?`onclick="openCompanyDetail('${esc(co.id)}')"`:''}><div class="text-xs font-medium truncate" style="color:var(--ink);">Prep: ${esc(co?co.name:m.title)}</div><div class="text-[10px] num" style="color:var(--green);">${d.toLocaleDateString('en-GB',{weekday:'short'})} ${d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})} · meeting</div></div>`;}).join('')}
              ${toSend.slice(0, Math.max(0, 4 - Math.min(toPrep.length,2))).map(i=>{const co=state.companies.find(c=>c.id===i.companyId);return `<div class="cursor-pointer py-1.5 px-2 -mx-2 rounded row-hover" onclick="openActionItem('${esc(i.id)}','action_required')"><div class="text-xs font-medium truncate" style="color:var(--ink);">Send: ${esc(co?co.name:'—')}</div><div class="text-[10px] num" style="color:var(--warm);">draft ready — review &amp; send</div></div>`;}).join('')}
              ${(toPrep.length+toSend.length)>4?`<div class="text-[11px] pt-1" style="color:var(--green);">+ ${(toPrep.length+toSend.length)-4} more</div>`:''}
            </div>`}
          </div>
        </div>
      </div>

      <!-- Funnel + Momentum -->
      <div class="grid grid-cols-3 gap-4 mb-8">
        <div class="card col-span-2 p-6">
          <div class="flex items-center justify-between mb-5">
            <h2 class="font-display text-xl font-medium">Investor Funnel</h2>
            <span class="text-xs" style="color:var(--warm);">by number of companies</span>
          </div>
          ${[
            {label:'Investors (total)', n:fnTotal, color:'var(--warm)'},
            {label:'Contacted', n:fnContacted, color:'#5a7d8c'},
            {label:'Engaged (material / dialogue)', n:fnEngaged, color:'#3f5a68'},
            {label:'In conversation', n:fnConv, color:'var(--green)'}
          ].map((s,idx,arr) => {
            const w = fnTotal>0 ? Math.round((s.n/fnTotal)*100) : 0;
            const conv = idx>0 ? pctOf(s.n, arr[idx-1].n) : 100;
            return `<div class="mb-3">
              <div class="flex items-baseline justify-between text-sm mb-1.5">
                <span class="font-medium" style="color:var(--ink);">${s.label}</span>
                <span class="num text-xs" style="color:var(--warm);"><span class="font-semibold" style="color:var(--ink);">${s.n}</span>${idx>0?' · '+conv+'%':''}</span>
              </div>
              <div class="h-2 rounded-sm overflow-hidden" style="background:var(--paper);">
                <div class="h-full rounded-sm" style="width:${Math.max(w,2)}%;background:${s.color};"></div>
              </div>
            </div>`;
          }).join('')}
          <div class="mt-4 pt-4" style="border-top:1px solid var(--line-soft);">
            <div class="text-[10px] uppercase tracking-[0.18em] font-semibold mb-3" style="color:var(--warm);">Off the active funnel</div>
            ${[
              {label:'Watching — relevant, no live deal', n:fnWatching, color:'#8f6f48'},
              {label:'Not interested', n:fnDeclined, color:'#aca497'}
            ].map(s => { const w = fnTotal>0?Math.round((s.n/fnTotal)*100):0; return `<div class="mb-2">
              <div class="flex items-baseline justify-between text-sm mb-1.5">
                <span class="font-medium" style="color:var(--ink);">${s.label}</span>
                <span class="num text-xs font-semibold" style="color:var(--ink);">${s.n}</span>
              </div>
              <div class="h-2 rounded-sm overflow-hidden" style="background:var(--paper);">
                <div class="h-full rounded-sm" style="width:${Math.max(w,2)}%;background:${s.color};"></div>
              </div>
            </div>`; }).join('')}
          </div>
        </div>
        <div class="card p-6">
          <h2 class="font-display text-xl font-medium mb-1">Momentum</h2>
          <div class="text-xs mb-4" style="color:var(--warm);">Week resets every Wednesday</div>
          <div class="flex items-baseline justify-between mb-4 pb-3" style="border-bottom:1px solid var(--line-soft);">
            <span class="text-sm font-medium" style="color:var(--ink);">In conversation now</span>
            <span class="font-display text-3xl font-medium num" style="color:var(--green);">${inConvNow}</span>
          </div>
          <div class="grid items-baseline pb-1" style="grid-template-columns:1fr auto auto;gap:1.25rem;">
            <span></span>
            <span class="text-[10px] uppercase tracking-wider font-semibold" style="color:var(--warm);text-align:right;">Week</span>
            <span class="text-[10px] uppercase tracking-wider font-semibold" style="color:var(--green);text-align:right;">Month</span>
          </div>
          ${[
            {label:'Interactions', wk:wkInteractions, mo:thisMonth},
            {label:'New companies', wk:wkNewCompanies, mo:mvNewCompanies},
            {label:'First contacts', wk:wkNewTouches, mo:mvNewTouches},
            {label:'Advanced to conversation', wk:wkAdvanced, mo:mvAdvanced}
          ].map(r => `<div class="grid items-baseline py-2" style="grid-template-columns:1fr auto auto;gap:1.25rem;border-top:1px solid var(--line-soft);">
            <span class="text-sm" style="color:var(--ink);">${r.label}</span>
            <span class="num text-base" style="color:var(--warm);text-align:right;min-width:2ch;">${r.wk}</span>
            <span class="num text-2xl font-semibold" style="color:var(--green);text-align:right;min-width:2.5ch;">${r.mo}</span>
          </div>`).join('')}
        </div>
      </div>

      <!-- Upcoming meetings (calendar) -->
      ${meetUpcoming.length ? `
      <div class="card p-6 mb-4">
        <div class="flex items-center justify-between mb-4">
          <h2 class="font-display text-xl font-medium">Upcoming meetings <span class="text-xs font-normal" style="color:var(--warm);">· this &amp; next week</span></h2>
          <span class="text-xs num" style="color:var(--warm);">${meetUpcoming.length} scheduled</span>
        </div>
        <div class="space-y-1">
          ${meetUpcoming.map(m => {
            const co = m.companyId ? state.companies.find(c => c.id === m.companyId) : null;
            const d = new Date(m.start);
            return `<div class="flex items-center gap-3 py-2 px-2 -mx-2 rounded-lg row-hover ${co?'cursor-pointer':''}" ${co?`onclick="openCompanyDetail('${esc(co.id)}')"`:''}>
              <div class="text-xs num text-center flex-shrink-0" style="width:54px;"><div class="font-semibold" style="color:var(--green);">${d.toLocaleDateString('en-GB',{weekday:'short'})}</div><div style="color:var(--warm);">${d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'})}</div></div>
              <div class="text-xs num flex-shrink-0" style="width:46px;color:var(--warm);">${d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}</div>
              <div class="flex-1 min-w-0">
                <div class="text-sm font-medium truncate" style="color:var(--ink);">${esc(m.title)}</div>
                ${co ? `<div class="text-[11px]" style="color:var(--green);">${esc(co.name)}</div>` : `<div class="text-[11px]" style="color:var(--warm);">${m.type==='event'?'Event / networking':'External'}</div>`}
              </div>
              ${m.conf ? `<span class="text-[10px] px-1.5 py-0.5 rounded flex-shrink-0" style="background:rgba(35,59,52,0.08);color:var(--green);">video</span>` : ''}
            </div>`;
          }).join('')}
        </div>
      </div>` : ''}

      <!-- Projects Pipeline -->
      ${state.projects.length > 0 ? `
      <div class="card p-6 mb-4">
        <div class="flex items-center justify-between mb-5">
          <h2 class="font-display text-xl font-medium">Projects Pipeline</h2>
          <button onclick="setView('projects')" class="text-xs font-medium text-slate-500 hover:text-slate-900">View all →</button>
        </div>
        <div class="space-y-2">
          ${state.projects.slice().sort((a,b) => {
            // Sort: active first, then by latest activity desc
            if ((a.status||'active') === 'active' && (b.status||'active') !== 'active') return -1;
            if ((a.status||'active') !== 'active' && (b.status||'active') === 'active') return 1;
            const aLatest = state.interactions.filter(i => i.projectIds?.includes(a.id)).map(i => new Date(i.date||0)).sort((x,y) => y-x)[0] || 0;
            const bLatest = state.interactions.filter(i => i.projectIds?.includes(b.id)).map(i => new Date(i.date||0)).sort((x,y) => y-x)[0] || 0;
            return bLatest - aLatest;
          }).map(p => {
            const s = projectStats(p);
            const status = p.status || 'active';
            const latestDate = s.latest?.date;
            const daysSince = latestDate ? Math.floor((todayDate - new Date(latestDate)) / (1000*60*60*24)) : null;
            return `<div class="flex items-center gap-4 px-3 py-3 -mx-3 rounded-lg row-hover cursor-pointer" onclick="setView('projects'); setTimeout(()=>openProjectDetail('${esc(p.id)}'), 0)">
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 flex-wrap mb-1">
                  <span class="font-semibold text-sm" style="color: var(--ink);">${esc(p.name)}</span>
                  ${pill(PROJECT_STATUS, status)}
                  ${s.pending > 0 ? `<span class="text-[10px] px-1.5 py-0.5 rounded font-medium" style="background:rgba(176,76,50,0.1);color:#a04330;">${s.pending} pending</span>` : ''}
                </div>
                <div class="text-xs" style="color: var(--warm);">
                  ${p.location ? esc(p.location) + ' · ' : ''}${p.type ? esc(p.type) + ' · ' : ''}${p.keys ? p.keys + ' keys · ' : ''}${fmtEUR(p.targetAmount)}
                </div>
              </div>
              <div class="text-right text-xs flex-shrink-0" style="color: var(--warm);">
                <div class="flex items-center gap-3">
                  <span><span class="num font-semibold" style="color: var(--ink);">${s.companyIds.length}</span> co</span>
                  <span><span class="num font-semibold" style="color: var(--ink);">${s.interactions.length}</span> int</span>
                </div>
                <div class="num mt-0.5">${latestDate ? fmtDateShort(latestDate) + (daysSince!=null ? ' · '+daysSince+'d ago' : '') : 'no activity'}</div>
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>
      ` : ''}

      <!-- Country distribution + Weekly Activity -->
      <div class="grid grid-cols-2 gap-4">
        <!-- Country distribution -->
        ${(() => {
          const byCountry = {};
          state.companies.forEach(c => { if (c.country && c.country.trim()) byCountry[c.country.trim()] = (byCountry[c.country.trim()]||0) + 1; });
          const countries = Object.entries(byCountry).sort((a,b) => b[1]-a[1]).slice(0, 8);
          if (countries.length === 0) return '<div></div>';
          const maxCountry = countries[0][1];
          return `<div class="card p-6">
            <h2 class="font-display text-xl font-medium mb-5">Companies by Country</h2>
            <div class="space-y-3">
              ${countries.map(([country, n]) => `
                <div>
                  <div class="flex items-baseline justify-between text-sm mb-1.5">
                    <span class="font-medium" style="color: var(--ink);">${esc(country)}</span>
                    <span class="num text-xs" style="color: var(--warm);">${n}</span>
                  </div>
                  <div class="h-1 rounded-sm overflow-hidden" style="background: var(--paper);">
                    <div class="h-full" style="width: ${(n/maxCountry)*100}%; background: var(--green);"></div>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>`;
        })()}

        <!-- Weekly activity -->
        ${(() => {
          // Build last 12 weeks of activity (interactions per week)
          const weeks = [];
          const msPerDay = 1000*60*60*24;
          const dayOfWeek = todayDate.getDay() || 7; // Sunday=0 → 7
          const monday = new Date(todayDate); monday.setDate(monday.getDate() - dayOfWeek + 1);
          for (let w = 11; w >= 0; w--) {
            const start = new Date(monday); start.setDate(monday.getDate() - w*7);
            const end = new Date(start); end.setDate(start.getDate() + 7);
            const count = state.interactions.filter(i => {
              if (!i.date) return false;
              const d = new Date(i.date);
              return d >= start && d < end;
            }).length;
            weeks.push({ start, count });
          }
          const maxW = Math.max(1, ...weeks.map(w => w.count));
          const thisWeekCount = weeks[weeks.length-1].count;
          const lastWeekCount = weeks[weeks.length-2]?.count || 0;
          const delta = lastWeekCount ? Math.round(((thisWeekCount - lastWeekCount) / lastWeekCount) * 100) : null;
          return `<div class="card p-6">
            <div class="flex items-center justify-between mb-5">
              <h2 class="font-display text-xl font-medium">Weekly Activity</h2>
              <div class="text-xs num" style="color: var(--warm);">
                <span class="font-semibold" style="color: var(--ink);">${thisWeekCount}</span> this week
                ${delta != null ? `<span style="color:${delta >= 0 ? 'var(--green)' : '#a04330'};margin-left:6px;">${delta >= 0 ? '+' : ''}${delta}%</span>` : ''}
              </div>
            </div>
            <div class="flex items-stretch gap-1.5" style="height: 110px;">
              ${weeks.map((w, idx) => {
                const h = Math.round((w.count / maxW) * 100);
                const isCurrent = idx === weeks.length - 1;
                const color = isCurrent ? 'var(--green)' : 'var(--warm)';
                const opacity = isCurrent ? '1' : '0.55';
                return `<div class="flex-1 flex flex-col items-center justify-end" style="height:100%;" title="Week of ${fmtDateShort(w.start.toISOString())} — ${w.count} interactions">
                  <div class="w-full rounded-sm transition-all" style="height: ${Math.max(h, 4)}%; background: ${color}; opacity: ${opacity};"></div>
                </div>`;
              }).join('')}
            </div>
            <div class="flex justify-between mt-3 text-[10px] num" style="color: var(--warm);">
              <span>12w ago</span>
              <span>this week</span>
            </div>
          </div>`;
        })()}
      </div>

      `}
      `}
    </div>
  `;
}

  state.companyDetailId = id;
  renderCompanies();
}
function closeCompanyDetail() {
  state.companyDetailId = null;
  renderCompanies();
}

          <button onclick="openCompanyDraft('${esc(co.id)}')" class="ghost-btn px-4 py-2 text-sm rounded-lg font-medium inline-flex items-center gap-2">
            <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l9 6 9-6M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
            Draft email
          </button>
          <button onclick="openNewModal('interaction', {companyId: '${esc(co.id)}'})" class="gold-btn px-4 py-2 text-sm rounded-lg font-semibold inline-flex items-center gap-2">
            <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
            Log Interaction

        </div>

      ${isInlineEditing('company', co.id) ? `<div class="card overflow-hidden mt-4 mb-2" style="border-color: var(--line);">${renderInlineEditForm('company', co, { title: co.name })}</div>` : ''}

      <!-- Stats -->

      <!-- Contacts inline -->

        </div>
        ${contacts.length === 0
          ? `<div class="text-sm py-4 text-center" style="color: var(--warm);">No contacts captured yet for this company.</div>`

              ${contacts.map(ct => `<div class="border rounded-lg p-3 cursor-pointer hover:shadow-sm transition" style="border-color: var(--line-soft);" onclick="openEditModal('contact','${esc(ct.id)}')">
                <div class="flex items-start gap-3">
                  <div class="w-9 h-9 rounded-full flex items-center justify-center text-white text-[10px] font-semibold flex-shrink-0" style="background:${avatarColor((ct.firstName||'')+' '+(ct.lastName||''))};">${getInitials((ct.firstName||'')+' '+(ct.lastName||''))}</div>
                  <div class="flex-1 min-w-0">
                    <div class="font-semibold text-sm flex items-center gap-1.5" style="color: var(--ink);">

                    </div>
                    <div class="text-xs mt-0.5" style="color: var(--warm);">${esc(ct.position || '—')}</div>
                    <div class="text-xs mt-1 space-y-0.5">

                      ${ct.phone ? `<div class="num" style="color: var(--warm);">${esc(ct.phone)}</div>` : ''}
                    </div>

            </div>`}
      </div>

      <!-- History (full) -->

        <div class="text-sm leading-relaxed" style="color: var(--ink); opacity: 0.85;">${esc(co.history)}</div>

      <div class="text-center mt-6 mb-4">
        <button onclick="closeCompanyDetail()" class="ghost-btn px-4 py-2 text-sm rounded-lg font-medium">← Back to companies</button>

    </div>
  `;
}

function toggleCompanyGroup(grp){ state.companyGroupCollapse[grp] = !state.companyGroupCollapse[grp]; renderCompanies(); }

function renderCompanies() {
  // Route to detail page if a company is selected
  if (state.companyDetailId) {
    const co = state.companies.find(x => x.id === state.companyDetailId);
    if (!co) { state.companyDetailId = null; }
    else { renderCompanyDetail(co); return; }
  }

  const f = state.companyFilter;
  const filtered = state.companies.filter(c => {
    if (f.search) {
      const s = f.search.toLowerCase();
      if (!(c.name||'').toLowerCase().includes(s) && !(c.country||'').toLowerCase().includes(s)) return false;
    }
    if (f.category && c.category !== f.category) return false;
    if (f.type && c.type !== f.type) return false;
    if (f.temp && getTemperature(c) !== f.temp) return false;
    if (f.projectId) {
      const directHas = Array.isArray(c.projectIds) && c.projectIds.includes(f.projectId);
      const cInts = state.interactions.filter(i => i.companyId === c.id);
      const intHas = cInts.some(i => Array.isArray(i.projectIds) && i.projectIds.includes(f.projectId));
      if (!directHas && !intHas) return false;
    }
    return true;
  });
  // Sort: Active first → Watching → Not Active; within each tier, by latest interaction
  // date (most recent first). Companies with no interactions fall to the bottom of their
  // status tier (alphabetical among themselves).
  const _lastTouchCache = new Map();
  const lastTouchTs = (c) => {
    if (_lastTouchCache.has(c.id)) return _lastTouchCache.get(c.id);
    const cInts = state.interactions.filter(i => i.companyId === c.id);
    let ts = 0;
    for (const i of cInts) {
      const t = i.date ? new Date(i.date).getTime() : 0;
      if (t > ts) ts = t;
    }
    _lastTouchCache.set(c.id, ts);
    return ts;
  };
  const STATUS_ORDER = { active: 0, watching: 1, inactive: 2 };
  filtered.sort((a, b) => {
    const sa = STATUS_ORDER[getStatus(a)] ?? 3;
    const sb = STATUS_ORDER[getStatus(b)] ?? 3;
    if (sa !== sb) return sa - sb;
    const ta = lastTouchTs(a), tb = lastTouchTs(b);
    if (ta === 0 && tb === 0) return (a.name||'').localeCompare(b.name||'');
    if (ta === 0) return 1;
    if (tb === 0) return -1;
    return tb - ta;
  });
  const cats = [...new Set(state.companies.map(c => c.category).filter(Boolean))].sort();

  document.getElementById('view-companies').innerHTML = `
    <div class="max-w-7xl mx-auto">
      <div class="flex items-end justify-between mb-8">
        <div>
          <div class="text-[11px] uppercase tracking-widest font-semibold mb-1" style="color: var(--green);">Directory</div>
          <h1 class="font-display text-4xl font-semibold tracking-tight">Companies <span class="text-slate-300 num">${filtered.length}</span></h1>
        </div>
        <button onclick="openNewModal('company')" class="gold-btn px-4 py-2.5 text-sm rounded-lg font-semibold shadow-sm inline-flex items-center gap-2">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
          New Company
        </button>
      </div>

      <div class="card p-4 mb-4 flex flex-wrap gap-2">
        <div class="relative flex-1 min-w-64">
          <svg class="absolute left-3 top-2.5 text-slate-400" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11a6 6 0 11-12 0 6 6 0 0112 0z"/></svg>
          <input id="search-companies" type="text" placeholder="Search company…" value="${esc(f.search)}"
            oninput="state.companyFilter.search=this.value; render()"
            class="w-full pl-9 pr-3 py-2 border rounded-lg text-sm" style="border-color: var(--line);">
        </div>
        <select onchange="state.companyFilter.category=this.value; renderCompanies()" class="px-3 py-2 border rounded-lg text-sm" style="border-color: var(--line);">
          <option value="">All categories</option>
          ${cats.map(c => `<option value="${esc(c)}" ${f.category===c?'selected':''}>${esc(c)}</option>`).join('')}
        </select>
        <select onchange="state.companyFilter.type=this.value; renderCompanies()" class="px-3 py-2 border rounded-lg text-sm" style="border-color: var(--line);">
          <option value="">All types</option>
          <option value="investor" ${f.type==='investor'?'selected':''}>Investor</option>
          <option value="connector" ${f.type==='connector'?'selected':''}>Connector</option>
          <option value="operator" ${f.type==='operator'?'selected':''}>Operator</option>
          <option value="other" ${f.type==='other'?'selected':''}>Other</option>
        </select>
        <select onchange="state.companyFilter.temp=this.value; renderCompanies()" class="px-3 py-2 border rounded-lg text-sm" style="border-color: var(--line);">
          <option value="">All statuses</option>
          <option value="active" ${f.temp==='active'?'selected':''}>Active</option>
          <option value="watching" ${f.temp==='watching'?'selected':''}>Watching</option>
          <option value="inactive" ${f.temp==='inactive'?'selected':''}>Not Active</option>
        </select>
        <select onchange="state.companyFilter.projectId=this.value; renderCompanies()" class="px-3 py-2 border rounded-lg text-sm max-w-xs" style="border-color: var(--line);">
          <option value="">All projects</option>
          ${state.projects.slice().sort((a,b)=>a.name.localeCompare(b.name)).map(p => `<option value="${esc(p.id)}" ${f.projectId===p.id?'selected':''}>${esc(p.name)}</option>`).join('')}
        </select>
      </div>

      <datalist id="company-categories">${cats.map(cat => `<option value="${esc(cat)}"></option>`).join('')}</datalist>
      <div class="card crm-table-wrap">
        <table class="w-full text-sm" style="min-width: 1100px;">
          <thead class="border-b" style="border-color: var(--line);">
            <tr class="text-xs uppercase tracking-wider text-slate-500">
              <th class="text-left px-5 py-3 font-semibold" style="width: 230px;">Company</th>
              <th class="text-left px-3 py-3 font-semibold" style="width: 60px;" title="Country (2-letter code, click to edit full name)">CT</th>
              <th class="text-left px-3 py-3 font-semibold" style="width: 160px;">Category</th>
              <th class="text-left px-3 py-3 font-semibold" style="width: 110px;">Type</th>
              <th class="text-left px-3 py-3 font-semibold" style="width: 110px;" title="Primary sort: Active → Watching → Not Active"><span class="inline-flex items-center gap-1">Status <span style="color: var(--green); font-size: 11px;">↓</span></span></th>
              <th class="text-left px-3 py-3 font-semibold" style="width: 150px;">Latest KPI</th>
              <th class="text-left px-3 py-3 font-semibold" style="width: 100px;" title="Secondary sort: most recent activity within each status tier"><span class="inline-flex items-center gap-1">Last touch <span style="color: var(--green); font-size: 11px;">↓</span></span></th>
              <th class="text-left px-3 py-3 font-semibold">Projects</th>
              <th class="px-3 py-3" style="width: 120px;"></th>
            </tr>
          </thead>
          <tbody>
            ${filtered.length === 0
              ? `<tr><td colspan="9" class="text-center py-16 text-slate-400">No companies found</td></tr>`
              : (() => { let prevGrp = null; return filtered.map(c => {
                  const temp = getTemperature(c);
                  const intsCo = state.interactions.filter(i => i.companyId === c.id);
                  const latestCo = intsCo.slice().sort((a,b) => new Date(b.date||0) - new Date(a.date||0))[0];
                  const directProjIds = Array.isArray(c.projectIds) ? c.projectIds : [];
                  const intProjIds = intsCo.flatMap(i => Array.isArray(i.projectIds) ? i.projectIds : []);
                  const projectsCo = [...new Set([...directProjIds, ...intProjIds])]
                    .map(pid => state.projects.find(p => p.id === pid))
                    .filter(Boolean);
                  const expanded = isInlineEditing('company', c.id);
                  const grp = getStatus(c);
                  const grpCollapsed = !!(state.companyGroupCollapse && state.companyGroupCollapse[grp]);
                  let grpHeader = '';
                  if (grp !== prevGrp) { prevGrp = grp; const gm = ({active:['Active','#233b34'],watching:['Watching','#8f6f48'],inactive:['Not Active','#aca497']})[grp] || ['Other','#aca497']; const cnt = filtered.filter(x => getStatus(x) === grp).length; grpHeader = `<tr onclick="toggleCompanyGroup('${grp}')" class="cursor-pointer" style="background: var(--paper-soft); border-bottom: 1px solid var(--line);"><td colspan="9" class="px-5 py-2.5"><div class="flex items-center gap-2 text-[11px] uppercase tracking-[0.15em] font-semibold" style="color:${gm[1]};"><svg width="10" height="10" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3" style="transform:rotate(${grpCollapsed?0:90}deg);transition:transform .15s;"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>${gm[0]} <span class="num" style="color:var(--warm);font-weight:600;">${cnt}</span></div></td></tr>`; }
                  return grpHeader + (grpCollapsed ? '' : `<tr class="row-hover cursor-pointer border-b" style="border-color: var(--line); ${expanded?'background: var(--paper-soft);':''}" onclick="openEditInline('company','${esc(c.id)}')">
                    <td class="px-5 py-3.5">
                      <div class="flex items-center gap-3">
                        <svg class="flex-shrink-0" width="11" height="11" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" style="color: var(--warm); transform: rotate(${expanded?90:0}deg); transition: transform 0.15s;"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
                        <div class="w-9 h-9 rounded-lg flex items-center justify-center text-white text-[11px] font-semibold flex-shrink-0" style="background:${avatarColor(c.name)};">${getInitials(c.name)}</div>
                        <div>
                          <div class="font-semibold" style="color: var(--ink);">${esc(c.name)}</div>
                          ${c.website ? `<a href="${esc(c.website)}" target="_blank" onclick="event.stopPropagation()" class="text-xs text-slate-400 hover:text-slate-700">${esc(c.website.replace(/^https?:\/\//,'').replace(/\/$/,''))}</a>` : ''}
                        </div>
                      </div>
                    </td>
                    <td class="px-3 py-3" onclick="event.stopPropagation()">
                      <input type="text" value="${esc(countryCode(c.country||''))}" placeholder="—"
                        data-full-value="${esc(c.country||'')}"
                        onfocus="this.value=this.dataset.fullValue||''; this.select()"
                        onblur="this.dataset.fullValue=this.value; this.value=countryCode(this.value)"
                        onchange="updateCompanyField('${esc(c.id)}','country',this.value,{rerender:false}); this.dataset.fullValue=this.value;"
                        title="${esc(c.country||'')}"
                        class="cell-edit text-sm" style="color: var(--ink); font-weight: 500;">
                    </td>
                    <td class="px-3 py-3" onclick="event.stopPropagation()">
                      <input type="text" value="${esc(c.category||'')}" placeholder="—" list="company-categories" onchange="updateCompanyField('${esc(c.id)}','category',this.value,{rerender:false})" class="cell-edit text-sm" style="color: var(--ink);" title="${esc(c.category||'')}">
                    </td>
                    <td class="px-3 py-3" onclick="event.stopPropagation()">
                      <select onchange="updateCompanyField('${esc(c.id)}','type',this.value)" class="cell-edit-select text-sm" style="color: var(--ink);">
                        <option value="investor" ${c.type==='investor'?'selected':''}>Investor</option>
                        <option value="connector" ${c.type==='connector'?'selected':''}>Connector</option>
                        <option value="operator" ${c.type==='operator'?'selected':''}>Operator</option>
                        <option value="other" ${c.type==='other'?'selected':''}>Other</option>
                      </select>
                    </td>
                    <td class="px-5 py-3" onclick="event.stopPropagation()">
                      ${(() => {
                        const sCol = STATUS[temp] || STATUS.inactive;
                        return `<select onchange="updateCompanyField('${esc(c.id)}','statusOverride',this.value)" class="pill-select" title="${c.statusOverride ? 'Override (manual)' : 'Auto-derived from latest KPI'}" style="background-color:${sCol.bg}; color:${sCol.fg}; border:1px solid ${sCol.d}33;">
                          <option value="active" ${temp==='active'?'selected':''}>Active</option>
                          <option value="watching" ${temp==='watching'?'selected':''}>Watching</option>
                          <option value="inactive" ${temp==='inactive'?'selected':''}>Not Active</option>
                        </select>`;
                      })()}
                    </td>
                    <td class="px-5 py-3" onclick="event.stopPropagation()">
                      ${latestCo ? (() => {
                        const kCol = KPI[latestCo.kpi] || KPI.in_conversation;
                        return `<select onchange="updateInteractionKpi('${esc(latestCo.id)}', this.value)" class="pill-select" style="background-color:${kCol.bg}; color:${kCol.fg}; border:1px solid ${kCol.d}33;">
                          <option value="action_required" ${latestCo.kpi==='action_required'?'selected':''}>Action Required</option>
                          <option value="info_sent" ${latestCo.kpi==='info_sent'?'selected':''}>Info Sent</option>
                          <option value="in_conversation" ${latestCo.kpi==='in_conversation'?'selected':''}>In Conversation</option>
                          <option value="monitoring" ${latestCo.kpi==='monitoring'?'selected':''}>Monitoring</option>
                          <option value="not_interested" ${latestCo.kpi==='not_interested'?'selected':''}>Not Interested</option>
                        </select>`;
                      })() : `<select onchange="setFirstKpiForCompany('${esc(c.id)}', this.value)" class="cell-edit-select text-xs" style="color: var(--warm); font-style: italic;" title="No interactions yet — pick a KPI to seed the status (creates a placeholder interaction)">
                        <option value="">— set KPI…</option>
                        <option value="action_required">Action Required</option>
                        <option value="info_sent">Info Sent</option>
                        <option value="in_conversation">In Conversation</option>
                        <option value="monitoring">Monitoring</option>
                        <option value="not_interested">Not Interested</option>
                      </select>`}
                    </td>
                    <td class="px-5 py-3 text-xs num" style="color: var(--warm);">${latestCo ? fmtDateShort(latestCo.date) : '—'}</td>
                    <td class="px-5 py-3" onclick="event.stopPropagation()">
                      <div class="flex flex-wrap items-center gap-1">
                        ${projectsCo.length === 0 ? '' : projectsCo.map(p => `<span class="text-[10px] px-1.5 py-0.5 rounded font-medium inline-flex items-center gap-1" style="background: rgba(35,59,52,0.08); color: var(--green); border: 1px solid rgba(35,59,52,0.15);">${esc(p.name)} <button onclick="event.stopPropagation();removeProjectFromCompany('${esc(c.id)}','${esc(p.id)}')" title="Remove ${esc(p.name)} from this company" style="color:#a04330; font-weight:700; line-height:1; padding:0 2px;">×</button></span>`).join('')}
                        ${(() => {
                          const linkable = state.projects.filter(p => !projectsCo.find(pp => pp.id === p.id));
                          if (linkable.length === 0) return '';
                          return `<select onchange="addProjectToCompany('${esc(c.id)}', this.value); this.value='';" class="cell-edit-select text-[10px]" style="color: var(--warm); padding: 2px 18px 2px 6px; min-width: 0;">
                            <option value="">+ link…</option>
                            ${linkable.map(p => `<option value="${esc(p.id)}">${esc(p.name)}</option>`).join('')}
                          </select>`;
                        })()}
                      </div>
                    </td>
                    <td class="px-5 py-3.5">
                      <div class="flex gap-1 justify-end">
                        <button onclick="event.stopPropagation();openCompanyDraft('${esc(c.id)}')" class="text-xs px-2 py-1 rounded border hover:bg-gray-100 inline-flex items-center gap-1" style="color: var(--green); border-color: var(--line);" title="Draft email">
                          <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l9 6 9-6M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                          Email
                        </button>
                        <button onclick="event.stopPropagation();openCompanyDetail('${esc(c.id)}')" class="text-xs px-2 py-1 rounded border hover:bg-gray-100" style="color: var(--warm); border-color: var(--line);">Open</button>
                      </div>
                    </td>
                  </tr>
                  ${expanded ? `<tr><td colspan="9" class="p-0">${renderInlineEditForm('company', c, { title: c.name })}${renderCompanyContactsPanel(c.id)}${renderCompanyInteractionsPanel(c.id)}</td></tr>` : ''}`);
                }).join(''); })()}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function renderContacts() {
  const f = state.contactFilter;

function renderInteractions() {
  const f = state.interactionFilter;
  const filtered = state.interactions.filter(i => {
    if (f.search) {
      const s = f.search.toLowerCase();
      if (!(i.subject||'').toLowerCase().includes(s) && !(i.summary||'').toLowerCase().includes(s)) return false;
    }
    if (f.kpi && i.kpi !== f.kpi) return false;
    if (f.companyId && i.companyId !== f.companyId) return false;
    if (f.projectId && !(Array.isArray(i.projectIds) && i.projectIds.includes(f.projectId))) return false;
    return true;
  });

  // Group by company
  const groups = new Map();
  for (const i of filtered) {
    const key = i.companyId || '__none__';
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(i);
  }
  // Sort interactions within each group by date desc, and sort groups by most recent interaction
  const groupList = [];
  for (const [companyId, items] of groups.entries()) {
    items.sort((a,b) => new Date(b.date||0) - new Date(a.date||0));
    const latestDate = items[0]?.date || 0;
    groupList.push({ companyId, items, latestDate });
  }
  groupList.sort((a,b) => new Date(b.latestDate||0) - new Date(a.latestDate||0));

  document.getElementById('view-interactions').innerHTML = `
    <div class="max-w-7xl mx-auto">
      <div class="flex items-end justify-between mb-8">
        <div>
          <div class="text-[11px] uppercase tracking-widest font-semibold mb-1" style="color: var(--green);">By Company</div>
          <h1 class="font-display text-4xl font-semibold tracking-tight">Interactions <span class="text-slate-300 num">${filtered.length}</span> <span class="text-sm font-normal" style="color: var(--warm);">· ${groupList.length} companies</span></h1>
        </div>
        <button onclick="openNewModal('interaction')" class="gold-btn px-4 py-2.5 text-sm rounded-lg font-semibold shadow-sm inline-flex items-center gap-2">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
          New Interaction
        </button>
      </div>

      <div class="card p-4 mb-4 flex flex-wrap gap-2">
        <div class="relative flex-1 min-w-64">
          <svg class="absolute left-3 top-2.5 text-slate-400" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11a6 6 0 11-12 0 6 6 0 0112 0z"/></svg>
          <input id="search-interactions" type="text" placeholder="Search by subject or summary…" value="${esc(f.search)}"
            oninput="state.interactionFilter.search=this.value; render()"
            class="w-full pl-9 pr-3 py-2 border rounded-lg text-sm" style="border-color: var(--line);">
        </div>
        <select onchange="state.interactionFilter.kpi=this.value; renderInteractions()" class="px-3 py-2 border rounded-lg text-sm" style="border-color: var(--line);">
          <option value="">All KPIs</option>
          <option value="action_required" ${f.kpi==='action_required'?'selected':''}>Action Required</option>
          <option value="info_sent" ${f.kpi==='info_sent'?'selected':''}>Info Sent</option>
          <option value="in_conversation" ${f.kpi==='in_conversation'?'selected':''}>In Conversation</option>
          <option value="monitoring" ${f.kpi==='monitoring'?'selected':''}>Monitoring</option>
          <option value="not_interested" ${f.kpi==='not_interested'?'selected':''}>Not Interested</option>
        </select>
        <select onchange="state.interactionFilter.companyId=this.value; renderInteractions()" class="px-3 py-2 border rounded-lg text-sm max-w-xs" style="border-color: var(--line);">
          <option value="">All companies</option>
          ${state.companies.slice().sort((a,b)=>a.name.localeCompare(b.name)).map(c => `<option value="${esc(c.id)}" ${f.companyId===c.id?'selected':''}>${esc(c.name)}</option>`).join('')}
        </select>
        <select onchange="state.interactionFilter.projectId=this.value; renderInteractions()" class="px-3 py-2 border rounded-lg text-sm max-w-xs" style="border-color: var(--line);">
          <option value="">All projects</option>
          ${state.projects.slice().sort((a,b)=>a.name.localeCompare(b.name)).map(p => `<option value="${esc(p.id)}" ${f.projectId===p.id?'selected':''}>${esc(p.name)}</option>`).join('')}
        </select>
      </div>

      ${filtered.length === 0
        ? `<div class="card p-16 text-center text-slate-400">No interactions found</div>`
        : `<div class="space-y-4">
            ${groupList.map(g => {
              const co = state.companies.find(c => c.id === g.companyId);
              const coName = co ? co.name : '— No company —';
              const temp = co ? getTemperature(co) : null;
              const coCountry = co ? (co.country || '') : '';
              const coType = co ? (typeLabel(co)) : '';
              return `<div class="card overflow-hidden">
                <div class="px-5 py-4 flex items-center gap-3 border-b" style="border-color: var(--line-soft); background: var(--paper-soft);">
                  <div class="w-10 h-10 rounded-lg flex items-center justify-center text-white text-xs font-semibold flex-shrink-0" style="background:${avatarColor(coName)};">${getInitials(coName)}</div>
                  <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2 flex-wrap">
                      ${co ? `<a onclick="event.stopPropagation();openEditModal('company','${esc(co.id)}')" class="font-display text-lg font-medium cursor-pointer hover:underline" style="color: var(--ink);">${esc(coName)}</a>` : `<span class="font-display text-lg font-medium" style="color: var(--warm);">${esc(coName)}</span>`}
                      ${temp ? pill(TEMP, temp) : ''}
                    </div>
                    <div class="text-xs mt-0.5" style="color: var(--warm);">
                      ${coCountry ? esc(coCountry) + ' · ' : ''}${coType ? esc(coType) + ' · ' : ''}${g.items.length} interaction${g.items.length>1?'s':''} · latest ${fmtDate(g.latestDate)}
                    </div>
                  </div>
                </div>
                <div class="divide-y" style="--tw-divide-opacity:1;">
                  ${g.items.map(i => {
                    const ct = state.contacts.find(c => c.id === i.contactId);
                    const projectTags = Array.isArray(i.projectIds) ? i.projectIds.map(pid => state.projects.find(p => p.id === pid)).filter(Boolean) : [];
                    const expanded = isInlineEditing('interaction', i.id);
                    return `<div class="flex items-start gap-4 px-5 py-3.5 row-hover cursor-pointer ${expanded?'bg-[var(--paper-soft)]':''}" onclick="openEditInline('interaction','${esc(i.id)}')">
                      <svg class="flex-shrink-0 mt-1" width="11" height="11" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" style="color: var(--warm); transform: rotate(${expanded?90:0}deg); transition: transform 0.15s;"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
                      <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2 mb-1 flex-wrap" onclick="event.stopPropagation()">
                          <span class="font-medium text-sm" style="color: var(--ink); cursor: pointer;" onclick="openEditInline('interaction','${esc(i.id)}')">${esc(i.subject || '—')}</span>
                          ${i.kind ? `<span class="text-[10px] uppercase tracking-wider px-1.5 py-0.5 rounded" style="background: var(--paper); color: var(--warm);">${esc(i.kind)}</span>` : ''}
                          ${(() => {

                            return `<select onchange="updateInteractionKpi('${esc(i.id)}', this.value)" class="pill-select" style="background-color:${kCol.bg}; color:${kCol.fg}; border:1px solid ${kCol.d}33;">
                              <option value="action_required" ${i.kpi==='action_required'?'selected':''}>Action Required</option>
                              <option value="info_sent" ${i.kpi==='info_sent'?'selected':''}>Info Sent</option>
                              <option value="in_conversation" ${i.kpi==='in_conversation'?'selected':''}>In Conversation</option>
                              <option value="monitoring" ${i.kpi==='monitoring'?'selected':''}>Monitoring</option>
                              <option value="not_interested" ${i.kpi==='not_interested'?'selected':''}>Not Interested</option>
                            </select>`;
                          })()}
                          ${projectTags.map(p => `<span class="text-[10px] px-1.5 py-0.5 rounded font-medium" style="background: rgba(35,59,52,0.08); color: var(--green); border: 1px solid rgba(35,59,52,0.15);">${esc(p.name)}</span>`).join('')}
                          ${i.completed ? `<span class="text-xs" style="color: var(--green);">✓</span>` : ''}
                        </div>
                        ${i.summary ? `<div class="text-sm text-slate-600 line-clamp-2">${esc(i.summary)}</div>` : ''}
                        <div class="text-xs text-slate-400 mt-1.5 flex items-center gap-3 flex-wrap">
                          ${ct ? `<span>${esc(ct.firstName+' '+ct.lastName)}</span>` : ''}
                          ${i.followUpDate ? `<span style="color: #7a5c3c;">↻ Follow-up on ${fmtDate(i.followUpDate)}</span>` : ''}
                        </div>
                      </div>
                      <div class="text-xs num text-right flex-shrink-0" style="color: var(--warm);">
                        <div style="color: var(--ink);">${fmtDateShort(i.date)}</div>
                        <div class="mt-0.5">${relTime(i.date)}</div>
                      </div>
                    </div>
                    ${expanded ? renderInlineEditForm('interaction', i, { title: i.subject || '—' }) : ''}`;
                  }).join('')}
                </div>
              </div>`;
            }).join('')}
          </div>`}
    </div>
  `;
}

const PROJECT_STATUS = {
  active:     { label:'Active',     bg:'rgba(35,59,52,0.08)',   fg:'#233b34', d:'#233b34' },
  not_active: { label:'Not Active', bg:'rgba(172,164,151,0.18)',fg:'#6b6358', d:'#aca497' },
  // Legacy aliases so old data still renders during migration
  on_hold:    { label:'Not Active', bg:'rgba(172,164,151,0.18)',fg:'#6b6358', d:'#aca497' },
  won:        { label:'Not Active', bg:'rgba(172,164,151,0.18)',fg:'#6b6358', d:'#aca497' },
  lost:       { label:'Not Active', bg:'rgba(172,164,151,0.18)',fg:'#6b6358', d:'#aca497' }
};

function projectStats(p) {
  const ints = state.interactions.filter(i => Array.isArray(i.projectIds) && i.projectIds.includes(p.id));
  const companyIds = [...new Set(ints.map(i => i.companyId).filter(Boolean))];
  const latest = ints.slice().sort((a,b) => new Date(b.date||0) - new Date(a.date||0))[0];
  const pending = ints.filter(i => i.kpi === 'action_required' && !i.completed).length;
  return { interactions: ints, companyIds, latest, pending };
}

function fmtEUR(n) {
  if (n == null || n === '') return '—';
  if (n >= 1000000) return '€' + (n/1000000).toFixed(1).replace(/\.0$/,'') + 'M';
  if (n >= 1000) return '€' + (n/1000).toFixed(0) + 'k';
  return '€' + n;
}

function openProjectDetail(id) {
  state.projectDetailId = id;
  renderProjects();
}
function closeProjectDetail() {
  state.projectDetailId = null;
  renderProjects();
}

function renderProjectDetail(p) {
  // Gather all interactions for this project
  const ints = state.interactions
    .filter(i => Array.isArray(i.projectIds) && i.projectIds.includes(p.id))
    .sort((a,b) => new Date(b.date||0) - new Date(a.date||0));

  // Group by company
  const byCompany = new Map();
  for (const i of ints) {
    const key = i.companyId || '__none__';
    if (!byCompany.has(key)) byCompany.set(key, []);
    byCompany.get(key).push(i);
  }

  // Build company rows
  const companyRows = [];
  for (const [companyId, items] of byCompany.entries()) {
    const co = state.companies.find(c => c.id === companyId);
    const latest = items[0];
    companyRows.push({ co, companyId, latest, count: items.length });
  }
  companyRows.sort((a,b) => new Date(b.latest.date||0) - new Date(a.latest.date||0));

  // Action items (action_required + overdue follow-ups)
  const todayDate = new Date(); todayDate.setHours(0,0,0,0);
  const pending = ints.filter(i =>
    (i.kpi === 'action_required' && !i.completed) ||
    (i.followUpDate && new Date(i.followUpDate) < todayDate && !i.completed)
  );

  // Stats
  const latestDate = ints[0]?.date;
  const daysSinceLatest = latestDate ? Math.floor((todayDate - new Date(latestDate)) / (1000*60*60*24)) : null;
  const status = p.status || 'active';

  document.getElementById('view-projects').innerHTML = `
    <div class="max-w-7xl mx-auto">
      <!-- Back -->
      <button onclick="closeProjectDetail()" class="text-xs uppercase tracking-wider font-semibold mb-4 inline-flex items-center gap-1.5 hover:opacity-70" style="color: var(--warm);">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
        Back to projects
      </button>

      <!-- Header -->
      <div class="flex items-start justify-between mb-2">
        <div>
          <div class="text-[11px] uppercase tracking-widest font-semibold mb-1" style="color: var(--green);">Project</div>
          <div class="flex items-center gap-3 flex-wrap">
            <h1 class="font-display text-4xl font-semibold tracking-tight">${esc(p.name)}</h1>
            ${pill(PROJECT_STATUS, status)}
          </div>
          <div class="text-sm mt-2" style="color: var(--warm);">
            ${p.location ? esc(p.location) + ' · ' : ''}${p.type ? esc(p.type) + ' · ' : ''}${p.keys ? p.keys + ' keys · ' : ''}${fmtEUR(p.targetAmount)}
          </div>
        </div>
        <div class="flex gap-2">
          <button onclick="openEditInline('project','${esc(p.id)}')" class="ghost-btn px-4 py-2 text-sm rounded-lg font-medium">${isInlineEditing('project', p.id) ? 'Close edit' : 'Edit'}</button>
          <button onclick="openNewModal('interaction')" class="gold-btn px-4 py-2 text-sm rounded-lg font-semibold inline-flex items-center gap-2">
            <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
            Log Interaction
          </button>
        </div>
      </div>

      ${isInlineEditing('project', p.id) ? `<div class="card overflow-hidden mt-4 mb-2" style="border-color: var(--line);">${renderInlineEditForm('project', p, { title: p.name })}</div>` : ''}

      <!-- Stats row -->
      <div class="grid grid-cols-4 gap-4 mb-6 mt-6">
        <div class="stat-card">
          <div class="text-[10px] uppercase tracking-[0.18em] font-semibold mb-2" style="color: var(--warm);">Companies</div>
          <div class="font-display text-3xl font-medium num">${companyRows.length}</div>
        </div>
        <div class="stat-card">
          <div class="text-[10px] uppercase tracking-[0.18em] font-semibold mb-2" style="color: var(--warm);">Interactions</div>
