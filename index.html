  <style>
    :root {
      --ink:        #262626; /* Light Black */
      --ink-soft:   #3a3a3a;
      --green:      #233b34; /* Dark Green */
      --green-soft: #2d4a42;
      --green-deep: #1a2d28;
      --warm:       #aca497; /* Dark Warm Grey */
      --paper:      #e2dfd6; /* Light Warm Grey */
      --paper-soft: #eceadf;
      --cream:      #f5f3eb;
      --line:       #d4cfc1;
      --line-soft:  #e8e4d6;
    }
    * { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    body { background: var(--paper); color: var(--ink); }
    .font-display { font-family: 'Fraunces', 'PP Fragment Glare', serif; font-feature-settings: "ss01","ss02"; font-variation-settings: "opsz" 96, "SOFT" 30; letter-spacing: -0.01em; }
    .num { font-variant-numeric: tabular-nums; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(11,18,32,0.55); backdrop-filter: blur(4px); z-index: 50; align-items: center; justify-content: center; }
    .modal-overlay.active { display: flex; animation: fadeIn 0.15s ease; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    @keyframes slideUp { from{opacity:0; transform: translateY(8px)} to{opacity:1; transform: translateY(0)} }
    .modal-card { animation: slideUp 0.18s ease; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-radius: 8px; color: rgba(226,223,214,0.55); font-size: 13px; font-weight: 500; transition: all 0.15s; cursor: pointer; letter-spacing: 0.01em; }
    .nav-item:hover { background: rgba(226,223,214,0.06); color: rgba(226,223,214,0.9); }
    .nav-item.active { background: rgba(226,223,214,0.1); color: #f5f3eb; }
    .nav-item.active svg { color: var(--paper); }
    .stat-card { background: var(--cream); border: 1px solid var(--line-soft); border-radius: 4px; padding: 24px; transition: all 0.15s; }
    .stat-card:hover { background: white; border-color: var(--line); }
    .card { background: var(--cream); border: 1px solid var(--line-soft); border-radius: 4px; }
    .row-hover:hover { background: var(--paper-soft); }
    .gold-btn { background: var(--green); color: var(--paper); transition: all 0.15s; letter-spacing: 0.02em; }
    .gold-btn:hover { background: var(--green-deep); }
    .ghost-btn { background: transparent; color: var(--ink); border: 1px solid var(--line); transition: all 0.15s; }
    .ghost-btn:hover { background: var(--paper-soft); border-color: var(--warm); }
    input, select, textarea { background: white; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--green); box-shadow: 0 0 0 3px rgba(35,59,52,0.1); }
    .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
    table tbody tr { transition: background 0.1s; }
    .scroll-shadow { background: linear-gradient(white 30%, rgba(255,255,255,0)), linear-gradient(rgba(255,255,255,0), white 70%) 0 100%, radial-gradient(farthest-side at 50% 0, rgba(0,0,0,0.1), rgba(0,0,0,0)), radial-gradient(farthest-side at 50% 100%, rgba(0,0,0,0.1), rgba(0,0,0,0)) 0 100%; background-repeat: no-repeat; background-size: 100% 40px, 100% 40px, 100% 14px, 100% 14px; background-attachment: local, local, scroll, scroll; }
    /* Read-only mode hides creation/edit affordances */
    body.read-only [onclick^="openNewModal"],
    body.read-only button[onclick^="event.stopPropagation();openEditModal"] { display: none !important; }
    body.read-only [onclick^="openEditModal"] { cursor: default !important; }
    body.read-only tr.row-hover:hover { background: transparent !important; }
  </style>

<body class="min-h-screen">

  <!-- ============ SIDEBAR ============ -->
  <aside class="fixed left-0 top-0 bottom-0 w-60 flex flex-col" style="background: var(--green);">
    <div class="px-6 pt-8 pb-10">
      <div class="flex items-center gap-3.5">
        <svg width="34" height="46" viewBox="0 0 34 46" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="BOA Hotels monogram">
          <rect x="1.5" y="1.5" width="31" height="43" stroke="#e2dfd6" stroke-width="0.9" fill="none"></rect>
          <text x="17" y="19" text-anchor="middle" font-family="Fraunces, 'PP Fragment Glare', serif" font-size="14" font-weight="400" fill="#e2dfd6" style="font-variation-settings: 'opsz' 144;">B</text>
          <path d="M 5.5 25 Q 17 21 28.5 25" stroke="#e2dfd6" stroke-width="0.9" fill="none" stroke-linecap="round"></path>

        </svg>
        <div>
          <div class="font-display text-[15px] font-normal leading-none tracking-[0.18em]" style="color: var(--paper);">BOA HOTELS</div>
          <div class="text-[9px] uppercase tracking-[0.25em] mt-2" style="color: rgba(226,223,214,0.55);">CRM</div>

    </div>

// ============================================================
//  ENCRYPTION (AES-256-GCM with PBKDF2-derived key)
// ============================================================
const PBKDF2_ITERATIONS = 250000;

async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    'raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']
  );
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: PBKDF2_ITERATIONS, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    false,
    ['encrypt','decrypt']
  );
}

function bytesToB64(bytes) {
  let s = '';
  for (const b of bytes) s += String.fromCharCode(b);
  return btoa(s);
}
function b64ToBytes(b64) {
  const s = atob(b64);
  const bytes = new Uint8Array(s.length);
  for (let i = 0; i < s.length; i++) bytes[i] = s.charCodeAt(i);
  return bytes;
}

async function encryptPayload(obj, password) {
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await deriveKey(password, salt);
  const plaintext = new TextEncoder().encode(JSON.stringify(obj));
  const ciphertext = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, plaintext);
  return {
    v: 1,
    salt: bytesToB64(salt),
    iv: bytesToB64(iv),
    data: bytesToB64(new Uint8Array(ciphertext))
  };
}

async function decryptPayload(payload, password) {
  const salt = b64ToBytes(payload.salt);
  const iv = b64ToBytes(payload.iv);
  const ct = b64ToBytes(payload.data);
  const key = await deriveKey(password, salt);
  const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
  return JSON.parse(new TextDecoder().decode(plain));
}

const state = {
  companies: [], contacts: [], interactions: [], projects: [],
  currentView: 'dashboard',
  editingType: null, editingId: null, isNew: false,
  companyFilter: { search: '', category: '', type: '', temp: '' },
  contactFilter: { search: '', companyId: '' },
  interactionFilter: { search: '', kpi: '', companyId: '', projectId: '' },
  projectFilter: { search: '', status: '' }
};

// ============================================================
//  FILE SYSTEM ACCESS
// ============================================================
let fileHandle = null;
let fileName = '';
const FS_SUPPORTED = 'showOpenFilePicker' in window;

function openHandleDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('boa-crm-handles', 1);
    req.onupgradeneeded = () => req.result.createObjectStore('handles');
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function persistHandle(handle) {
  try {
    const db = await openHandleDB();
    const tx = db.transaction('handles', 'readwrite');
    tx.objectStore('handles').put(handle, 'main');
    return new Promise(res => tx.oncomplete = res);
  } catch(e) { console.warn('persistHandle failed', e); }
}

async function loadHandle() {
  try {
    const db = await openHandleDB();
    return new Promise(resolve => {
      const tx = db.transaction('handles', 'readonly');
      const req = tx.objectStore('handles').get('main');
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => resolve(null);
    });
  } catch(e) { return null; }
}

async function clearHandle() {
  try {
    const db = await openHandleDB();
    const tx = db.transaction('handles', 'readwrite');
    tx.objectStore('handles').delete('main');
    return new Promise(res => tx.oncomplete = res);
  } catch(e) {}
}

async function connectFile() {
  if (!FS_SUPPORTED) {
    alert('Your browser does not support direct file access.\nUse Chrome or Edge.\n\nIn the meantime, use Import/Export JSON.');
    return;
  }
  try {
    const [handle] = await window.showOpenFilePicker({
      types: [{ description: 'CRM Data', accept: { 'application/json': ['.json'] } }],
      multiple: false,
      suggestedName: 'boa-crm-data.json'
    });
    fileHandle = handle;
    fileName = handle.name;
    await persistHandle(handle);
    await loadFromFile();
    updateButtons();
  } catch(err) {
    if (err.name !== 'AbortError') alert('Error connecting to file: ' + err.message);
  }
}

async function loadFromFile() {
  if (!fileHandle) return false;
  try {
    const file = await fileHandle.getFile();
    const text = await file.text();
    const data = text.trim() ? JSON.parse(text) : {};
    state.companies = Array.isArray(data.companies) ? data.companies : [];
    state.contacts = Array.isArray(data.contacts) ? data.contacts : [];
    state.interactions = Array.isArray(data.interactions) ? data.interactions : [];
    state.projects = Array.isArray(data.projects) ? data.projects : [];
    updateStatus('synced');
    render();
    return true;
  } catch(err) {
    console.error('loadFromFile', err);
    alert('Error reading file: ' + err.message);
    return false;
  }
}

async function saveToFile() {
  if (!fileHandle) {
    saveToStorage();
    return;
  }
  try {
    const perm = await fileHandle.queryPermission({ mode: 'readwrite' });
    if (perm !== 'granted') {
      const newPerm = await fileHandle.requestPermission({ mode: 'readwrite' });
      if (newPerm !== 'granted') throw new Error('No write permission');
    }
    const data = { initialized:true, companies:state.companies, contacts:state.contacts, interactions:state.interactions, projects:state.projects };
    const writable = await fileHandle.createWritable();
    await writable.write(JSON.stringify(data, null, 2));
    await writable.close();
    updateStatus('saved');
  } catch(err) {
    console.error('saveToFile', err);
    alert('Error saving: ' + err.message);
    saveToStorage();
  }
}

async function syncFile() {
  if (!fileHandle) { await connectFile(); return; }
  await loadFromFile();
}

async function disconnectFile() {
  if (!confirm('Disconnect from file? You will go back to browser storage.')) return;
  fileHandle = null;
  fileName = '';
  await clearHandle();
  updateButtons();
  updateStatus();
}

function updateButtons() {
  const ids = ['btn-connect','btn-sync','btn-export','btn-share','btn-publish','btn-import'];
  if (READ_ONLY) {
    ids.forEach(id => { const el = document.getElementById(id); if (el) el.style.display = 'none'; });
    return;
  }
  const connected = !!fileHandle;
  const hasData = state.companies.length > 0 || state.contacts.length > 0;
  document.getElementById('btn-connect').style.display = connected ? 'none' : 'flex';
  document.getElementById('btn-sync').style.display = connected ? 'flex' : 'none';
  document.getElementById('btn-export').style.display = hasData ? 'flex' : 'none';
  document.getElementById('btn-share').style.display = hasData ? 'flex' : 'none';
  document.getElementById('btn-publish').style.display = hasData ? 'flex' : 'none';
  document.getElementById('btn-import').style.display = connected ? 'none' : 'flex';
}

// ============================================================
//  PERSISTENCE (localStorage fallback)
// ============================================================
function storageAvailable() {
  try { localStorage.setItem('_test', '1'); localStorage.removeItem('_test'); return true; }
  catch(e) { return false; }
}

function loadFromStorage() {
  if (!storageAvailable()) return false;
  try {
    const saved = localStorage.getItem('boa-crm-data');
    if (saved) {
      const data = JSON.parse(saved);
      state.companies = data.companies || [];
      state.contacts = data.contacts || [];
      state.interactions = data.interactions || [];
      state.projects = data.projects || [];
      updateStatus();
      return true;
    }
  } catch(e) { console.warn('loadFromStorage', e); }
  return false;
}

function saveToStorage() {
  if (!storageAvailable()) {
    console.warn('localStorage unavailable (probably opened via data: or in preview). Data will not persist until you connect to a file.');
    updateStatus();
    return;
  }
  try {
    localStorage.setItem('boa-crm-data', JSON.stringify({
      initialized:true, companies:state.companies, contacts:state.contacts, interactions:state.interactions, projects:state.projects
    }));
    updateStatus('saved');
  } catch(e) { console.warn('saveToStorage', e); }
}

// Unified save — uses file if connected, else localStorage
async function saveData() {
  if (fileHandle) await saveToFile();
  else saveToStorage();
}

  }
  el.innerHTML = `<div>${line1}</div><div style="margin-top: 2px;" class="num">${line2}</div>`;
}

function importJSON(event) {
  const input = event.target;
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onerror = () => alert('Error reading file: ' + reader.error);
  reader.onload = async (e) => {
    let data;
    try {
      data = JSON.parse(e.target.result);
    } catch(err) {
      console.error('[importJSON] JSON parse failed:', err);
      alert('Invalid JSON: ' + err.message);
      return;
    }
    try {
      state.companies = Array.isArray(data.companies) ? data.companies : [];
      state.contacts = Array.isArray(data.contacts) ? data.contacts : [];
      state.interactions = Array.isArray(data.interactions) ? data.interactions : [];
      state.projects = Array.isArray(data.projects) ? data.projects : [];
    } catch(err) {
      console.error('[importJSON] state assign failed:', err);
      alert('Unexpected JSON structure: ' + err.message);
      return;
    }
    try {
      await saveData();
    } catch(err) {
      console.error('[importJSON] save failed:', err);
      alert('Error saving: ' + err.message);
    }
    try {
      render();
    } catch(err) {
      console.error('[importJSON] render failed:', err);
      alert('Error rendering interface: ' + err.message + '\n\nCheck the console (F12).');
      return;
    }
    input.value = '';
  };
  reader.readAsText(file);
}

function exportJSON() {
  const data = { initialized:true, companies:state.companies, contacts:state.contacts, interactions:state.interactions };
  const blob = new Blob([JSON.stringify(data,null,2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `boa-crm-export-${new Date().toISOString().slice(0,10)}.json`; a.click();
  URL.revokeObjectURL(url);
}

function getPublishConfig() {
  try {
    const raw = localStorage.getItem('boa-crm-publish');
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

function savePublishConfig(cfg) {
  localStorage.setItem('boa-crm-publish', JSON.stringify(cfg));
}

function getSelfHtml() {
  // Clone the document so we don't mutate live UI
  const clone = document.documentElement.cloneNode(true);

  // Clear dynamic content in clone (will be re-rendered on load in the share file)
  ['dashboard','companies','contacts','interactions'].forEach(v => {
    const el = clone.querySelector('#view-' + v);
    if (el) el.innerHTML = '';
  });
  clone.querySelectorAll('[id^="badge-"]').forEach(el => el.textContent = '');
  const status = clone.querySelector('#data-status');
  if (status) status.innerHTML = '';

  // Reset modal state
  const modal = clone.querySelector('#modal-overlay');
  if (modal) modal.className = 'modal-overlay';

  // Remove dynamically-added banners or password gate from clone
  ['password-gate'].forEach(id => clone.querySelector('#'+id)?.remove());
  clone.querySelectorAll('body > div.fixed').forEach(el => el.remove());

  return '<!DOCTYPE html>\n' + clone.outerHTML;
}

async function buildShareHtml(encryptWithPassword) {
  // Try fetch first (works when served via http); fall back to DOM serialization (works on file://)
  let html;
  try {
    const res = await fetch(window.location.href, { cache: 'no-store' });
    if (!res.ok) throw new Error('fetch not ok');
    html = await res.text();
  } catch(e) {
    html = getSelfHtml();
  }

  const data = { companies: state.companies, contacts: state.contacts, interactions: state.interactions, projects: state.projects };

  if (encryptWithPassword) {
    const encrypted = await encryptPayload(data, encryptWithPassword);
    const payload = JSON.stringify(encrypted).replace(/<\/script>/gi, '<\\/script>');
    html = html.replace(
      /const ENCRYPTED_DATA = null; \/\*__ENCRYPTED_DATA__\*\//,
      `const ENCRYPTED_DATA = ${payload}; /*__ENCRYPTED_DATA__*/`
    );
  } else {
    const payload = JSON.stringify(data).replace(/<\/script>/gi, '<\\/script>');
    html = html.replace(
      /const SHARED_DATA = null; \/\*__SHARED_DATA__\*\//,
      `const SHARED_DATA = ${payload}; /*__SHARED_DATA__*/`
    );
  }
  return html;
}

function utf8ToBase64(str) {
  // Handle UTF-8 properly (btoa fails on non-ASCII)
  return btoa(unescape(encodeURIComponent(str)));
}

async function publishToWeb() {
  const cfg = getPublishConfig();
  if (!cfg || !cfg.owner || !cfg.repo || !cfg.token || !cfg.viewerPassword) {
    openPublishSettings();
    return;
  }
  const btn = document.getElementById('btn-publish');
  const originalHtml = btn.innerHTML;
  btn.innerHTML = '<svg width="18" height="18" class="animate-spin" fill="none" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" stroke-dasharray="40 60"/></svg> Publishing…';
  btn.style.pointerEvents = 'none';

  try {
    const html = await buildShareHtml(cfg.viewerPassword);
    const path = 'index.html';
    const apiUrl = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${path}`;
    const headers = {
      'Authorization': `Bearer ${cfg.token}`,
      'Accept': 'application/vnd.github+json',
      'Content-Type': 'application/json'
    };

    // Get current SHA if file exists
    let sha = null;
    try {
      const existing = await fetch(apiUrl, { headers });
      if (existing.ok) {
        const j = await existing.json();
        sha = j.sha;
      }
    } catch(e) {}

    const body = {
      message: `Update CRM snapshot · ${new Date().toISOString()}`,
      content: utf8ToBase64(html),
      branch: cfg.branch || 'main'
    };
    if (sha) body.sha = sha;

    const resp = await fetch(apiUrl, {
      method: 'PUT',
      headers,
      body: JSON.stringify(body)
    });

    if (!resp.ok) {
      const errBody = await resp.text();
      throw new Error(`GitHub returned ${resp.status}: ${errBody.slice(0, 300)}`);
    }

    const publicUrl = `https://${cfg.owner}.github.io/${cfg.repo}/`;
    cfg.lastPublishedAt = new Date().toISOString();
    cfg.url = publicUrl;
    savePublishConfig(cfg);

    showPublishSuccess(publicUrl);
  } catch(err) {
    console.error('publishToWeb', err);
    alert('Publish failed:\n\n' + err.message + '\n\nCheck your token has "repo" scope and the repo exists.');
  } finally {
    btn.innerHTML = originalHtml;
    btn.style.pointerEvents = '';
  }
}

function savePublishSettingsAndClose(btn) {
  const cfg = {
    owner: document.getElementById('cfg-owner').value.trim(),
    repo: document.getElementById('cfg-repo').value.trim(),
    token: document.getElementById('cfg-token').value.trim(),
    viewerPassword: document.getElementById('cfg-viewerPassword').value,
    branch: document.getElementById('cfg-branch').value.trim() || 'main'
  };
  if (!cfg.owner || !cfg.repo || !cfg.token) {
    alert('Username, repository and token are required.');
    return;
  }
  if (!cfg.viewerPassword || cfg.viewerPassword.length < 8) {
    alert('Viewer password is required (at least 8 characters). This is what protects your data from anyone who finds the URL.');
    return;
  }
  savePublishConfig(cfg);
  btn.closest('.modal-overlay').remove();
  publishToWeb();
}

async function generateShareFile() {
  if (!state.companies.length && !state.contacts.length) {
    alert('No data to share yet.');
    return;
  }
  try {
    // Get the current HTML source (we need a copy of THIS file)
    const res = await fetch(window.location.href);
    let html = await res.text();
    // Inject the data
    const data = { companies: state.companies, contacts: state.contacts, interactions: state.interactions };
    const payload = JSON.stringify(data).replace(/<\/script>/gi, '<\\/script>');
    html = html.replace(
      /const SHARED_DATA = null; \/\*__SHARED_DATA__\*\//,
      `const SHARED_DATA = ${payload}; /*__SHARED_DATA__*/`
    );
    // Download
    const blob = new Blob([html], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `boa-crm-share-${new Date().toISOString().slice(0,10)}.html`;
    a.click();
    URL.revokeObjectURL(url);
  } catch(err) {
    console.error(err);
    alert('Could not generate share file: ' + err.message + '\n\nThe HTML must be opened from disk (not preview) to enable this feature.');
  }
}

    document.getElementById('nav-'+v).classList.toggle('active', v === view);

function render() {

  else if (state.currentView === 'contacts') renderContacts();
  else if (state.currentView === 'interactions') renderInteractions();
  else if (state.currentView === 'projects') renderProjects();
}

function esc(s) { return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// BOA palette: terracotta/clay (hot), warm tan (warm), dark green (active), warm grey (cold)
const TEMP = {

function pill(map, key) {
  const c = map[key] || { label:key||'—', bg:'rgba(172,164,151,0.15)', fg:'#6b6358', d:'#aca497' };
  return `<span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-sm text-[11px] font-medium tracking-wide" style="background:${c.bg};color:${c.fg};border:1px solid ${c.d}33;"><span style="width:5px;height:5px;border-radius:50%;display:inline-block;background:${c.d};"></span>${c.label}</span>`;
}

function getTemperature(co) {
  if (co.temperatureOverride) return co.temperatureOverride;
  const list = state.interactions.filter(i => i.companyId === co.id);
  if (!list.length) return 'cold';
  const latest = list.slice().sort((a,b) => new Date(b.date||0) - new Date(a.date||0))[0];
  if (latest.kpi === 'action_required') return 'hot';
  if (latest.kpi === 'active') return 'warm';
  if (latest.kpi === 'closed') return 'cold';
  return 'warm';
}

function fmtDate(iso) { if (!iso) return '—'; try { return new Date(iso).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); } catch(e){ return iso; } }
function fmtDateShort(iso) { if (!iso) return '—'; try { return new Date(iso).toLocaleDateString('en-GB',{day:'2-digit',month:'short'}); } catch(e){ return iso; } }
function relTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso); const diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return `${Math.floor(diff/60)} min ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)} h ago`;
  if (diff < 604800) return `${Math.floor(diff/86400)} d ago`;
  return fmtDate(iso);
}

function getInitials(name) {
  return (name||'?').split(/\s+/).slice(0,2).map(w => w[0]||'').join('').toUpperCase();
}

const AVATAR_COLORS = ['#233b34','#2d4a42','#3a5a4e','#4a5c4a','#5a6650','#6b6850','#8f7a55','#aca497','#5c4a3a','#3a443a'];
function avatarColor(s) {
  let h=0; for(const c of (s||'')) h = (h*31 + c.charCodeAt(0)) & 0xffffffff;
  return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
}

function renderDashboard() {
  const total = state.companies.length;
  const investors = state.companies.filter(c => c.type === 'investor').length;
  const connectors = state.companies.filter(c => c.type === 'connector').length;
  const hot = state.companies.filter(c => getTemperature(c) === 'hot').length;
  const warm = state.companies.filter(c => getTemperature(c) === 'warm').length;
  const cold = state.companies.filter(c => getTemperature(c) === 'cold').length;

  const pending = state.interactions.filter(i => i.kpi === 'action_required' && !i.completed).length;

  const now = new Date();
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
  const thisMonth = state.interactions.filter(i => i.date && new Date(i.date) >= monthStart).length;
  const lastMonthStart = new Date(now.getFullYear(), now.getMonth()-1, 1);
  const lastMonth = state.interactions.filter(i => i.date && new Date(i.date) >= lastMonthStart && new Date(i.date) < monthStart).length;
  const monthDelta = lastMonth ? Math.round(((thisMonth - lastMonth) / lastMonth) * 100) : null;

  const recent = [...state.interactions].sort((a,b) => new Date(b.date||0) - new Date(a.date||0)).slice(0, 6);
  const hotCompanies = state.companies.filter(c => getTemperature(c) === 'hot').slice(0, 6);

  // Category distribution
  const byCat = {};
  state.companies.forEach(c => { if (c.category) byCat[c.category] = (byCat[c.category]||0) + 1; });
  const cats = Object.entries(byCat).sort((a,b) => b[1]-a[1]).slice(0, 7);
  const maxCat = cats.length ? cats[0][1] : 1;

  // === Action items ===
  const todayDate = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const weekFromNow = new Date(todayDate); weekFromNow.setDate(weekFromNow.getDate() + 7);
  const thirtyDaysAgo = new Date(todayDate); thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);

  const overdue = state.interactions.filter(i =>
    i.followUpDate && new Date(i.followUpDate) < todayDate && !i.completed
  ).sort((a,b) => new Date(a.followUpDate) - new Date(b.followUpDate));

  const thisWeek = state.interactions.filter(i => {
    if (!i.followUpDate || i.completed) return false;
    const d = new Date(i.followUpDate);
    return d >= todayDate && d <= weekFromNow;
  }).sort((a,b) => new Date(a.followUpDate) - new Date(b.followUpDate));

  const actionReq = state.interactions.filter(i =>
    i.kpi === 'action_required' && !i.completed
  ).sort((a,b) => new Date(b.date||0) - new Date(a.date||0));

  const goingCold = [];
  for (const co of state.companies) {
    const list = state.interactions.filter(i => i.companyId === co.id);
    if (!list.length) continue;
    const latest = list.slice().sort((a,b) => new Date(b.date||0) - new Date(a.date||0))[0];
    const latestDate = new Date(latest.date || 0);
    const temp = getTemperature(co);
    if ((temp === 'hot' || temp === 'warm') && latestDate < thirtyDaysAgo) {
      const days = Math.floor((todayDate - latestDate) / (1000*60*60*24));
      goingCold.push({ company: co, latest, days });
    }
  }
  goingCold.sort((a,b) => b.days - a.days);

  const empty = total === 0;

  const actionItemCard = (label, count, items, renderItem, accentColor) => `
    <div class="card p-5">
      <div class="flex items-baseline justify-between mb-3">
        <div class="flex items-center gap-2">
          <span style="width:8px;height:8px;border-radius:50%;display:inline-block;background:${accentColor};"></span>
          <h3 class="text-[10px] uppercase tracking-[0.18em] font-semibold" style="color: var(--warm);">${label}</h3>
        </div>
        <span class="font-display text-2xl font-medium num" style="color: ${count > 0 ? accentColor : 'var(--warm)'};">${count}</span>
      </div>
      ${count === 0
        ? `<div class="text-xs py-4 text-center" style="color: var(--warm); opacity: 0.6;">All clear</div>`
        : `<div class="space-y-2">
            ${items.slice(0, 4).map(renderItem).join('')}

function renderCompanies() {
  const f = state.companyFilter;
  const filtered = state.companies.filter(c => {
    if (f.search) {
      const s = f.search.toLowerCase();
      if (!c.name.toLowerCase().includes(s) && !(c.country||'').toLowerCase().includes(s)) return false;
    }
    if (f.category && c.category !== f.category) return false;
    if (f.type && c.type !== f.type) return false;
    if (f.temp && getTemperature(c) !== f.temp) return false;
    return true;
  });
  const cats = [...new Set(state.companies.map(c => c.category).filter(Boolean))].sort();

  document.getElementById('view-companies').innerHTML = `
    <div class="max-w-7xl mx-auto">
      <div class="flex items-end justify-between mb-8">
        <div>
          <div class="text-[11px] uppercase tracking-widest font-semibold mb-1" style="color: var(--green);">Directory</div>
          <h1 class="font-display text-4xl font-semibold tracking-tight">Companies <span class="text-slate-300 num">${filtered.length}</span></h1>
        </div>
        <button onclick="openNewModal('company')" class="gold-btn px-4 py-2.5 text-sm rounded-lg font-semibold shadow-sm inline-flex items-center gap-2">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
          New Company
        </button>
      </div>

      <div class="card p-4 mb-4 flex flex-wrap gap-2">
        <div class="relative flex-1 min-w-64">
          <svg class="absolute left-3 top-2.5 text-slate-400" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11a6 6 0 11-12 0 6 6 0 0112 0z"/></svg>
          <input type="text" placeholder="Search company…" value="${esc(f.search)}"
            oninput="state.companyFilter.search=this.value; renderCompanies()"
            class="w-full pl-9 pr-3 py-2 border rounded-lg text-sm" style="border-color: var(--line);">
        </div>
        <select onchange="state.companyFilter.category=this.value; renderCompanies()" class="px-3 py-2 border rounded-lg text-sm" style="border-color: var(--line);">
          <option value="">All categories</option>
          ${cats.map(c => `<option value="${esc(c)}" ${f.category===c?'selected':''}>${esc(c)}</option>`).join('')}
        </select>
        <select onchange="state.companyFilter.type=this.value; renderCompanies()" class="px-3 py-2 border rounded-lg text-sm" style="border-color: var(--line);">
          <option value="">All types</option>
          <option value="investor" ${f.type==='investor'?'selected':''}>Investor</option>
          <option value="connector" ${f.type==='connector'?'selected':''}>Connector</option>
        </select>
        <select onchange="state.companyFilter.temp=this.value; renderCompanies()" class="px-3 py-2 border rounded-lg text-sm" style="border-color: var(--line);">
          <option value="">All temperatures</option>
          <option value="hot" ${f.temp==='hot'?'selected':''}>Hot</option>
          <option value="warm" ${f.temp==='warm'?'selected':''}>Warm</option>
          <option value="cold" ${f.temp==='cold'?'selected':''}>Cold</option>
          <option value="not_interested" ${f.temp==='not_interested'?'selected':''}>Not Interested</option>
        </select>
      </div>

      <div class="card overflow-hidden">
        <table class="w-full text-sm">
          <thead class="border-b" style="border-color: var(--line);">
            <tr class="text-xs uppercase tracking-wider text-slate-500">
              <th class="text-left px-5 py-3 font-semibold">Company</th>
              <th class="text-left px-5 py-3 font-semibold">Country</th>
              <th class="text-left px-5 py-3 font-semibold">Category</th>

              <th class="text-left px-5 py-3 font-semibold">Temperature</th>
              <th class="text-right px-5 py-3 font-semibold">Contacts</th>
              <th class="w-12"></th>
            </tr>
          </thead>
          <tbody>
            ${filtered.length === 0
              ? `<tr><td colspan="7" class="text-center py-16 text-slate-400">No companies found</td></tr>`
              : filtered.map(c => {
                  const temp = getTemperature(c);
                  const n = state.contacts.filter(ct => ct.companyId === c.id).length;
                  return `<tr class="row-hover cursor-pointer border-b last:border-0" style="border-color: var(--line);" onclick="openEditModal('company','${esc(c.id)}')">
                    <td class="px-5 py-3.5">
                      <div class="flex items-center gap-3">
                        <div class="w-9 h-9 rounded-lg flex items-center justify-center text-white text-[11px] font-semibold flex-shrink-0" style="background:${avatarColor(c.name)};">${getInitials(c.name)}</div>

                    <td class="px-5 py-3.5 text-slate-300">›</td>
                  </tr>`;
                }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;

                    <td class="px-5 py-3.5 text-slate-600 num">${esc(c.phone)||'<span class="text-slate-300">—</span>'}</td>

}

function renderInteractions() {
  const f = state.interactionFilter;
  const filtered = state.interactions.filter(i => {
    if (f.search) {
      const s = f.search.toLowerCase();
      if (!(i.subject||'').toLowerCase().includes(s) && !(i.summary||'').toLowerCase().includes(s)) return false;
    }
    if (f.kpi && i.kpi !== f.kpi) return false;
    if (f.companyId && i.companyId !== f.companyId) return false;
    if (f.projectId && !(Array.isArray(i.projectIds) && i.projectIds.includes(f.projectId))) return false;
    return true;
  });

  // Group by company
  const groups = new Map();
  for (const i of filtered) {
    const key = i.companyId || '__none__';
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(i);
  }
  // Sort interactions within each group by date desc, and sort groups by most recent interaction
  const groupList = [];
  for (const [companyId, items] of groups.entries()) {
    items.sort((a,b) => new Date(b.date||0) - new Date(a.date||0));
    const latestDate = items[0]?.date || 0;
    groupList.push({ companyId, items, latestDate });
  }
  groupList.sort((a,b) => new Date(b.latestDate||0) - new Date(a.latestDate||0));

  document.getElementById('view-interactions').innerHTML = `
    <div class="max-w-7xl mx-auto">
      <div class="flex items-end justify-between mb-8">
        <div>
          <div class="text-[11px] uppercase tracking-widest font-semibold mb-1" style="color: var(--green);">By Company</div>
          <h1 class="font-display text-4xl font-semibold tracking-tight">Interactions <span class="text-slate-300 num">${filtered.length}</span> <span class="text-sm font-normal" style="color: var(--warm);">· ${groupList.length} companies</span></h1>
        </div>
        <button onclick="openNewModal('interaction')" class="gold-btn px-4 py-2.5 text-sm rounded-lg font-semibold shadow-sm inline-flex items-center gap-2">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
          New Interaction
        </button>
      </div>

      <div class="card p-4 mb-4 flex flex-wrap gap-2">
        <div class="relative flex-1 min-w-64">
          <svg class="absolute left-3 top-2.5 text-slate-400" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11a6 6 0 11-12 0 6 6 0 0112 0z"/></svg>
          <input type="text" placeholder="Search by subject or summary…" value="${esc(f.search)}"
            oninput="state.interactionFilter.search=this.value; renderInteractions()"
            class="w-full pl-9 pr-3 py-2 border rounded-lg text-sm" style="border-color: var(--line);">
        </div>
        <select onchange="state.interactionFilter.kpi=this.value; renderInteractions()" class="px-3 py-2 border rounded-lg text-sm" style="border-color: var(--line);">
          <option value="">All KPIs</option>
          <option value="action_required" ${f.kpi==='action_required'?'selected':''}>Action required</option>
          <option value="active" ${f.kpi==='active'?'selected':''}>Active</option>
          <option value="monitoring" ${f.kpi==='monitoring'?'selected':''}>Monitoring</option>
          <option value="closed" ${f.kpi==='closed'?'selected':''}>Closed</option>
        </select>
        <select onchange="state.interactionFilter.companyId=this.value; renderInteractions()" class="px-3 py-2 border rounded-lg text-sm max-w-xs" style="border-color: var(--line);">
          <option value="">All companies</option>
          ${state.companies.slice().sort((a,b)=>a.name.localeCompare(b.name)).map(c => `<option value="${esc(c.id)}" ${f.companyId===c.id?'selected':''}>${esc(c.name)}</option>`).join('')}
        </select>
        <select onchange="state.interactionFilter.projectId=this.value; renderInteractions()" class="px-3 py-2 border rounded-lg text-sm max-w-xs" style="border-color: var(--line);">
          <option value="">All projects</option>
          ${state.projects.slice().sort((a,b)=>a.name.localeCompare(b.name)).map(p => `<option value="${esc(p.id)}" ${f.projectId===p.id?'selected':''}>${esc(p.name)}</option>`).join('')}
        </select>
      </div>

      ${filtered.length === 0
        ? `<div class="card p-16 text-center text-slate-400">No interactions found</div>`
        : `<div class="space-y-4">
            ${groupList.map(g => {
              const co = state.companies.find(c => c.id === g.companyId);
              const coName = co ? co.name : '— No company —';
              const temp = co ? getTemperature(co) : null;
              const coCountry = co ? (co.country || '') : '';
              const coType = co ? (co.type === 'investor' ? 'Investor' : 'Connector') : '';
              return `<div class="card overflow-hidden">
                <div class="px-5 py-4 flex items-center gap-3 border-b" style="border-color: var(--line-soft); background: var(--paper-soft);">
                  <div class="w-10 h-10 rounded-lg flex items-center justify-center text-white text-xs font-semibold flex-shrink-0" style="background:${avatarColor(coName)};">${getInitials(coName)}</div>
                  <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2 flex-wrap">
                      ${co ? `<a onclick="event.stopPropagation();openEditModal('company','${esc(co.id)}')" class="font-display text-lg font-medium cursor-pointer hover:underline" style="color: var(--ink);">${esc(coName)}</a>` : `<span class="font-display text-lg font-medium" style="color: var(--warm);">${esc(coName)}</span>`}

                      <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2 mb-1 flex-wrap">
                          <span class="font-medium text-sm" style="color: var(--ink);">${esc(i.subject || '—')}</span>
                          ${i.kind ? `<span class="text-[10px] uppercase tracking-wider px-1.5 py-0.5 rounded" style="background: var(--paper); color: var(--warm);">${esc(i.kind)}</span>` : ''}
                          ${pill(KPI, i.kpi)}

const PROJECT_STATUS = {
  active:  { label:'Active',      bg:'rgba(35,59,52,0.08)',   fg:'#233b34', d:'#233b34' },
  on_hold: { label:'On Hold',     bg:'rgba(143,111,72,0.1)',  fg:'#7a5c3c', d:'#8f6f48' },
  won:     { label:'Closed Won',  bg:'rgba(35,59,52,0.15)',   fg:'#1a2d28', d:'#1a2d28' },
  lost:    { label:'Closed Lost', bg:'rgba(172,164,151,0.18)',fg:'#6b6358', d:'#aca497' }
};

function projectStats(p) {
  const ints = state.interactions.filter(i => Array.isArray(i.projectIds) && i.projectIds.includes(p.id));
  const companyIds = [...new Set(ints.map(i => i.companyId).filter(Boolean))];
  const latest = ints.slice().sort((a,b) => new Date(b.date||0) - new Date(a.date||0))[0];
  const pending = ints.filter(i => i.kpi === 'action_required' && !i.completed).length;
  return { interactions: ints, companyIds, latest, pending };
}

function fmtEUR(n) {
  if (n == null || n === '') return '—';
  if (n >= 1000000) return '€' + (n/1000000).toFixed(1).replace(/\.0$/,'') + 'M';
  if (n >= 1000) return '€' + (n/1000).toFixed(0) + 'k';
  return '€' + n;
}

// ============================================================
//  MODAL
// ============================================================
function openEditModal(type, id) {
  if (READ_ONLY) return;
  const arr = getArray(type);
  const item = arr.find(x => x.id === id);
  if (!item) return;
  state.editingType = type; state.editingId = id; state.isNew = false;
  const labels = { company:['Company','Edit Company'], contact:['Contact','Edit Contact'], interaction:['Interaction','Edit Interaction'], project:['Project','Edit Project'] };
  document.getElementById('modal-eyebrow').textContent = labels[type][0];
  document.getElementById('modal-title').textContent = state.isNew ? labels[type][1].replace('Edit','New') : (item.name || ((item.firstName||'')+' '+(item.lastName||'')).trim() || item.subject || labels[type][1]);
  document.getElementById('modal-delete-btn').style.display = '';
  renderModalBody(type, item);
  document.getElementById('modal-overlay').classList.add('active');
}

function openNewModal(type) {
  if (READ_ONLY) return;
  state.editingType = type; state.editingId = null; state.isNew = true;
  const labels = { company:['Company','New Company'], contact:['Contact','New Contact'], interaction:['Interaction','New Interaction'], project:['Project','New Project'] };
  document.getElementById('modal-eyebrow').textContent = labels[type][0];
  document.getElementById('modal-title').textContent = labels[type][1];
  document.getElementById('modal-delete-btn').style.display = 'none';
  renderModalBody(type, {});
  document.getElementById('modal-overlay').classList.add('active');
}

function renderModalBody(type, item) {
  const fields = FIELDS[type];
  const groups = {};
  fields.forEach(f => { (groups[f.group||'X'] = groups[f.group||'X'] || []).push(f); });

  const groupHtml = Object.entries(groups).map(([gname, glist]) => {
    const fieldsHtml = glist.map(f => fieldInput(f, item)).join('');
    const grid = glist.length > 1 && glist.every(f => f.type !== 'textarea') ? 'grid-cols-2' : 'grid-cols-1';
    return `<div class="grid ${grid} gap-4">${fieldsHtml}</div>`;
  }).join('<div class="border-t pt-5" style="border-color: var(--line);"></div>');

  document.getElementById('modal-body').innerHTML = groupHtml;
}

function fieldInput(f, item) {
  const val = item[f.key] != null ? item[f.key] : '';
  const base = `w-full px-3 py-2 border rounded-lg text-sm`;
  const borderStyle = `style="border-color: var(--line);"`;
  let input;

  if (f.type === 'textarea') {
    input = `<textarea id="f-${f.key}" rows="3" class="${base}" ${borderStyle}>${esc(val)}</textarea>`;
  } else if (f.type === 'select') {
    input = `<select id="f-${f.key}" class="${base}" ${borderStyle}>${f.options.map(o => `<option value="${esc(o.v)}" ${val===o.v?'selected':''}>${esc(o.l)}</option>`).join('')}</select>`;
  } else if (f.type === 'company-select') {
    input = `<select id="f-${f.key}" onchange="refreshContactSelect()" class="${base}" ${borderStyle}>
      <option value="">— Select —</option>
      ${state.companies.slice().sort((a,b)=>a.name.localeCompare(b.name)).map(c => `<option value="${esc(c.id)}" ${val===c.id?'selected':''}>${esc(c.name)}</option>`).join('')}
    </select>`;
  } else if (f.type === 'contact-select') {
    const opts = contactsForCompany(item.companyId || '');
    input = `<select id="f-${f.key}" class="${base}" ${borderStyle}>
      <option value="">— Select —</option>
      ${opts.map(c => `<option value="${esc(c.id)}" ${val===c.id?'selected':''}>${esc(c.firstName+' '+c.lastName)}</option>`).join('')}
    </select>`;
  } else if (f.type === 'project-multi') {
    const selected = Array.isArray(val) ? val : (val ? [val] : []);
    const sorted = state.projects.slice().sort((a,b) => a.name.localeCompare(b.name));
    input = `<div id="f-${f.key}" class="border rounded-lg p-2 max-h-40 overflow-y-auto space-y-1" style="border-color: var(--line);">
      ${sorted.length === 0 ? `<div class="text-xs px-1 py-2" style="color: var(--warm);">No projects yet. Create one in the Projects view.</div>` :
        sorted.map(p => `<label class="flex items-center gap-2 px-1 py-0.5 cursor-pointer rounded hover:bg-slate-50">
          <input type="checkbox" value="${esc(p.id)}" ${selected.includes(p.id)?'checked':''} class="w-3.5 h-3.5 rounded accent-slate-900">
          <span class="text-sm">${esc(p.name)}</span>
          ${p.location ? `<span class="text-xs ml-auto" style="color: var(--warm);">${esc(p.location)}</span>` : ''}
        </label>`).join('')}
    </div>`;
  } else if (f.type === 'number') {
    input = `<input type="number" id="f-${f.key}" value="${esc(val)}" ${f.required?'required':''} class="${base}" ${borderStyle}>`;
  } else if (f.type === 'checkbox') {
    input = `<label class="flex items-center gap-2 cursor-pointer mt-2"><input type="checkbox" id="f-${f.key}" ${val?'checked':''} class="w-4 h-4 rounded accent-slate-900"><span class="text-sm text-slate-700">Yes</span></label>`;
  } else if (f.type === 'datetime-local') {
    const dtv = val ? (() => { try { return new Date(val).toISOString().slice(0,16); } catch(e){ return ''; } })() : '';
    input = `<input type="datetime-local" id="f-${f.key}" value="${esc(dtv)}" class="${base}" ${borderStyle}>`;
  } else if (f.type === 'date') {
    const dv = val ? (() => { try { return new Date(val).toISOString().slice(0,10); } catch(e){ return ''; } })() : '';
    input = `<input type="date" id="f-${f.key}" value="${esc(dv)}" class="${base}" ${borderStyle}>`;
  } else {
    input = `<input type="${f.type||'text'}" id="f-${f.key}" value="${esc(val)}" ${f.required?'required':''} class="${base}" ${borderStyle}>`;
  }

  return `<div>
    <label class="block text-xs uppercase tracking-wider font-semibold text-slate-500 mb-1.5">${esc(f.label)}${f.required?' <span class="text-rose-500">*</span>':''}</label>
    ${input}
  </div>`;
}

function contactsForCompany(companyId) { return !companyId ? state.contacts : state.contacts.filter(c => c.companyId === companyId); }

function refreshContactSelect() {
  const cId = document.getElementById('f-companyId')?.value || '';
  const sel = document.getElementById('f-contactId'); if (!sel) return;
  const opts = contactsForCompany(cId);
  sel.innerHTML = '<option value="">— Select —</option>' + opts.map(c => `<option value="${esc(c.id)}">${esc(c.firstName+' '+c.lastName)}</option>`).join('');
}

// ============================================================
//  SAVE
// ============================================================
function saveChanges() {
  const type = state.editingType; if (!type) return;
  const newData = {};
  for (const f of FIELDS[type]) {
    const el = document.getElementById('f-'+f.key); if (!el) continue;
    if (f.type === 'checkbox') newData[f.key] = el.checked;
    else if (f.type === 'datetime-local') newData[f.key] = el.value ? new Date(el.value).toISOString() : '';
    else if (f.type === 'date') newData[f.key] = el.value || '';
    else if (f.type === 'project-multi') {
      newData[f.key] = Array.from(el.querySelectorAll('input[type=checkbox]:checked')).map(cb => cb.value);
    }
    else if (f.type === 'number') newData[f.key] = el.value === '' ? null : Number(el.value);
    else newData[f.key] = el.value;
    if (f.required && !newData[f.key]) { alert('Field "'+f.label+'" is required.'); el.focus(); return; }
  }
  const arr = getArray(type);
  if (state.isNew) {
    const prefix = { company:'co', contact:'p', interaction:'i', project:'pr' }[type];
    const maxNum = arr.reduce((m,x) => Math.max(m, parseInt((x.id||'').replace(/\D/g,''))||0), 0);
    newData.id = prefix + (maxNum + 1);
    newData.createdAt = new Date().toISOString();
    arr.push(newData);
  } else {
    const idx = arr.findIndex(x => x.id === state.editingId); if (idx === -1) return;
    arr[idx] = { ...arr[idx], ...newData };
  }
  saveData(); closeModal(); render();
}

function deleteCurrentItem() {
  if (!confirm('Delete this record? This cannot be undone.')) return;
  const t = state.editingType, id = state.editingId;
  if (t==='company') state.companies = state.companies.filter(x => x.id !== id);
  else if (t==='contact') state.contacts = state.contacts.filter(x => x.id !== id);
  else if (t==='project') {
    state.projects = state.projects.filter(x => x.id !== id);
    // Remove project ref from interactions
    state.interactions.forEach(i => {
      if (Array.isArray(i.projectIds)) i.projectIds = i.projectIds.filter(pid => pid !== id);
    });
  }
  else state.interactions = state.interactions.filter(x => x.id !== id);
  saveData(); closeModal(); render();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
  state.editingType = null; state.editingId = null; state.isNew = false;
}
function handleOverlayClick(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function getArray(type) {
  if (type==='company') return state.companies;
  if (type==='contact') return state.contacts;
  if (type==='project') return state.projects;
  return state.interactions;
}

// ============================================================
//  INIT
// ============================================================
window.onload = async function() {
  state.currentView = 'dashboard';
  let dataLoaded = false;

  // Read-only shared snapshot (plain)
  if (SHARED_DATA) {
    state.companies = Array.isArray(SHARED_DATA.companies) ? SHARED_DATA.companies : [];
    state.contacts = Array.isArray(SHARED_DATA.contacts) ? SHARED_DATA.contacts : [];
    state.interactions = Array.isArray(SHARED_DATA.interactions) ? SHARED_DATA.interactions : [];
    document.body.classList.add('read-only');
    showReadOnlyBadge();
    setView('dashboard');
    updateButtons();
    return;
  }

  // Encrypted shared snapshot — show password gate
  if (ENCRYPTED_DATA) {
    document.body.classList.add('read-only');
    showPasswordGate();
    return;
  }

  // Try to reconnect to the previously linked file FIRST
  if (FS_SUPPORTED) {
    const savedHandle = await loadHandle();
    if (savedHandle) {
      try {
        const perm = await savedHandle.queryPermission({ mode: 'readwrite' });
        if (perm === 'granted') {
          fileHandle = savedHandle;
          fileName = savedHandle.name;
          // Read file directly without rendering yet
          try {
            const file = await fileHandle.getFile();
            const text = await file.text();
            const data = text.trim() ? JSON.parse(text) : {};
            state.companies = Array.isArray(data.companies) ? data.companies : [];
            state.contacts = Array.isArray(data.contacts) ? data.contacts : [];
            state.interactions = Array.isArray(data.interactions) ? data.interactions : [];
            state.projects = Array.isArray(data.projects) ? data.projects : [];
            dataLoaded = true;
          } catch(e) { console.warn('initial file read failed', e); }
        } else {
          fileHandle = savedHandle;
          fileName = savedHandle.name;
          showReconnectBanner();
        }
      } catch(e) { console.warn('reconnect failed', e); }
    }
  }

  // Fallback: try localStorage
  if (!dataLoaded) loadFromStorage();

  // Now render — state is fully populated
  setView('dashboard');
  updateButtons();
  if (dataLoaded) updateStatus('synced');
};

function showPasswordGate() {
  // Hide the entire app
  document.querySelector('aside').style.display = 'none';
  document.querySelector('main').style.display = 'none';

  const gate = document.createElement('div');
  gate.id = 'password-gate';
  gate.className = 'fixed inset-0 flex items-center justify-center z-50 p-6';
  gate.style.cssText = 'background: var(--paper);';
  gate.innerHTML = `
    <div class="w-full max-w-md">
      <div class="text-center mb-8">
        <svg width="58" height="78" viewBox="0 0 34 46" fill="none" class="mx-auto mb-5" aria-label="BOA Hotels monogram">
          <rect x="1.5" y="1.5" width="31" height="43" stroke="#233b34" stroke-width="0.9" fill="none"/>
          <text x="17" y="19" text-anchor="middle" font-family="Fraunces, 'PP Fragment Glare', serif" font-size="14" font-weight="400" fill="#233b34" style="font-variation-settings: 'opsz' 144;">B</text>
          <path d="M 5.5 25 Q 17 21 28.5 25" stroke="#233b34" stroke-width="0.9" fill="none" stroke-linecap="round"/>
          <text x="17" y="38" text-anchor="middle" font-family="Fraunces, 'PP Fragment Glare', serif" font-size="14" font-weight="400" fill="#233b34" style="font-variation-settings: 'opsz' 144;">H</text>
        </svg>
        <div class="font-display text-xl font-normal tracking-[0.18em] mb-2" style="color: var(--ink);">BOA HOTELS</div>
        <div class="text-[10px] uppercase tracking-[0.25em] font-semibold mb-5" style="color: var(--green);">CRM</div>
        <h1 class="font-display text-3xl font-medium mb-2" style="color: var(--ink);">Confidential view</h1>
        <p class="text-sm" style="color: var(--warm);">Enter the password you received to unlock the data.</p>
      </div>
      <form id="password-form" class="card p-6 space-y-4" onsubmit="return submitPassword(event)">
        <div>
          <label class="block text-xs uppercase tracking-wider font-semibold mb-2" style="color: var(--warm);">Password</label>
          <input id="password-input" type="password" autofocus autocomplete="off"
            class="w-full px-3 py-2.5 border rounded-lg text-sm font-mono" style="border-color: var(--line);">
        </div>
        <div id="password-error" class="hidden text-xs px-3 py-2 rounded-lg" style="background: rgba(176,76,50,0.08); color: #a04330;"></div>
        <button type="submit" id="password-submit" class="gold-btn w-full py-2.5 rounded-lg text-sm font-semibold">Unlock</button>
      </form>
      <p class="text-center text-xs mt-6" style="color: var(--warm);">Data is end-to-end encrypted with AES-256. Without the password it stays unreadable.</p>
    </div>`;
  document.body.appendChild(gate);

  // Try sessionStorage in case viewer already entered password this session
  const cached = sessionStorage.getItem('boa-crm-viewer-pw');
  if (cached) tryDecrypt(cached, true);
}

async function submitPassword(e) {
  e.preventDefault();
  const pw = document.getElementById('password-input').value;
  const errEl = document.getElementById('password-error');
  const btn = document.getElementById('password-submit');
  errEl.classList.add('hidden');
  btn.textContent = 'Unlocking…';
  btn.disabled = true;
  const ok = await tryDecrypt(pw, false);
  if (!ok) {
    errEl.textContent = 'Wrong password. Please try again.';
    errEl.classList.remove('hidden');
    btn.textContent = 'Unlock';
    btn.disabled = false;
    document.getElementById('password-input').select();
  }
  return false;
}

async function tryDecrypt(password, silent) {
  try {
    const data = await decryptPayload(ENCRYPTED_DATA, password);
    state.companies = Array.isArray(data.companies) ? data.companies : [];
    state.contacts = Array.isArray(data.contacts) ? data.contacts : [];
    state.interactions = Array.isArray(data.interactions) ? data.interactions : [];
    sessionStorage.setItem('boa-crm-viewer-pw', password);
    // Reveal the app
    document.getElementById('password-gate')?.remove();
    document.querySelector('aside').style.display = '';
    document.querySelector('main').style.display = '';
    showReadOnlyBadge();
    setView('dashboard');
    updateButtons();
    return true;
  } catch(e) {
    if (silent) sessionStorage.removeItem('boa-crm-viewer-pw');
    return false;
  }
}

function showReadOnlyBadge() {
  const b = document.createElement('div');
  b.className = 'fixed top-3 right-3 z-30 px-3 py-1.5 rounded-full text-[11px] font-semibold uppercase tracking-wider';
  b.style.cssText = 'background: var(--ink); color: var(--paper); letter-spacing: 0.12em;';
  b.innerHTML = `<span style="display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--paper); margin-right:8px; vertical-align:middle;"></span>Read-only view`;
  document.body.appendChild(b);
}

function showReconnectBanner() {
  const b = document.createElement('div');
  b.className = 'fixed bottom-6 left-1/2 -translate-x-1/2 px-5 py-3 rounded-lg shadow-lg z-30 flex items-center gap-3';
  b.style.cssText = 'background: var(--ink); color: var(--paper); border: 1px solid var(--green);';
  b.innerHTML = `<span class="text-sm">Reconnect to <strong>${esc(fileName)}</strong>?</span>
    <button onclick="requestReconnect(this.parentElement)" class="px-3 py-1.5 text-xs rounded font-semibold" style="background: var(--green); color: var(--paper);">Reconnect</button>
    <button onclick="this.parentElement.remove()" class="text-xs" style="color: rgba(226,223,214,0.5);">Dismiss</button>`;
  document.body.appendChild(b);
}

async function requestReconnect(banner) {
  try {
    const perm = await fileHandle.requestPermission({ mode: 'readwrite' });
    if (perm === 'granted') {
      await loadFromFile();
      updateButtons();
      banner.remove();
    } else {
      alert('Permission denied. Use "Connect file" to choose again.');
      fileHandle = null;
      banner.remove();
      updateButtons();
    }
  } catch(e) {
    console.error(e);
    fileHandle = null;
    banner.remove();
    updateButtons();
  }
}
</script>
