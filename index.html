  <style>
    :root {
      --ink:        #262626; /* Light Black */
      --ink-soft:   #3a3a3a;
      --green:      #233b34; /* Dark Green */
      --green-soft: #2d4a42;
      --green-deep: #1a2d28;
      --warm:       #aca497; /* Dark Warm Grey */
      --paper:      #e2dfd6; /* Light Warm Grey */
      --paper-soft: #eceadf;
      --cream:      #f5f3eb;
      --line:       #d4cfc1;
      --line-soft:  #e8e4d6;
    }
    * { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    body { background: var(--paper); color: var(--ink); }
    .font-display { font-family: 'Fraunces', 'PP Fragment Glare', serif; font-feature-settings: "ss01","ss02"; font-variation-settings: "opsz" 96, "SOFT" 30; letter-spacing: -0.01em; }
    .num { font-variant-numeric: tabular-nums; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(11,18,32,0.55); backdrop-filter: blur(4px); z-index: 50; align-items: center; justify-content: center; }
    .modal-overlay.active { display: flex; animation: fadeIn 0.15s ease; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    @keyframes slideUp { from{opacity:0; transform: translateY(8px)} to{opacity:1; transform: translateY(0)} }
    .modal-card { animation: slideUp 0.18s ease; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-radius: 8px; color: rgba(226,223,214,0.55); font-size: 13px; font-weight: 500; transition: all 0.15s; cursor: pointer; letter-spacing: 0.01em; }
    .nav-item:hover { background: rgba(226,223,214,0.06); color: rgba(226,223,214,0.9); }
    .nav-item.active { background: rgba(226,223,214,0.1); color: #f5f3eb; }
    .nav-item.active svg { color: var(--paper); }
    .stat-card { background: var(--cream); border: 1px solid var(--line-soft); border-radius: 4px; padding: 24px; transition: all 0.15s; }
    .stat-card:hover { background: white; border-color: var(--line); }
    .card { background: var(--cream); border: 1px solid var(--line-soft); border-radius: 4px; }
    .row-hover:hover { background: var(--paper-soft); }
    .gold-btn { background: var(--green); color: var(--paper); transition: all 0.15s; letter-spacing: 0.02em; }
    .gold-btn:hover { background: var(--green-deep); }
    .ghost-btn { background: transparent; color: var(--ink); border: 1px solid var(--line); transition: all 0.15s; }
    .ghost-btn:hover { background: var(--paper-soft); border-color: var(--warm); }
    input, select, textarea { background: white; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--green); box-shadow: 0 0 0 3px rgba(35,59,52,0.1); }
    .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
    table tbody tr { transition: background 0.1s; }
    .scroll-shadow { background: linear-gradient(white 30%, rgba(255,255,255,0)), linear-gradient(rgba(255,255,255,0), white 70%) 0 100%, radial-gradient(farthest-side at 50% 0, rgba(0,0,0,0.1), rgba(0,0,0,0)), radial-gradient(farthest-side at 50% 100%, rgba(0,0,0,0.1), rgba(0,0,0,0)) 0 100%; background-repeat: no-repeat; background-size: 100% 40px, 100% 40px, 100% 14px, 100% 14px; background-attachment: local, local, scroll, scroll; }
    /* Read-only mode hides creation/edit affordances */
    body.read-only [onclick^="openNewModal"],
    body.read-only button[onclick^="event.stopPropagation();openEditModal"] { display: none !important; }
    body.read-only [onclick^="openEditModal"] { cursor: default !important; }
    body.read-only tr.row-hover:hover { background: transparent !important; }
  </style>

  <!-- ============ SIDEBAR ============ -->
  <aside class="fixed left-0 top-0 bottom-0 w-60 flex flex-col" style="background: var(--green);">
    <div class="px-6 pt-8 pb-10">
      <div class="flex items-center gap-3.5">

          <rect x="1.5" y="1.5" width="31" height="43" stroke="#e2dfd6" stroke-width="0.9" fill="none"></rect>
          <text x="17" y="19" text-anchor="middle" font-family="Fraunces, 'PP Fragment Glare', serif" font-size="14" font-weight="400" fill="#e2dfd6" style="font-variation-settings: 'opsz' 144;">B</text>
          <path d="M 5.5 25 Q 17 21 28.5 25" stroke="#e2dfd6" stroke-width="0.9" fill="none" stroke-linecap="round"></path>
          <text x="17" y="38" text-anchor="middle" font-family="Fraunces, 'PP Fragment Glare', serif" font-size="14" font-weight="400" fill="#e2dfd6" style="font-variation-settings: 'opsz' 144;">H</text>

        <div>

          <div class="text-[9px] uppercase tracking-[0.25em] mt-2" style="color: rgba(226,223,214,0.55);">CRM</div>

// ============================================================
//  ENCRYPTION (AES-256-GCM with PBKDF2-derived key)
// ============================================================
const PBKDF2_ITERATIONS = 250000;

async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    'raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']
  );
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: PBKDF2_ITERATIONS, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    false,
    ['encrypt','decrypt']
  );
}

function bytesToB64(bytes) {
  let s = '';
  for (const b of bytes) s += String.fromCharCode(b);
  return btoa(s);
}
function b64ToBytes(b64) {
  const s = atob(b64);
  const bytes = new Uint8Array(s.length);
  for (let i = 0; i < s.length; i++) bytes[i] = s.charCodeAt(i);
  return bytes;
}

async function encryptPayload(obj, password) {
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await deriveKey(password, salt);
  const plaintext = new TextEncoder().encode(JSON.stringify(obj));
  const ciphertext = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, plaintext);
  return {
    v: 1,
    salt: bytesToB64(salt),
    iv: bytesToB64(iv),
    data: bytesToB64(new Uint8Array(ciphertext))
  };
}

async function decryptPayload(payload, password) {
  const salt = b64ToBytes(payload.salt);
  const iv = b64ToBytes(payload.iv);
  const ct = b64ToBytes(payload.data);
  const key = await deriveKey(password, salt);
  const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
  return JSON.parse(new TextDecoder().decode(plain));
}

// =========== DASHBOARD GLOBAL SEARCH / FOCUS ===========
// Debounced live search — fires applyDashboardSearch ~300ms after user stops typing.
// Auto-focuses when the query is at least 2 chars (avoids flickering for single letters).
let _dashSearchTimer = null;
function onDashboardSearchInput(value) {
  if (_dashSearchTimer) clearTimeout(_dashSearchTimer);
  const v = (value||'').trim();
  if (v.length === 0) {
    _dashSearchTimer = setTimeout(() => {
      state.dashboardFocus = { type: 'all', id: null, label: '', query: '' };
      render();
    }, 200);
    return;
  }
  if (v.length < 2) return; // wait for more characters
  _dashSearchTimer = setTimeout(() => applyDashboardSearch(v), 280);
}

function applyDashboardSearch(query) {
  const q = (query||'').trim();
  if (!q) {
    state.dashboardFocus = { type: 'all', id: null, label: '', query: '' };
    render();
    return;
  }
  const qLow = q.toLowerCase();
  // Priority: exact project > exact company > exact contact > partial project > partial company > partial contact > text
  const projExact = state.projects.find(p => p.name.toLowerCase() === qLow);
  const coExact = state.companies.find(c => (c.name||'').toLowerCase() === qLow);
  const ctExact = state.contacts.find(c => (((c.firstName||'')+' '+(c.lastName||'')).toLowerCase().trim() === qLow));
  let match = null;
  if (projExact) match = { type:'project', id:projExact.id, label:projExact.name };
  else if (coExact) match = { type:'company', id:coExact.id, label:coExact.name };
  else if (ctExact) match = { type:'contact', id:ctExact.id, label:`${ctExact.firstName||''} ${ctExact.lastName||''}`.trim() };
  else {
    const proj = state.projects.find(p => p.name.toLowerCase().includes(qLow));
    if (proj) match = { type:'project', id:proj.id, label:proj.name };
    else {
      const co = state.companies.find(c => (c.name||'').toLowerCase().includes(qLow));
      if (co) match = { type:'company', id:co.id, label:co.name };
      else {
        const ct = state.contacts.find(c => (((c.firstName||'')+' '+(c.lastName||'')).toLowerCase()).includes(qLow));
        if (ct) match = { type:'contact', id:ct.id, label:`${ct.firstName||''} ${ct.lastName||''}`.trim() };
      }
    }
  }
  if (match) { state.dashboardFocus = { ...match, query: q }; }
  else { state.dashboardFocus = { type: 'text', id: null, label: q, query: q }; }
  render();
}

function clearDashboardFocus() {
  state.dashboardFocus = { type: 'all', id: null, label: '', query: '' };
  state.actionContext = null;
  state.projectCompanyExpanded = null;
  render();
}

// =========== ACTION ITEMS — open / list / dismiss ===========
function openActionItem(interactionId, bucket) {
  const i = state.interactions.find(x => x.id === interactionId);
  if (!i) return;
  const co = state.companies.find(c => c.id === i.companyId);
  state.actionContext = { bucket, interactionId, companyId: co ? co.id : null };
  state.actionListBucket = null;
  if (co) {
    state.dashboardFocus = { type:'company', id: co.id, label: co.name, query: co.name };
  }
  if (state.currentView !== 'dashboard') setView('dashboard');
  else renderDashboard();
  // After render, scroll the action panel into view
  setTimeout(() => {
    const el = document.getElementById('action-context-panel');
    if (el) el.scrollIntoView({ behavior:'smooth', block:'start' });
  }, 50);
}

function closeActionContext() {
  state.actionContext = null;
  renderDashboard();
}

function openActionList(bucket) {
  state.actionListBucket = bucket;
  renderActionListModal();
}
function closeActionList() {
  state.actionListBucket = null;
  const ov = document.getElementById('action-list-overlay');
  if (ov) ov.remove();
}

// =========== Follow-up email builder ===========
function buildFollowUpEmail(co, ct, latest, bucket) {
  // Language: explicit company-level preferredLanguage override wins; otherwise infer from country.
  const lower = (s) => (s||'').toLowerCase();
  let isPT;
  if (co?.preferredLanguage === 'PT') isPT = true;
  else if (co?.preferredLanguage === 'EN') isPT = false;
  else {
    isPT = lower(ct?.country).includes('portugal')
        || lower(co?.country).includes('portugal')
        || lower(ct?.country) === 'pt'
        || lower(co?.country) === 'pt';
  }

  const firstName = (ct?.firstName || '').trim();
  const coName = co?.name || '';
  const subj = latest?.subject || '';
  const lastDate = latest?.date ? fmtDate(latest.date) : '';

  // Project context — grab project names attached to the latest interaction (if any)
  let projNames = [];
  if (latest && Array.isArray(latest.projectIds)) {
    projNames = latest.projectIds.map(pid => state.projects.find(p => p.id === pid)?.name).filter(Boolean);
  }
  const projCtx = projNames.length ? projNames.join(' / ') : '';

  const bucketLabelPT = bucket === 'overdue' ? 'follow-up em atraso'
                       : bucket === 'action_required' ? 'ação pendente do nosso lado'
                       : 'follow-up programado para esta semana';
  const bucketLabelEN = bucket === 'overdue' ? 'overdue follow-up'
                       : bucket === 'action_required' ? 'pending action on our side'
                       : 'follow-up scheduled for this week';

  let subject, body, action;
  if (isPT) {
    subject = subj ? `Re: ${subj}` : `BOA Hotels × ${coName} — seguimento`;
    action = `Preparar follow-up (${bucketLabelPT})`;
    body =
`Olá ${firstName || ''},

Espero que esteja tudo bem.

A retomar a nossa conversa${subj ? ` sobre "${subj}"` : ''}${lastDate ? ` (último contacto a ${lastDate})` : ''}${projCtx ? `, relativa a ${projCtx}` : ''}.

[Adicionar: ponto de situação / próximo passo / pergunta concreta]

Fico ao dispor para agendar uma call esta semana, caso faça sentido para si.`;
  } else {
    subject = subj ? `Re: ${subj}` : `BOA Hotels × ${coName} — follow-up`;
    action = `Prepare follow-up (${bucketLabelEN})`;
    body =
`Hi ${firstName || ''},

Hope you're doing well.

  } else {

// Entry point: from the Companies list or detail page, draft an email for this company.
// Picks intro (no prior interactions) or follow-up (latest interaction) automatically.
function openCompanyDraft(companyId) {
  const co = state.companies.find(c => c.id === companyId);
  if (!co) return;
  const ints = state.interactions.filter(i => i.companyId === companyId)
    .sort((a,b) => new Date(b.date||0) - new Date(a.date||0));
  if (ints.length === 0) {
    state.actionContext = { bucket: 'intro', interactionId: null, companyId };
  } else {
    // Use most recent interaction; tag bucket as 'follow_up_general' so the panel
    // shows it but without urgency framing.
    state.actionContext = { bucket: 'follow_up_general', interactionId: ints[0].id, companyId };
  }
  // Show the action panel inside the dashboard focus on this company.
  state.dashboardFocus = { type:'company', id: co.id, label: co.name, query: co.name };
  state.companyDetailId = null; // exit detail if currently in it
  setView('dashboard');
  setTimeout(() => {
    const el = document.getElementById('action-context-panel');
    if (el) el.scrollIntoView({ behavior:'smooth', block:'start' });
  }, 50);
}

function renderActionContextPanel() {
  const ctx = state.actionContext;
  if (!ctx) return '';
  const isIntro = ctx.bucket === 'intro';
  const i = isIntro ? null : state.interactions.find(x => x.id === ctx.interactionId);
  if (!isIntro && !i) return '';
  const co = state.companies.find(c => c.id === (i ? i.companyId : ctx.companyId));
  if (!co) return '';
  // Collect ALL contacts for this company so the user can choose who to send to.
  const allCoContacts = state.contacts.filter(c => c.companyId === co.id);
  // Pick primary contact (initial selection)
  let ct = i ? state.contacts.find(c => c.id === i.contactId) : null;
  if (!ct && allCoContacts.length) {
    // Prefer named contact with email first; Geral last as fallback
    const named = allCoContacts.filter(c => c.firstName !== 'Geral' && c.firstName !== 'General');
    ct = named.find(c => c.email) || named[0] || allCoContacts.find(c => c.email) || allCoContacts[0];
  }

  const draft = isIntro ? buildIntroEmail(co, ct) : buildFollowUpEmail(co, ct, i, ctx.bucket);
  const today = new Date(); today.setHours(0,0,0,0);
  let urgency = '';
  if (!isIntro) {
    if (ctx.bucket === 'overdue' && i.followUpDate) {
      const days = Math.floor((today - new Date(i.followUpDate)) / 86400000);
      urgency = `<span style="color:#a04330;">${days}d overdue · was ${fmtDate(i.followUpDate)}</span>`;
    } else if (ctx.bucket === 'this_week' && i.followUpDate) {
      urgency = `<span style="color:#7a5c3c;">Due ${fmtDate(i.followUpDate)}</span>`;
    } else if (ctx.bucket === 'action_required') {
      urgency = `<span style="color:#a04330;">Action required since ${fmtDate(i.date)}</span>`;
    } else if (ctx.bucket === 'follow_up_general' && i.date) {
      urgency = `<span style="color: var(--warm);">Last touch ${fmtDate(i.date)}</span>`;

    urgency = `<span style="color: var(--green);">First contact — no prior interactions</span>`;

                    : 'Follow-up this week';

  const accent = isIntro ? '#233b34' : '#b04c32';
  const panelBg = isIntro ? '#f5f3eb' : '#fdf6ee';

  const recipientEmail = ct?.email || '';

  return `
  <div id="action-context-panel" class="card p-5 mb-4" style="background:${panelBg}; border-color:${panelBorder}; border-left:4px solid ${accent};">
    <div class="flex items-start justify-between mb-3">
      <div>
        <div class="text-[10px] uppercase tracking-[0.18em] font-semibold mb-1" style="color:${accent};">${bucketTitle}</div>
        <div class="font-display text-lg font-medium" style="color: var(--ink);">${esc(draft.action)} — ${esc(co.name)}</div>
        <div class="text-xs mt-1" style="color: var(--warm);">
          ${urgency ? urgency + ' · ' : ''}${ct ? esc(((ct.firstName||'')+' '+(ct.lastName||'')).trim()) + (ct.email ? ' · '+esc(ct.email) : '') : 'No primary contact'}${(i && i.subject) ? ' · '+esc(i.subject) : ''}
        </div>
      </div>
      <button onclick="closeActionContext()" class="text-slate-400 hover:text-slate-700 text-xl w-8 h-8 flex items-center justify-center rounded-full hover:bg-white">&times;</button>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-3">
      <div>
        <label class="text-[10px] uppercase tracking-wider font-semibold" style="color: var(--warm);">Subject</label>
        <input type="text" id="action-email-subject" value="${esc(draft.subject)}" class="w-full mt-1 px-3 py-2 border rounded-lg text-sm" style="border-color: var(--line);">
      </div>
      <div>
        <label class="text-[10px] uppercase tracking-wider font-semibold" style="color: var(--warm);">To${allCoContacts.length > 1 ? ` <span style="opacity:0.6;">— ${allCoContacts.length} contacts available</span>` : ''}</label>
        ${allCoContacts.length > 0 ? `
          <select id="action-email-to" onchange="onActionRecipientChange()" class="w-full mt-1 px-3 py-2 border rounded-lg text-xs bg-white" style="border-color: var(--line); color: var(--ink);">
            ${allCoContacts.map(c => {
              const nm = ((c.firstName||'')+' '+(c.lastName||'')).trim();
              const isGeral = c.firstName === 'Geral' || c.firstName === 'General';
              const label = c.email
                ? `${nm}${isGeral?' [shared inbox]':''} — ${c.email}`

    <div class="flex items-center justify-between gap-2 mt-3">

        <button id="action-open-mail-btn" onclick="openInDefaultMailFromSelect()" class="gold-btn px-3 py-2 text-xs rounded-lg font-semibold ${recipientEmail ? '' : 'opacity-50 cursor-not-allowed'}" ${recipientEmail ? '' : 'disabled'}>Open in Mail →</button>
      </div>

function openInDefaultMail(email) {
  const subj = document.getElementById('action-email-subject')?.value || '';
  const body = document.getElementById('action-email-body')?.value || '';
  const url = `mailto:${encodeURIComponent(email)}?subject=${encodeURIComponent(subj)}&body=${encodeURIComponent(body)}`;
  window.location.href = url;
}
function openInDefaultMailFromSelect() {
  const sel = document.getElementById('action-email-to');
  const email = sel ? sel.value : '';
  if (!email) {
    alert('The selected contact has no email on file. Pick another contact from the To dropdown, or add an email to the contact card.');
    return;
  }
  openInDefaultMail(email);
}
function onActionRecipientChange() {
  const sel = document.getElementById('action-email-to');
  const btn = document.getElementById('action-open-mail-btn');
  const warn = document.getElementById('action-email-to-warn');
  if (!sel || !btn) return;
  const hasEmail = !!sel.value;
  btn.disabled = !hasEmail;
  btn.classList.toggle('opacity-50', !hasEmail);
  btn.classList.toggle('cursor-not-allowed', !hasEmail);
  if (warn) {
    warn.textContent = hasEmail ? '' : '⚠ Selected contact has no email — pick another or add one in the contact card.';
    warn.style.color = hasEmail ? 'var(--warm)' : '#a04330';
  }
}

function copyActionEmail() {
  const subj = document.getElementById('action-email-subject')?.value || '';
  const body = document.getElementById('action-email-body')?.value || '';
  const text = `Subject: ${subj}\n\n${body}`;
  navigator.clipboard.writeText(text).then(() => {
    const btn = event && event.target;
    if (btn) {
      const orig = btn.textContent;
      btn.textContent = 'Copied ✓';
      setTimeout(() => { btn.textContent = orig; }, 1500);
    }
  }).catch(() => alert('Could not copy'));
}

function markActionDone(interactionId) {
  const i = state.interactions.find(x => x.id === interactionId);
  if (!i) return;
  i.completed = true;
  // Do not auto-flip kpi — "Mark done" only means the task on our side is done.
  // The user should reclassify kpi (e.g. info_sent / in_conversation / not_interested) separately.
  state.lastUpdatedByUser = new Date().toISOString();
  if (typeof saveToFile === 'function') saveToFile();
  state.actionContext = null;
  renderDashboard();
}

function snoozeAction(interactionId, days) {
  const i = state.interactions.find(x => x.id === interactionId);
  if (!i) return;
  const base = i.followUpDate ? new Date(i.followUpDate) : new Date();
  const target = new Date(); target.setDate(target.getDate() + days);
  // Always move forward from today
  i.followUpDate = target.toISOString().slice(0,10);
  state.lastUpdatedByUser = new Date().toISOString();
  if (typeof saveToFile === 'function') saveToFile();
  state.actionContext = null;
  renderDashboard();
}

function renderActionListModal() {
  const bucket = state.actionListBucket;
  if (!bucket) return;
  const today = new Date(); today.setHours(0,0,0,0);
  const weekFromNow = new Date(today); weekFromNow.setDate(weekFromNow.getDate() + 7);

  let items = [];
  let title = '';
  let accent = '#b04c32';
  if (bucket === 'overdue') {
    items = state.interactions.filter(i => i.followUpDate && new Date(i.followUpDate) < today && !i.completed)
      .sort((a,b) => new Date(a.followUpDate) - new Date(b.followUpDate));
    title = 'All overdue follow-ups';
  } else if (bucket === 'action_required') {
    items = state.interactions.filter(i => i.kpi === 'action_required' && !i.completed)
      .sort((a,b) => new Date(b.date||0) - new Date(a.date||0));
    title = 'All action-required items';
  } else if (bucket === 'this_week') {
    items = state.interactions.filter(i => {
      if (!i.followUpDate || i.completed) return false;
      const d = new Date(i.followUpDate);
      return d >= today && d <= weekFromNow;
    }).sort((a,b) => new Date(a.followUpDate) - new Date(b.followUpDate));
    title = 'All follow-ups due this week';
    accent = '#8f6f48';

    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-3xl max-h-[88vh] overflow-hidden mx-4 flex flex-col modal-card">
      <div class="flex items-center justify-between px-7 py-5 border-b" style="border-color: var(--line);">
        <div>
          <div class="text-[10px] uppercase tracking-widest font-semibold" style="color:${accent};">Action items</div>
          <h2 class="font-display text-2xl font-semibold mt-0.5" style="color: var(--ink);">${title} <span class="text-sm font-normal" style="color: var(--warm);">(${items.length})</span></h2>
        </div>
        <button onclick="closeActionList()" class="text-slate-400 hover:text-slate-700 text-2xl w-9 h-9 flex items-center justify-center rounded-full hover:bg-slate-100">&times;</button>
      </div>
      <div class="overflow-y-auto flex-1">
        ${items.length === 0 ? `<div class="p-10 text-center" style="color: var(--warm);">All clear.</div>` : `
        <table class="w-full text-sm">
          <thead class="border-b sticky top-0 bg-white" style="border-color: var(--line);">
            <tr class="text-xs uppercase tracking-wider" style="color: var(--warm);">
              <th class="text-left px-5 py-3 font-semibold">Company</th>
              <th class="text-left px-5 py-3 font-semibold">Subject</th>
              <th class="text-left px-5 py-3 font-semibold">${bucket==='action_required' ? 'Date' : 'Follow-up'}</th>
              <th class="text-left px-5 py-3 font-semibold w-24">Action</th>
            </tr>
          </thead>
          <tbody>
            ${items.map(i => {
              const co = state.companies.find(c => c.id === i.companyId);
              let dateCell = '';
              if (bucket === 'overdue' && i.followUpDate) {
                const d = Math.floor((today - new Date(i.followUpDate))/86400000);
                dateCell = `<span style="color:#a04330;">${d}d overdue · was ${fmtDate(i.followUpDate)}</span>`;
              } else if (bucket === 'this_week' && i.followUpDate) {

              } else {
                dateCell = `<span style="color: var(--warm);">${fmtDate(i.date)}</span>`;
              }
              return `<tr class="border-b row-hover" style="border-color: var(--line-soft);">

              </tr>`;
            }).join('')}
          </tbody>
        </table>`}
      </div>

  document.body.insertAdjacentHTML('beforeend', html);

// Filter an interaction by focus
function interactionMatchesFocus(i, focus) {
  if (!focus || focus.type === 'all') return true;
  if (focus.type === 'project') return Array.isArray(i.projectIds) && i.projectIds.includes(focus.id);
  if (focus.type === 'company') return i.companyId === focus.id;
  if (focus.type === 'contact') return i.contactId === focus.id;
  if (focus.type === 'text') {
    const q = focus.query.toLowerCase();
    return (i.subject||'').toLowerCase().includes(q) || (i.summary||'').toLowerCase().includes(q) || (i.outcome||'').toLowerCase().includes(q);
  }
  return true;
}

// Filter a company by focus
function companyMatchesFocus(co, focus) {
  if (!focus || focus.type === 'all') return true;
  if (focus.type === 'project') {
    const direct = Array.isArray(co.projectIds) && co.projectIds.includes(focus.id);
    const viaInts = state.interactions.some(i => i.companyId === co.id && Array.isArray(i.projectIds) && i.projectIds.includes(focus.id));
    return direct || viaInts;
  }
  if (focus.type === 'company') return co.id === focus.id;
  if (focus.type === 'contact') {
    const ct = state.contacts.find(c => c.id === focus.id);
    return ct && ct.companyId === co.id;
  }
  if (focus.type === 'text') {
    const q = focus.query.toLowerCase();
    return (co.name||'').toLowerCase().includes(q) || (co.country||'').toLowerCase().includes(q) || (co.focus||'').toLowerCase().includes(q);
  }
  return true;
}

// ============================================================
//  FILE SYSTEM ACCESS
// ============================================================
let fileHandle = null;
let fileName = '';
const FS_SUPPORTED = 'showOpenFilePicker' in window;

function openHandleDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('boa-crm-handles', 1);
    req.onupgradeneeded = () => req.result.createObjectStore('handles');
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function persistHandle(handle) {
  try {
    const db = await openHandleDB();
    const tx = db.transaction('handles', 'readwrite');
    tx.objectStore('handles').put(handle, 'main');
    return new Promise(res => tx.oncomplete = res);
  } catch(e) { console.warn('persistHandle failed', e); }
}

async function loadHandle() {
  try {
    const db = await openHandleDB();
    return new Promise(resolve => {
      const tx = db.transaction('handles', 'readonly');
      const req = tx.objectStore('handles').get('main');
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => resolve(null);
    });
  } catch(e) { return null; }
}

async function clearHandle() {
  try {
    const db = await openHandleDB();
    const tx = db.transaction('handles', 'readwrite');
    tx.objectStore('handles').delete('main');
    return new Promise(res => tx.oncomplete = res);
  } catch(e) {}
}

async function connectFile() {
  if (!FS_SUPPORTED) {
    alert('Your browser does not support direct file access.\nUse Chrome or Edge.\n\nIn the meantime, use Import/Export JSON.');
    return;
  }
  try {
    const [handle] = await window.showOpenFilePicker({
      types: [{ description: 'CRM Data', accept: { 'application/json': ['.json'] } }],
      multiple: false,
      suggestedName: 'boa-crm-data.json'
    });
    fileHandle = handle;
    fileName = handle.name;
    await persistHandle(handle);
    await loadFromFile();
    updateButtons();
  } catch(err) {
    if (err.name !== 'AbortError') alert('Error connecting to file: ' + err.message);
  }
}

async function loadFromFile() {
  if (!fileHandle) return false;
  try {
    const file = await fileHandle.getFile();
    const text = await file.text();
    const data = text.trim() ? JSON.parse(text) : {};
    state.companies = Array.isArray(data.companies) ? data.companies : [];
    state.contacts = Array.isArray(data.contacts) ? data.contacts : [];
    state.interactions = Array.isArray(data.interactions) ? data.interactions : [];
    state.projects = Array.isArray(data.projects) ? data.projects : [];
    state.lastUpdatedByClaudeCode = data.lastUpdatedByClaudeCode || null;
    state.lastUpdatedByUser = data.lastUpdatedByUser || null;
    updateStatus('synced');
    render();
    return true;
  } catch(err) {
    console.error('loadFromFile', err);
    alert('Error reading file: ' + err.message);
    return false;
  }
}

async function saveToFile() {
  if (!fileHandle) {
    saveToStorage();
    return;
  }
  try {
    const perm = await fileHandle.queryPermission({ mode: 'readwrite' });
    if (perm !== 'granted') {
      const newPerm = await fileHandle.requestPermission({ mode: 'readwrite' });
      if (newPerm !== 'granted') throw new Error('No write permission');
    }
    state.lastUpdatedByUser = new Date().toISOString();
    const data = { initialized:true, lastUpdatedByClaudeCode: state.lastUpdatedByClaudeCode, lastUpdatedByUser: state.lastUpdatedByUser, companies:state.companies, contacts:state.contacts, interactions:state.interactions, projects:state.projects };
    const writable = await fileHandle.createWritable();
    await writable.write(JSON.stringify(data, null, 2));
    await writable.close();
    updateStatus('saved');
  } catch(err) {
    console.error('saveToFile', err);
    alert('Error saving: ' + err.message);
    saveToStorage();
  }
}

async function syncFile() {
  if (!fileHandle) { await connectFile(); return; }
  await loadFromFile();
}

async function disconnectFile() {
  if (!confirm('Disconnect from file? You will go back to browser storage.')) return;
  fileHandle = null;
  fileName = '';
  await clearHandle();
  updateButtons();
  updateStatus();
}

function updateButtons() {
  const ids = ['btn-connect','btn-sync','btn-export','btn-share','btn-publish','btn-import'];
  if (READ_ONLY) {
    ids.forEach(id => { const el = document.getElementById(id); if (el) el.style.display = 'none'; });
    return;
  }
  const connected = !!fileHandle;
  const hasData = state.companies.length > 0 || state.contacts.length > 0;
  document.getElementById('btn-connect').style.display = connected ? 'none' : 'flex';
  document.getElementById('btn-sync').style.display = connected ? 'flex' : 'none';
  document.getElementById('btn-export').style.display = hasData ? 'flex' : 'none';
  document.getElementById('btn-share').style.display = hasData ? 'flex' : 'none';
  document.getElementById('btn-publish').style.display = hasData ? 'flex' : 'none';
  document.getElementById('btn-import').style.display = connected ? 'none' : 'flex';
}

// ============================================================
//  PERSISTENCE (localStorage fallback)
// ============================================================
function storageAvailable() {
  try { localStorage.setItem('_test', '1'); localStorage.removeItem('_test'); return true; }
  catch(e) { return false; }
}

function loadFromStorage() {
  if (!storageAvailable()) return false;
  try {
    const saved = localStorage.getItem('boa-crm-data');
    if (saved) {
      const data = JSON.parse(saved);
      state.companies = data.companies || [];
      state.contacts = data.contacts || [];
      state.interactions = data.interactions || [];
      state.projects = data.projects || [];
      state.lastUpdatedByClaudeCode = data.lastUpdatedByClaudeCode || null;
      state.lastUpdatedByUser = data.lastUpdatedByUser || null;
      updateStatus();
      return true;
    }
  } catch(e) { console.warn('loadFromStorage', e); }
  return false;
}

function saveToStorage() {
  if (!storageAvailable()) {
    console.warn('localStorage unavailable (probably opened via data: or in preview). Data will not persist until you connect to a file.');
    updateStatus();
    return;
  }
  try {
    state.lastUpdatedByUser = new Date().toISOString();
    localStorage.setItem('boa-crm-data', JSON.stringify({
      initialized:true, lastUpdatedByClaudeCode: state.lastUpdatedByClaudeCode, lastUpdatedByUser: state.lastUpdatedByUser, companies:state.companies, contacts:state.contacts, interactions:state.interactions, projects:state.projects
    }));
    updateStatus('saved');
  } catch(e) { console.warn('saveToStorage', e); }
}

// Unified save — uses file if connected, else localStorage
async function saveData() {
  if (fileHandle) await saveToFile();
  else saveToStorage();
}

function updateStatus(mode) {
  document.getElementById('badge-companies').textContent = state.companies.length || '';
  document.getElementById('badge-contacts').textContent = state.contacts.length || '';
  document.getElementById('badge-interactions').textContent = state.interactions.length || '';
  const projBadge = document.getElementById('badge-projects');
  if (projBadge) projBadge.textContent = state.projects.length || '';
  // Last-updated timestamps under sidebar
  const ts = document.getElementById('data-timestamps');
  if (ts) {
    const fmt = (iso) => iso ? new Date(iso).toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : '—';
    ts.innerHTML = `
      <div class="flex items-center justify-between gap-2 mb-0.5"><span style="opacity:0.6;">Claude:</span> <span class="num" style="opacity:0.85;">${fmt(state.lastUpdatedByClaudeCode)}</span></div>
      <div class="flex items-center justify-between gap-2"><span style="opacity:0.6;">You:</span> <span class="num" style="opacity:0.85;">${fmt(state.lastUpdatedByUser)}</span></div>
    `;
  }
  const el = document.getElementById('data-status');
  if (!state.companies.length && !state.contacts.length) {
    el.innerHTML = `<div style="color: rgba(226,223,214,0.75);">No data</div><div style="color: rgba(226,223,214,0.4); margin-top: 2px;">${FS_SUPPORTED ? 'Connect to file' : 'Import JSON'}</div>`;
    return;
  }
  const now = new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  let line1, line2;
  if (fileHandle) {
    line1 = `<span style="color: rgba(226,223,214,0.85);">📄 ${esc(fileName)}</span>`;
    line2 = mode === 'saved' ? `<span style="color: rgba(226,223,214,0.5);">✓ Saved · ${now}</span>`
          : mode === 'synced' ? `<span style="color: rgba(226,223,214,0.5);">↻ Synced · ${now}</span>`
          : `<span style="color: rgba(226,223,214,0.4);">${state.companies.length + state.contacts.length + state.interactions.length} records</span>`;
  } else {
    line1 = `<span style="color: rgba(226,223,214,0.55);">Browser (localStorage)</span>`;
    line2 = mode === 'saved' ? `<span style="color: rgba(226,223,214,0.5);">✓ Saved · ${now}</span>`
          : `<span style="color: rgba(226,223,214,0.4);">${state.companies.length + state.contacts.length + state.interactions.length} records</span>`;
  }
  el.innerHTML = `<div>${line1}</div><div style="margin-top: 2px;" class="num">${line2}</div>`;
}

function importJSON(event) {
  const input = event.target;
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onerror = () => alert('Error reading file: ' + reader.error);
  reader.onload = async (e) => {
    let data;
    try {
      data = JSON.parse(e.target.result);
    } catch(err) {
      console.error('[importJSON] JSON parse failed:', err);
      alert('Invalid JSON: ' + err.message);
      return;
    }
    try {
      state.companies = Array.isArray(data.companies) ? data.companies : [];
      state.contacts = Array.isArray(data.contacts) ? data.contacts : [];
      state.interactions = Array.isArray(data.interactions) ? data.interactions : [];
      state.projects = Array.isArray(data.projects) ? data.projects : [];
    } catch(err) {
      console.error('[importJSON] state assign failed:', err);
      alert('Unexpected JSON structure: ' + err.message);
      return;
    }
    try {
      await saveData();
    } catch(err) {
      console.error('[importJSON] save failed:', err);
      alert('Error saving: ' + err.message);
    }
    try {
      render();
    } catch(err) {
      console.error('[importJSON] render failed:', err);
      alert('Error rendering interface: ' + err.message + '\n\nCheck the console (F12).');
      return;
    }
    input.value = '';
  };
  reader.readAsText(file);
}

function exportJSON() {
  const data = { initialized:true, companies:state.companies, contacts:state.contacts, interactions:state.interactions };
  const blob = new Blob([JSON.stringify(data,null,2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `boa-crm-export-${new Date().toISOString().slice(0,10)}.json`; a.click();
  URL.revokeObjectURL(url);
}

function getSelfHtml() {
  // Clone the document so we don't mutate live UI
  const clone = document.documentElement.cloneNode(true);

  // Clear dynamic content in clone (will be re-rendered on load in the share file)
  ['dashboard','companies','contacts','interactions'].forEach(v => {
    const el = clone.querySelector('#view-' + v);
    if (el) el.innerHTML = '';
  });
  clone.querySelectorAll('[id^="badge-"]').forEach(el => el.textContent = '');
  const status = clone.querySelector('#data-status');
  if (status) status.innerHTML = '';

  // Reset modal state
  const modal = clone.querySelector('#modal-overlay');
  if (modal) modal.className = 'modal-overlay';

  // Remove dynamically-added banners or password gate from clone
  ['password-gate'].forEach(id => clone.querySelector('#'+id)?.remove());
  clone.querySelectorAll('body > div.fixed').forEach(el => el.remove());

  return '<!DOCTYPE html>\n' + clone.outerHTML;
}

async function buildShareHtml(encryptWithPassword) {
  // Try fetch first (works when served via http); fall back to DOM serialization (works on file://)
  let html;
  try {
    const res = await fetch(window.location.href, { cache: 'no-store' });
    if (!res.ok) throw new Error('fetch not ok');
    html = await res.text();
  } catch(e) {
    html = getSelfHtml();
  }

  const data = { companies: state.companies, contacts: state.contacts, interactions: state.interactions, projects: state.projects, lastUpdatedByClaudeCode: state.lastUpdatedByClaudeCode, lastUpdatedByUser: state.lastUpdatedByUser };

  if (encryptWithPassword) {
    const encrypted = await encryptPayload(data, encryptWithPassword);
    const payload = JSON.stringify(encrypted).replace(/<\/script>/gi, '<\\/script>');
    html = html.replace(
      /const ENCRYPTED_DATA = null; \/\*__ENCRYPTED_DATA__\*\//,
      `const ENCRYPTED_DATA = ${payload}; /*__ENCRYPTED_DATA__*/`
    );
  } else {
    const payload = JSON.stringify(data).replace(/<\/script>/gi, '<\\/script>');
    html = html.replace(
      /const SHARED_DATA = null; \/\*__SHARED_DATA__\*\//,
      `const SHARED_DATA = ${payload}; /*__SHARED_DATA__*/`
    );
  }
  return html;
}

function utf8ToBase64(str) {
  // Handle UTF-8 properly (btoa fails on non-ASCII)
  return btoa(unescape(encodeURIComponent(str)));
}

async function publishToWeb() {
  const cfg = getPublishConfig();
  if (!cfg || !cfg.owner || !cfg.repo || !cfg.token || !cfg.viewerPassword) {
    openPublishSettings();
    return;
  }
  const btn = document.getElementById('btn-publish');
  const originalHtml = btn.innerHTML;
  btn.innerHTML = '<svg width="18" height="18" class="animate-spin" fill="none" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" stroke-dasharray="40 60"/></svg> Publishing…';
  btn.style.pointerEvents = 'none';

  try {
    const html = await buildShareHtml(cfg.viewerPassword);
    const path = 'index.html';
    const apiUrl = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${path}`;
    const headers = {
      'Authorization': `Bearer ${cfg.token}`,
      'Accept': 'application/vnd.github+json',
      'Content-Type': 'application/json'
    };

    // Get current SHA if file exists
    let sha = null;
    try {
      const existing = await fetch(apiUrl, { headers });
      if (existing.ok) {
        const j = await existing.json();
        sha = j.sha;
      }
    } catch(e) {}

    const body = {
      message: `Update CRM snapshot · ${new Date().toISOString()}`,
      content: utf8ToBase64(html),
      branch: cfg.branch || 'main'
    };
    if (sha) body.sha = sha;

    const resp = await fetch(apiUrl, {
      method: 'PUT',
      headers,
      body: JSON.stringify(body)
    });

    if (!resp.ok) {
      const errBody = await resp.text();
      throw new Error(`GitHub returned ${resp.status}: ${errBody.slice(0, 300)}`);
    }

    const publicUrl = `https://${cfg.owner}.github.io/${cfg.repo}/`;
    cfg.lastPublishedAt = new Date().toISOString();
    cfg.url = publicUrl;
    savePublishConfig(cfg);

    showPublishSuccess(publicUrl);
  } catch(err) {
    console.error('publishToWeb', err);
    alert('Publish failed:\n\n' + err.message + '\n\nCheck your token has "repo" scope and the repo exists.');
  } finally {
    btn.innerHTML = originalHtml;
    btn.style.pointerEvents = '';
  }
}

async function generateShareFile() {
  if (!state.companies.length && !state.contacts.length) {
    alert('No data to share yet.');
    return;
  }
  try {
    // Get the current HTML source (we need a copy of THIS file)
    const res = await fetch(window.location.href);
    let html = await res.text();
    // Inject the data
    const data = { companies: state.companies, contacts: state.contacts, interactions: state.interactions, projects: state.projects, lastUpdatedByClaudeCode: state.lastUpdatedByClaudeCode, lastUpdatedByUser: state.lastUpdatedByUser };
    const payload = JSON.stringify(data).replace(/<\/script>/gi, '<\\/script>');
    html = html.replace(
      /const SHARED_DATA = null; \/\*__SHARED_DATA__\*\//,
      `const SHARED_DATA = ${payload}; /*__SHARED_DATA__*/`
    );
    // Download
    const blob = new Blob([html], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `boa-crm-share-${new Date().toISOString().slice(0,10)}.html`;
    a.click();
    URL.revokeObjectURL(url);
  } catch(err) {
    console.error(err);
    alert('Could not generate share file: ' + err.message + '\n\nThe HTML must be opened from disk (not preview) to enable this feature.');
  }
}

function setView(view) {
  // Re-clicking the nav while already on the same view resets any open detail page (back to list).
  // Switching from another view to one with a detail id preserves the detail.
  if (state.currentView === view) {
    if (view === 'projects' && state.projectDetailId) state.projectDetailId = null;
    if (view === 'companies' && state.companyDetailId) state.companyDetailId = null;
  }
  state.currentView = view;
  ['dashboard','companies','contacts','interactions','projects'].forEach(v => {
    document.getElementById('view-'+v).classList.toggle('hidden', v !== view);
    document.getElementById('nav-'+v).classList.toggle('active', v === view);
  });
  render();
}

function render() {
  // Preserve focus + cursor of any focused input/textarea before innerHTML wipes it
  const active = document.activeElement;
  let focusId = null, cursorStart = null, cursorEnd = null;
  if (active && active.id && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA')) {
    focusId = active.id;
    try { cursorStart = active.selectionStart; cursorEnd = active.selectionEnd; } catch(e) {}
  }

  if (state.currentView === 'dashboard') renderDashboard();
  else if (state.currentView === 'companies') renderCompanies();
  else if (state.currentView === 'contacts') renderContacts();
  else if (state.currentView === 'interactions') renderInteractions();
  else if (state.currentView === 'projects') renderProjects();

  // Restore focus to the same element by id, putting cursor back where it was
  if (focusId) {
    const newEl = document.getElementById(focusId);
    if (newEl) {
      newEl.focus();
      if (cursorStart != null && typeof newEl.setSelectionRange === 'function') {
        try { newEl.setSelectionRange(cursorStart, cursorEnd ?? cursorStart); } catch(e) {}
      }
    }
  }
}

// New: binary Active / Inactive status (replaces old temperature concept)
function getStatus(co) {
  if (co.statusOverride === 'active' || co.statusOverride === 'inactive') return co.statusOverride;
  const list = state.interactions.filter(i => i.companyId === co.id);
  if (!list.length) return 'inactive';
  const latest = list.slice().sort((a,b) => new Date(b.date||0) - new Date(a.date||0))[0];
  if (INACTIVE_KPIS.has(latest.kpi)) return 'inactive';
  return 'active';
}
// Legacy alias — returns Active/Inactive (used to return hot/warm/cold/not_interested)
function getTemperature(co) { return getStatus(co); }

function fmtDate(iso) { if (!iso) return '—'; try { return new Date(iso).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); } catch(e){ return iso; } }
function fmtDateShort(iso) { if (!iso) return '—'; try { return new Date(iso).toLocaleDateString('en-GB',{day:'2-digit',month:'short'}); } catch(e){ return iso; } }
function relTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso); const diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return `${Math.floor(diff/60)} min ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)} h ago`;
  if (diff < 604800) return `${Math.floor(diff/86400)} d ago`;
  return fmtDate(iso);
}

function getInitials(name) {
  return (name||'?').split(/\s+/).slice(0,2).map(w => w[0]||'').join('').toUpperCase();
}

const AVATAR_COLORS = ['#233b34','#2d4a42','#3a5a4e','#4a5c4a','#5a6650','#6b6850','#8f7a55','#aca497','#5c4a3a','#3a443a'];
function avatarColor(s) {
  let h=0; for(const c of (s||'')) h = (h*31 + c.charCodeAt(0)) & 0xffffffff;
  return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
}

  const connectors = fCompanies.filter(c => c.type === 'connector').length;
  const others     = fCompanies.filter(c => c.type === 'other').length;

  const lastMonth = state.interactions.filter(i => i.date && new Date(i.date) >= lastMonthStart && new Date(i.date) < monthStart).length;

  // Active prospects (was Hot Prospects): companies with status=active, sorted by latest activity (most recent first)

    .filter(c => getStatus(c) === 'active')

          <svg class="absolute left-3 top-3 text-slate-400" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11a6 6 0 11-12 0 6 6 0 0112 0z"/></svg>
          <input type="text" id="dashboard-search" value="${esc(focus.query||'')}" placeholder="Focus on a project, company, contact or keyword..." oninput="onDashboardSearchInput(this.value)" onkeydown="if(event.key==='Enter'){event.preventDefault(); applyDashboardSearch(this.value);} if(event.key==='Escape'){this.value=''; clearDashboardFocus();}" autocomplete="off" class="w-full pl-10 pr-3 py-2.5 border rounded-lg text-sm bg-white" style="border-color: var(--line);">
        </div>
        ${focusActive ? '<button onclick="clearDashboardFocus()" class="ghost-btn px-3 py-2 text-xs rounded-lg font-medium">Clear filter</button>' : ''}
      </div>

      ${focusActive ? '<div class="card p-4 mb-4" style="background: var(--paper-soft); border-color: var(--line-soft);">'+renderFocusCard(focus)+'</div>' : ''}
      ${state.actionContext ? renderActionContextPanel() : ''}
      ${focusActive ? renderFocusedDashboard(focus) : `
      ${digestParts.length > 0 && !empty ? `
      <div class="text-sm mb-8 flex items-center gap-3 flex-wrap" style="color: var(--warm);">
        ${digestParts.join(`<span style="opacity:0.4;">·</span>`)}
      </div>
      ` : '<div class="mb-8"></div>'}

      ${empty ? `
        <div class="card p-12 text-center">
          <div class="w-16 h-16 mx-auto rounded-2xl flex items-center justify-center mb-4" style="background: var(--paper);">
            <svg width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" style="color: var(--green);"><path stroke-linecap="round" stroke-linejoin="round" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg>
          </div>
          <h2 class="font-display text-2xl font-medium mb-2">Welcome to BOA CRM</h2>
          <p class="mb-6 max-w-md mx-auto" style="color: var(--warm);">
            ${FS_SUPPORTED
              ? 'Connect to the <code style="background: var(--paper); padding: 1px 6px; border-radius: 3px; font-size: 12px;">boa-crm-data.json</code> file so changes are saved automatically and stay in sync with the AI.'
              : 'Import your JSON data file. For automatic AI sync, use Chrome or Edge.'}
          </p>
          ${FS_SUPPORTED
            ? `<button onclick="connectFile()" class="gold-btn px-5 py-2.5 text-sm rounded-lg font-semibold">Connect to file</button>`
            : `<label class="gold-btn px-5 py-2.5 text-sm rounded-lg font-semibold cursor-pointer inline-block">Import JSON<input type="file" accept=".json" class="hidden" onchange="importJSON(event)"></label>`}
        </div>
      ` : `

      <!-- Action Items -->
      ${(overdue.length + thisWeek.length + actionReq.length) > 0 ? `
      <div class="mb-8">
        <div class="text-[10px] uppercase tracking-[0.18em] font-semibold mb-3" style="color: var(--green);">Action Items</div>
        <div class="grid grid-cols-3 gap-4">
          ${actionItemCard('Overdue', 'overdue', overdue.length, overdue, i => {
            const d = new Date(i.followUpDate);
            const days = Math.floor((todayDate - d) / (1000*60*60*24));
            return renderInteractionItem(i, { text: `${days}d overdue · was ${fmtDate(i.followUpDate)}`, color: '#a04330' }, 'overdue');
          }, '#b04c32')}
          ${actionItemCard('Action Required', 'action_required', actionReq.length, actionReq, i => {
            return renderInteractionItem(i, { text: fmtDate(i.date), color: '#a04330' }, 'action_required');
          }, '#b04c32')}
          ${actionItemCard('This Week', 'this_week', thisWeek.length, thisWeek, i => {
            return renderInteractionItem(i, { text: `Due ${fmtDate(i.followUpDate)}`, color: '#7a5c3c' }, 'this_week');
          }, '#8f6f48')}
        </div>
      </div>
      ` : ''}

      <!-- KPI cards -->
      <div class="grid grid-cols-4 gap-4 mb-8">
        <div class="stat-card">
          <div class="flex items-start justify-between mb-3">
            <div class="text-[10px] uppercase tracking-[0.18em] font-semibold" style="color: var(--warm);">Companies</div>
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.6" style="color: var(--warm); opacity: 0.6;"><path stroke-linecap="round" stroke-linejoin="round" d="M3 21h18M5 21V7l8-4v18M19 21V11l-6-4"/></svg>
          </div>
          <div class="font-display text-4xl font-medium num">${total}</div>
          <div class="mt-3 flex gap-4 text-xs flex-wrap" style="color: var(--warm);">
            <span><span class="num font-semibold" style="color: var(--ink);">${investors}</span> investors</span>
            <span><span class="num font-semibold" style="color: var(--ink);">${connectors}</span> connectors</span>
            ${others > 0 ? `<span style="opacity:0.6;"><span class="num font-semibold">${others}</span> other</span>` : ''}
          </div>
        </div>

        <div class="stat-card">
          <div class="flex items-start justify-between mb-3">
            <div class="text-[10px] uppercase tracking-[0.18em] font-semibold" style="color: var(--warm);">Active</div>
            <span style="width:6px;height:6px;border-radius:50%;display:inline-block;background:#233b34;"></span>
          </div>
          <div class="font-display text-4xl font-medium num" style="color: var(--green);">${activeCount}</div>
          <div class="mt-3 flex gap-4 text-xs" style="color: var(--warm);">
            <span><span class="num font-semibold" style="color: var(--ink);">${activeInv}</span> investors</span>
            <span><span class="num font-semibold" style="color: var(--ink);">${activeConn}</span> connectors</span>
            <span class="ml-auto" style="opacity:0.6;">${inactiveCount} inactive</span>
          </div>
        </div>

        ${(() => {
          // Pipeline €: sum of target amounts across active projects
          const activeProjectsList = state.projects.filter(p => (p.status||'active') === 'active');
          const pipelineValue = activeProjectsList.reduce((sum, p) => sum + (Number(p.targetAmount) || 0), 0);
          const projectsWithValue = activeProjectsList.filter(p => Number(p.targetAmount) > 0).length;
          // Active deals: companies with at least one non-closed interaction in last 30 days
          const activeDealsList = state.companies.filter(c => {
            const list = state.interactions.filter(i => i.companyId === c.id);
            if (!list.length) return false;
            const latest = list.slice().sort((a,b) => new Date(b.date||0) - new Date(a.date||0))[0];
            return new Date(latest.date||0) >= thirtyDaysAgo && !INACTIVE_KPIS.has(latest.kpi);
          });
          const activeDeals = activeDealsList.length;
          // Active investors specifically
          const activeInvestors = activeDealsList.filter(c => c.type === 'investor').length;
          return `
          <div class="stat-card">
            <div class="flex items-start justify-between mb-3">
              <div class="text-[10px] uppercase tracking-[0.18em] font-semibold" style="color: var(--warm);">Pipeline</div>
              <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.6" style="color: var(--warm); opacity: 0.6;"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            </div>
            <div class="font-display text-4xl font-medium num" style="color: var(--green);">${fmtEUR(pipelineValue)}</div>
            <div class="mt-3 text-xs" style="color: var(--warm);">
              across <span class="num font-semibold" style="color: var(--ink);">${activeProjectsList.length}</span> active projects
              ${projectsWithValue < activeProjectsList.length ? ` <span style="opacity:0.5;">· ${activeProjectsList.length - projectsWithValue} unsized</span>` : ''}
            </div>
          </div>

          <div class="stat-card">
            <div class="flex items-start justify-between mb-3">
              <div class="text-[10px] uppercase tracking-[0.18em] font-semibold" style="color: var(--warm);">Active Deals</div>
              <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.6" style="color: var(--warm); opacity: 0.6;"><path stroke-linecap="round" stroke-linejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
            </div>
            <div class="font-display text-4xl font-medium num">${activeDeals}</div>
            <div class="mt-3 flex gap-4 text-xs" style="color: var(--warm);">
              <span><span class="num font-semibold" style="color: var(--ink);">${activeInvestors}</span> investors</span>
              <span>last <span class="num font-semibold" style="color: var(--ink);">30d</span></span>
            </div>
          </div>`;
        })()}
      </div>

      <!-- Two-column area -->
      <div class="grid grid-cols-3 gap-4 mb-8">
        <!-- Recent activity -->
        <div class="card col-span-2 p-6">
          <div class="flex items-center justify-between mb-5">
            <h2 class="font-display text-xl font-semibold">Recent Activity</h2>
            <button onclick="setView('interactions')" class="text-xs font-medium text-slate-500 hover:text-slate-900">View all →</button>
          </div>
          ${recent.length === 0 ? '<div class="text-sm text-slate-400 py-6 text-center">No interactions yet</div>' : `
          <div class="space-y-1">
            ${recent.map(i => {
              const co = state.companies.find(c => c.id === i.companyId);
              const ct = state.contacts.find(c => c.id === i.contactId);
              return `<div class="flex items-start gap-3 py-3 px-2 -mx-2 rounded-lg row-hover cursor-pointer" onclick="openEditModal('interaction','${esc(i.id)}')">
                <div class="w-9 h-9 rounded-full flex items-center justify-center text-white text-xs font-semibold flex-shrink-0" style="background:${avatarColor(co?co.name:'')};">${getInitials(co?co.name:'?')}</div>
                <div class="flex-1 min-w-0">
                  <div class="flex items-center gap-2 mb-0.5">
                    <span class="font-semibold text-sm truncate" style="color: var(--ink);">${esc(co?co.name:'—')}</span>
                    ${pill(KPI, i.kpi)}
                  </div>
                  <div class="text-sm text-slate-600 truncate">${esc(i.subject || i.summary || '—')}</div>
                  <div class="text-xs text-slate-400 mt-0.5">${esc(i.kind||'')} ${ct ? '· '+esc(ct.firstName+' '+ct.lastName) : ''}</div>
                </div>
                <div class="text-xs text-slate-400 num flex-shrink-0">${relTime(i.date)}</div>
              </div>`;
            }).join('')}
          </div>`}
        </div>

        <!-- Hot prospects -->
        <div class="card p-6">
          <div class="flex items-center justify-between mb-5">
            <h2 class="font-display text-xl font-medium flex items-center gap-2.5">
              <span style="width:7px;height:7px;border-radius:50%;display:inline-block;background:#233b34;"></span> Active Prospects
            </h2>
          </div>
          ${hotCompanies.length === 0 ? '<div class="text-sm text-slate-400 py-6 text-center">No hot prospects</div>' : `
          <div class="space-y-1">
            ${hotCompanies.map(c => {
              const coInts = state.interactions.filter(i => i.companyId === c.id);
              const n = coInts.length;
              const latest = coInts.slice().sort((a,b) => new Date(b.date||0) - new Date(a.date||0))[0];
              const daysSince = latest && latest.date ? Math.floor((todayDate - new Date(latest.date)) / (1000*60*60*24)) : null;
              const followUp = latest && latest.followUpDate ? new Date(latest.followUpDate) : null;
              const followLabel = followUp ? (followUp < todayDate ? `<span style="color:#a04330;">⚠ overdue · ${fmtDate(followUp)}</span>` : `<span style="color:#7a5c3c;">↻ ${fmtDate(followUp)}</span>`) : '';
              return `<div class="flex items-center gap-3 py-2.5 px-2 -mx-2 rounded-lg row-hover cursor-pointer" onclick="openEditModal('company','${esc(c.id)}')">
                <div class="w-8 h-8 rounded-lg flex items-center justify-center text-white text-[10px] font-semibold flex-shrink-0" style="background:${avatarColor(c.name)};">${getInitials(c.name)}</div>
                <div class="flex-1 min-w-0">
                  <div class="font-medium text-sm truncate" style="color: var(--ink);">${esc(c.name)}</div>
                  <div class="text-xs truncate" style="color: var(--warm);">
                    ${esc(c.country||'—')} · ${n} int${daysSince != null ? ` · last ${daysSince}d ago` : ''}
                  </div>
                  ${followLabel ? `<div class="text-[10px] num mt-0.5">${followLabel}</div>` : ''}
                </div>
              </div>`;
            }).join('')}
          </div>`}
        </div>
      </div>

      <!-- Projects Pipeline -->
      ${state.projects.length > 0 ? `
      <div class="card p-6 mb-4">
        <div class="flex items-center justify-between mb-5">
          <h2 class="font-display text-xl font-medium">Projects Pipeline</h2>
          <button onclick="setView('projects')" class="text-xs font-medium text-slate-500 hover:text-slate-900">View all →</button>
        </div>
        <div class="space-y-2">
          ${state.projects.slice().sort((a,b) => {
            // Sort: active first, then by latest activity desc
            if ((a.status||'active') === 'active' && (b.status||'active') !== 'active') return -1;
            if ((a.status||'active') !== 'active' && (b.status||'active') === 'active') return 1;
            const aLatest = state.interactions.filter(i => i.projectIds?.includes(a.id)).map(i => new Date(i.date||0)).sort((x,y) => y-x)[0] || 0;
            const bLatest = state.interactions.filter(i => i.projectIds?.includes(b.id)).map(i => new Date(i.date||0)).sort((x,y) => y-x)[0] || 0;
            return bLatest - aLatest;
          }).map(p => {
            const s = projectStats(p);
            const status = p.status || 'active';
            const latestDate = s.latest?.date;
            const daysSince = latestDate ? Math.floor((todayDate - new Date(latestDate)) / (1000*60*60*24)) : null;
            return `<div class="flex items-center gap-4 px-3 py-3 -mx-3 rounded-lg row-hover cursor-pointer" onclick="setView('projects'); setTimeout(()=>openProjectDetail('${esc(p.id)}'), 0)">
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 flex-wrap mb-1">
                  <span class="font-semibold text-sm" style="color: var(--ink);">${esc(p.name)}</span>
                  ${pill(PROJECT_STATUS, status)}
                  ${s.pending > 0 ? `<span class="text-[10px] px-1.5 py-0.5 rounded font-medium" style="background:rgba(176,76,50,0.1);color:#a04330;">${s.pending} pending</span>` : ''}
                </div>
                <div class="text-xs" style="color: var(--warm);">
                  ${p.location ? esc(p.location) + ' · ' : ''}${p.type ? esc(p.type) + ' · ' : ''}${p.keys ? p.keys + ' keys · ' : ''}${fmtEUR(p.targetAmount)}
                </div>
              </div>
              <div class="text-right text-xs flex-shrink-0" style="color: var(--warm);">
                <div class="flex items-center gap-3">
                  <span><span class="num font-semibold" style="color: var(--ink);">${s.companyIds.length}</span> co</span>
                  <span><span class="num font-semibold" style="color: var(--ink);">${s.interactions.length}</span> int</span>
                </div>
                <div class="num mt-0.5">${latestDate ? fmtDateShort(latestDate) + (daysSince!=null ? ' · '+daysSince+'d ago' : '') : 'no activity'}</div>
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>
      ` : ''}

      <!-- Country distribution + Weekly Activity -->
      <div class="grid grid-cols-2 gap-4">
        <!-- Country distribution -->
        ${(() => {
          const byCountry = {};
          state.companies.forEach(c => { if (c.country && c.country.trim()) byCountry[c.country.trim()] = (byCountry[c.country.trim()]||0) + 1; });
          const countries = Object.entries(byCountry).sort((a,b) => b[1]-a[1]).slice(0, 8);
          if (countries.length === 0) return '<div></div>';
          const maxCountry = countries[0][1];
          return `<div class="card p-6">
            <h2 class="font-display text-xl font-medium mb-5">Companies by Country</h2>
            <div class="space-y-3">
              ${countries.map(([country, n]) => `
                <div>
                  <div class="flex items-baseline justify-between text-sm mb-1.5">
                    <span class="font-medium" style="color: var(--ink);">${esc(country)}</span>
                    <span class="num text-xs" style="color: var(--warm);">${n}</span>
                  </div>
                  <div class="h-1 rounded-sm overflow-hidden" style="background: var(--paper);">
                    <div class="h-full" style="width: ${(n/maxCountry)*100}%; background: var(--green);"></div>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>`;
        })()}

        <!-- Weekly activity -->
        ${(() => {
          // Build last 12 weeks of activity (interactions per week)
          const weeks = [];
          const msPerDay = 1000*60*60*24;
          const dayOfWeek = todayDate.getDay() || 7; // Sunday=0 → 7
          const monday = new Date(todayDate); monday.setDate(monday.getDate() - dayOfWeek + 1);
          for (let w = 11; w >= 0; w--) {
            const start = new Date(monday); start.setDate(monday.getDate() - w*7);
            const end = new Date(start); end.setDate(start.getDate() + 7);
            const count = state.interactions.filter(i => {
              if (!i.date) return false;
              const d = new Date(i.date);
              return d >= start && d < end;
            }).length;
            weeks.push({ start, count });
          }
          const maxW = Math.max(1, ...weeks.map(w => w.count));
          const thisWeekCount = weeks[weeks.length-1].count;
          const lastWeekCount = weeks[weeks.length-2]?.count || 0;
          const delta = lastWeekCount ? Math.round(((thisWeekCount - lastWeekCount) / lastWeekCount) * 100) : null;
          return `<div class="card p-6">
            <div class="flex items-center justify-between mb-5">
              <h2 class="font-display text-xl font-medium">Weekly Activity</h2>
              <div class="text-xs num" style="color: var(--warm);">
                <span class="font-semibold" style="color: var(--ink);">${thisWeekCount}</span> this week
                ${delta != null ? `<span style="color:${delta >= 0 ? 'var(--green)' : '#a04330'};margin-left:6px;">${delta >= 0 ? '+' : ''}${delta}%</span>` : ''}
              </div>
            </div>
            <div class="flex items-end gap-1.5" style="height: 110px;">
              ${weeks.map((w, idx) => {
                const h = Math.round((w.count / maxW) * 100);
                const isCurrent = idx === weeks.length - 1;
                const color = isCurrent ? 'var(--green)' : 'var(--warm)';
                const opacity = isCurrent ? '1' : '0.55';
                return `<div class="flex-1 flex flex-col items-center justify-end" title="Week of ${fmtDateShort(w.start.toISOString())} — ${w.count} interactions">
                  <div class="w-full rounded-sm transition-all" style="height: ${Math.max(h, 4)}%; background: ${color}; opacity: ${opacity};"></div>
                </div>`;
              }).join('')}
            </div>
            <div class="flex justify-between mt-3 text-[10px] num" style="color: var(--warm);">
              <span>12w ago</span>
              <span>this week</span>
            </div>
          </div>`;
        })()}
      </div>

      `}
      `}
    </div>
  `;
}

function openCompanyDetail(id) {
  state.companyDetailId = id;
  renderCompanies();
}
function closeCompanyDetail() {
  state.companyDetailId = null;
  renderCompanies();
}

function renderCompanyDetail(co) {
  const contacts = state.contacts.filter(c => c.companyId === co.id);
  const ints = state.interactions.filter(i => i.companyId === co.id).sort((a,b) => new Date(b.date||0) - new Date(a.date||0));
  const latest = ints[0];
  const pending = ints.filter(i => i.kpi === 'action_required' && !i.completed).length;
  const temp = getTemperature(co);
  const todayDate = new Date(); todayDate.setHours(0,0,0,0);
  const daysSinceLatest = latest ? Math.floor((todayDate - new Date(latest.date||0)) / (1000*60*60*24)) : null;

  // Latest touch summary — truncated to ~5 lines via CSS line-clamp
  document.getElementById('view-companies').innerHTML = `
    <div class="max-w-7xl mx-auto">
      <button onclick="closeCompanyDetail()" class="text-xs uppercase tracking-wider font-semibold mb-4 inline-flex items-center gap-1.5 hover:opacity-70" style="color: var(--warm);">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
        Back to companies
      </button>

      <!-- Header -->
      <div class="flex items-start justify-between mb-2">
        <div class="flex items-start gap-4">
          <div class="w-14 h-14 rounded-xl flex items-center justify-center text-white text-base font-semibold flex-shrink-0" style="background:${avatarColor(co.name)};">${getInitials(co.name)}</div>
          <div>
            <div class="text-[11px] uppercase tracking-widest font-semibold mb-1" style="color: var(--green);">${typeLabel(co)}</div>
            <div class="flex items-center gap-3 flex-wrap">
              <h1 class="font-display text-4xl font-semibold tracking-tight">${esc(co.name)}</h1>
              ${pill(TEMP, temp)}
            </div>
            <div class="text-sm mt-2" style="color: var(--warm);">
              ${co.country ? esc(co.country) + ' · ' : ''}${co.category ? esc(co.category) : ''}${co.website ? ` · <a href="${esc(co.website)}" target="_blank" class="hover:underline" style="color: var(--green);">${esc(co.website.replace(/^https?:\/\//,'').replace(/\/$/,''))}</a>` : ''}${co.linkedin ? ` · <a href="${esc(co.linkedin)}" target="_blank" class="hover:underline" style="color: var(--green);">LinkedIn</a>` : ''}
            </div>
          </div>
        </div>
        <div class="flex gap-2">
          <button onclick="openEditInline('company','${esc(co.id)}')" class="ghost-btn px-4 py-2 text-sm rounded-lg font-medium">${isInlineEditing('company', co.id) ? 'Close edit' : 'Edit'}</button>
          <button onclick="openCompanyDraft('${esc(co.id)}')" class="ghost-btn px-4 py-2 text-sm rounded-lg font-medium inline-flex items-center gap-2">
            <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l9 6 9-6M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
            Draft email
          </button>
          <button onclick="openNewModal('interaction')" class="gold-btn px-4 py-2 text-sm rounded-lg font-semibold inline-flex items-center gap-2">
            <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
            Log Interaction
          </button>

function renderCompanies() {

  if (state.companyDetailId) {

    else { renderCompanyDetail(co); return; }

  const f = state.companyFilter;
  const filtered = state.companies.filter(c => {
    if (f.search) {
      const s = f.search.toLowerCase();
      if (!(c.name||'').toLowerCase().includes(s) && !(c.country||'').toLowerCase().includes(s)) return false;
    }
    if (f.category && c.category !== f.category) return false;
    if (f.type && c.type !== f.type) return false;
    if (f.temp && getTemperature(c) !== f.temp) return false;
    if (f.projectId) {
      const directHas = Array.isArray(c.projectIds) && c.projectIds.includes(f.projectId);
      const cInts = state.interactions.filter(i => i.companyId === c.id);
      const intHas = cInts.some(i => Array.isArray(i.projectIds) && i.projectIds.includes(f.projectId));
      if (!directHas && !intHas) return false;

    return true;
  });
  const cats = [...new Set(state.companies.map(c => c.category).filter(Boolean))].sort();

        </table>
      </div>
    </div>
  `;
}

function renderInteractions() {

    if (f.search) {
      const s = f.search.toLowerCase();
      if (!(i.subject||'').toLowerCase().includes(s) && !(i.summary||'').toLowerCase().includes(s)) return false;

    if (f.kpi && i.kpi !== f.kpi) return false;

    if (f.projectId && !(Array.isArray(i.projectIds) && i.projectIds.includes(f.projectId))) return false;
    return true;
  });

  // Group by company
  const groups = new Map();
  for (const i of filtered) {
    const key = i.companyId || '__none__';
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(i);
  }
  // Sort interactions within each group by date desc, and sort groups by most recent interaction
  const groupList = [];
  for (const [companyId, items] of groups.entries()) {
    items.sort((a,b) => new Date(b.date||0) - new Date(a.date||0));
    const latestDate = items[0]?.date || 0;
    groupList.push({ companyId, items, latestDate });
  }
  groupList.sort((a,b) => new Date(b.latestDate||0) - new Date(a.latestDate||0));

          <input id="search-interactions" type="text" placeholder="Search by subject or summary…" value="${esc(f.search)}"
            oninput="state.interactionFilter.search=this.value; render()"
            class="w-full pl-9 pr-3 py-2 border rounded-lg text-sm" style="border-color: var(--line);">
        </div>
        <select onchange="state.interactionFilter.kpi=this.value; renderInteractions()" class="px-3 py-2 border rounded-lg text-sm" style="border-color: var(--line);">
          <option value="">All KPIs</option>
          <option value="action_required" ${f.kpi==='action_required'?'selected':''}>Action Required</option>
          <option value="info_sent" ${f.kpi==='info_sent'?'selected':''}>Info Sent</option>
          <option value="in_conversation" ${f.kpi==='in_conversation'?'selected':''}>In Conversation</option>
          <option value="monitoring" ${f.kpi==='monitoring'?'selected':''}>Monitoring</option>
          <option value="not_interested" ${f.kpi==='not_interested'?'selected':''}>Not Interested</option>
          <option value="won" ${f.kpi==='won'?'selected':''}>Won</option>
        </select>
        <select onchange="state.interactionFilter.companyId=this.value; renderInteractions()" class="px-3 py-2 border rounded-lg text-sm max-w-xs" style="border-color: var(--line);">
          <option value="">All companies</option>
          ${state.companies.slice().sort((a,b)=>a.name.localeCompare(b.name)).map(c => `<option value="${esc(c.id)}" ${f.companyId===c.id?'selected':''}>${esc(c.name)}</option>`).join('')}
        </select>
        <select onchange="state.interactionFilter.projectId=this.value; renderInteractions()" class="px-3 py-2 border rounded-lg text-sm max-w-xs" style="border-color: var(--line);">
          <option value="">All projects</option>
          ${state.projects.slice().sort((a,b)=>a.name.localeCompare(b.name)).map(p => `<option value="${esc(p.id)}" ${f.projectId===p.id?'selected':''}>${esc(p.name)}</option>`).join('')}
        </select>
      </div>

      ${filtered.length === 0
        ? `<div class="card p-16 text-center text-slate-400">No interactions found</div>`
        : `<div class="space-y-4">
            ${groupList.map(g => {
              const co = state.companies.find(c => c.id === g.companyId);
              const coName = co ? co.name : '— No company —';
              const temp = co ? getTemperature(co) : null;
              const coCountry = co ? (co.country || '') : '';
              const coType = co ? (typeLabel(co)) : '';
              return `<div class="card overflow-hidden">
                <div class="px-5 py-4 flex items-center gap-3 border-b" style="border-color: var(--line-soft); background: var(--paper-soft);">
                  <div class="w-10 h-10 rounded-lg flex items-center justify-center text-white text-xs font-semibold flex-shrink-0" style="background:${avatarColor(coName)};">${getInitials(coName)}</div>
                  <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2 flex-wrap">
                      ${co ? `<a onclick="event.stopPropagation();openEditModal('company','${esc(co.id)}')" class="font-display text-lg font-medium cursor-pointer hover:underline" style="color: var(--ink);">${esc(coName)}</a>` : `<span class="font-display text-lg font-medium" style="color: var(--warm);">${esc(coName)}</span>`}
                      ${temp ? pill(TEMP, temp) : ''}
                    </div>
                    <div class="text-xs mt-0.5" style="color: var(--warm);">
                      ${coCountry ? esc(coCountry) + ' · ' : ''}${coType ? esc(coType) + ' · ' : ''}${g.items.length} interaction${g.items.length>1?'s':''} · latest ${fmtDate(g.latestDate)}
                    </div>

                <div class="divide-y" style="--tw-divide-opacity:1;">

                    const expanded = isInlineEditing('interaction', i.id);
                    return `<div class="flex items-start gap-4 px-5 py-3.5 row-hover cursor-pointer ${expanded?'bg-[var(--paper-soft)]':''}" onclick="openEditInline('interaction','${esc(i.id)}')">

                      <div class="flex-1 min-w-0">

const PROJECT_STATUS = {
  active:     { label:'Active',     bg:'rgba(35,59,52,0.08)',   fg:'#233b34', d:'#233b34' },
  not_active: { label:'Not Active', bg:'rgba(172,164,151,0.18)',fg:'#6b6358', d:'#aca497' },
  // Legacy aliases so old data still renders during migration
  on_hold:    { label:'Not Active', bg:'rgba(172,164,151,0.18)',fg:'#6b6358', d:'#aca497' },
  won:        { label:'Not Active', bg:'rgba(172,164,151,0.18)',fg:'#6b6358', d:'#aca497' },
  lost:       { label:'Not Active', bg:'rgba(172,164,151,0.18)',fg:'#6b6358', d:'#aca497' }
};

function projectStats(p) {
  const ints = state.interactions.filter(i => Array.isArray(i.projectIds) && i.projectIds.includes(p.id));
  const companyIds = [...new Set(ints.map(i => i.companyId).filter(Boolean))];
  const latest = ints.slice().sort((a,b) => new Date(b.date||0) - new Date(a.date||0))[0];
  const pending = ints.filter(i => i.kpi === 'action_required' && !i.completed).length;
  return { interactions: ints, companyIds, latest, pending };
}

function fmtEUR(n) {
  if (n == null || n === '') return '—';
  if (n >= 1000000) return '€' + (n/1000000).toFixed(1).replace(/\.0$/,'') + 'M';
  if (n >= 1000) return '€' + (n/1000).toFixed(0) + 'k';
  return '€' + n;
}

function openProjectDetail(id) {
  state.projectDetailId = id;
  renderProjects();
}
function closeProjectDetail() {
  state.projectDetailId = null;
  renderProjects();
}

function renderProjectDetail(p) {
  // Gather all interactions for this project
  const ints = state.interactions
    .filter(i => Array.isArray(i.projectIds) && i.projectIds.includes(p.id))
    .sort((a,b) => new Date(b.date||0) - new Date(a.date||0));

  // Group by company
  const byCompany = new Map();
  for (const i of ints) {
    const key = i.companyId || '__none__';
    if (!byCompany.has(key)) byCompany.set(key, []);
    byCompany.get(key).push(i);
  }

  // Build company rows
  const companyRows = [];
  for (const [companyId, items] of byCompany.entries()) {
    const co = state.companies.find(c => c.id === companyId);
    const latest = items[0];
    companyRows.push({ co, companyId, latest, count: items.length });
  }
  companyRows.sort((a,b) => new Date(b.latest.date||0) - new Date(a.latest.date||0));

  // Action items (action_required + overdue follow-ups)
  const todayDate = new Date(); todayDate.setHours(0,0,0,0);
  const pending = ints.filter(i =>
    (i.kpi === 'action_required' && !i.completed) ||
    (i.followUpDate && new Date(i.followUpDate) < todayDate && !i.completed)

  // Stats
  const latestDate = ints[0]?.date;
  const daysSinceLatest = latestDate ? Math.floor((todayDate - new Date(latestDate)) / (1000*60*60*24)) : null;
  const status = p.status || 'active';

  document.getElementById('view-projects').innerHTML = `

          <div class="flex items-center gap-3 flex-wrap">

            ${pill(PROJECT_STATUS, status)}
          </div>
